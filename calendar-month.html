<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AS｜CAR 月檢視</title>
  <style>
    :root {
      --ink: #1a0b3d;
      --purple: #574266;
      --muted: #7a6a82;
      --line: #e7dde8;
      --soft: #faf7fb;
      --pink: #d85c8f;
      --shadow: 0 8px 24px rgba(26, 11, 61, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f6f3f7;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(246, 243, 247, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 12px 10px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    h1 {
      margin: 0;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.2;
    }
    .version {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .controls {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      align-items: center;
      margin-top: 14px;
    }
    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--purple);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button.primary {
      border-color: var(--purple);
      background: var(--purple);
      color: #fff;
    }
    .month-title {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 18px;
      font-weight: 700;
    }
    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    main {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 8px 0 32px;
    }
    .weekdays, .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0;
    }
    .weekday {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 0;
      border-right: 1px solid var(--line);
    }
    .weekday:last-child { border-right: 0; }
    .day {
      min-height: 118px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      box-shadow: none;
      padding: 4px 4px 6px;
      overflow: visible;
    }
    .day:nth-child(7n) { border-right: 0; }
    .day.muted {
      background: #f7f4f8;
      color: #b7adbd;
      box-shadow: none;
    }
    .day.today {
      border-color: #e8bfd1;
      background: #fff8fb;
    }
    .date-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin-bottom: 2px;
    }
    .date-num {
      font-weight: 700;
      color: var(--purple);
      font-size: 18px;
      line-height: 1.1;
    }
    .count {
      color: var(--muted);
      font-size: 11px;
    }
    .event {
      display: block;
      width: 100%;
      margin-top: 1px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      padding: 0;
      font-size: 11px;
      line-height: 1.22;
      text-align: left;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .more {
      margin-top: 2px;
      color: var(--pink);
      font-size: 11px;
      text-align: right;
    }
    .status {
      margin: 18px 0;
      color: var(--muted);
      text-align: center;
    }
    dialog {
      width: min(520px, calc(100% - 28px));
      border: 0;
      border-radius: 10px;
      padding: 0;
      box-shadow: 0 18px 40px rgba(26, 11, 61, 0.22);
    }
    dialog::backdrop { background: rgba(26, 11, 61, 0.38); }
    .modal-head {
      background: var(--purple);
      color: #fff;
      padding: 14px 16px;
      font-weight: 700;
      font-size: 17px;
    }
    .modal-body { padding: 14px 16px; }
    .modal-event {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .modal-event:last-child { border-bottom: 0; }
    .modal-time {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }
    .modal-actions {
      padding: 0 16px 16px;
      text-align: right;
    }
    @media (max-width: 640px) {
      h1 { font-size: 19px; }
      .wrap { padding: 10px 8px; }
      main { padding-left: 0; padding-right: 0; }
      .weekdays, .calendar { gap: 0; }
      .weekday { font-size: 11px; }
      .day {
        min-height: 112px;
        padding: 3px 2px 5px;
      }
      .date-num { font-size: 17px; }
      .event {
        font-size: 9px;
        line-height: 1.18;
        padding: 0;
      }
      .count { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topbar">
        <h1>CAR 行事曆月檢視</h1>
        <div class="version" id="versionText">calendar-month-v1.0.1</div>
      </div>
      <div class="controls">
        <button type="button" onclick="moveMonth(-1)">‹</button>
        <div class="month-title" id="monthTitle">--</div>
        <button type="button" onclick="moveMonth(1)">›</button>
      </div>
      <div class="hint">每一天直接顯示 Google CAR 行事曆主旨；點日期可放大查看。</div>
    </div>
  </header>

  <main>
    <div class="weekdays">
      <div class="weekday">一</div>
      <div class="weekday">二</div>
      <div class="weekday">三</div>
      <div class="weekday">四</div>
      <div class="weekday">五</div>
      <div class="weekday">六</div>
      <div class="weekday">日</div>
    </div>
    <div id="status" class="status">讀取中...</div>
    <div id="calendar" class="calendar"></div>
  </main>

  <dialog id="dayDialog">
    <div class="modal-head" id="dialogTitle">行程</div>
    <div class="modal-body" id="dialogBody"></div>
    <div class="modal-actions">
      <button type="button" class="primary" onclick="closeDialog()">關閉</button>
    </div>
  </dialog>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby9KWdatRfDZY5g2DkieUkAhyEJDDCnKcMb_l8o2_J4JCaOtKYfEEkvzk-1sW-oZWIF/exec";
    const state = {
      current: new Date(),
      eventsByDate: {}
    };

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function dateKey(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function formatMonth(date) {
      return `${date.getFullYear()}年 ${pad(date.getMonth() + 1)}月`;
    }

    async function loadMonth() {
      const year = state.current.getFullYear();
      const month = state.current.getMonth() + 1;
      document.getElementById("monthTitle").textContent = formatMonth(state.current);
      document.getElementById("status").textContent = "讀取中...";
      document.getElementById("calendar").innerHTML = "";

      try {
        const url = `${GAS_URL}?action=getCalendarMonthEvents&year=${year}&month=${month}&t=${Date.now()}`;
        const res = await fetch(url).then(r => r.json());
        if (!res.success) throw new Error(res.error || "讀取失敗");
        state.eventsByDate = (res.events || []).reduce((acc, item) => {
          if (!acc[item.date]) acc[item.date] = [];
          acc[item.date].push(item);
          return acc;
        }, {});
        renderCalendar();
        document.getElementById("status").textContent = "";
      } catch (err) {
        document.getElementById("status").textContent = `無法讀取行事曆：${err.message || err}`;
      }
    }

    function renderCalendar() {
      const grid = document.getElementById("calendar");
      const year = state.current.getFullYear();
      const month = state.current.getMonth();
      const first = new Date(year, month, 1);
      const mondayOffset = (first.getDay() + 6) % 7;
      const start = new Date(year, month, 1 - mondayOffset);
      const today = dateKey(new Date());
      const cells = [];

      for (let i = 0; i < 42; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const key = dateKey(d);
        const events = state.eventsByDate[key] || [];
        const inMonth = d.getMonth() === month;
        cells.push(`
          <div class="day ${inMonth ? "" : "muted"} ${key === today ? "today" : ""}" onclick="openDay('${key}')">
            <div class="date-row">
              <span class="date-num">${d.getDate()}</span>
              ${events.length ? `<span class="count">${events.length}筆</span>` : ""}
            </div>
            ${events.map(ev => `<span class="event" title="${escapeHtml(ev.title)}">${escapeHtml(ev.title)}</span>`).join("")}
          </div>
        `);
      }
      grid.innerHTML = cells.join("");
    }

    function openDay(key) {
      const events = state.eventsByDate[key] || [];
      if (!events.length) return;
      document.getElementById("dialogTitle").textContent = `${key}｜${events.length} 筆`;
      document.getElementById("dialogBody").innerHTML = events.map(ev => `
        <div class="modal-event">
          <div class="modal-time">${escapeHtml(ev.time || "")}</div>
          <div>${escapeHtml(ev.title || "")}</div>
        </div>
      `).join("");
      document.getElementById("dayDialog").showModal();
    }

    function closeDialog() {
      document.getElementById("dayDialog").close();
    }

    function moveMonth(delta) {
      state.current = new Date(state.current.getFullYear(), state.current.getMonth() + delta, 1);
      loadMonth();
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, s => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[s]));
    }

    state.current = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    loadMonth();
  </script>
</body>
</html>
