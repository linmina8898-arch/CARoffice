<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AS 快速報價</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --primary: #553f62;
      --soft: #f5f1f7;
      --pink: #f07cad;
      --ink: #1f2937;
    }
    body { background: #f4f5f7; color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .focus-ring:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(85, 63, 98, .14); }
    .field { width: 100%; border: 1px solid #d9d6df; border-radius: 10px; padding: 10px 11px; background: #fff; font-size: 15px; }
    .label { display: block; font-size: 12px; color: #7a6a82; margin-bottom: 5px; }
    .card { background: #fff; border: 1px solid #e6e2ea; border-radius: 16px; box-shadow: 0 10px 24px rgba(31, 41, 55, .06); }
    .money-row { display: flex; justify-content: space-between; gap: 14px; padding: 5px 0; font-size: 14px; }
    .money-row.total { border-top: 1px solid #ece8ef; margin-top: 6px; padding-top: 12px; font-size: 18px; font-weight: 700; color: var(--primary); }
    .bottom-bar { position: sticky; bottom: 0; z-index: 20; padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); background: rgba(244, 245, 247, .96); backdrop-filter: blur(10px); border-top: 1px solid #e5e7eb; }
  </style>
</head>
<body>
  <main class="max-w-md mx-auto min-h-screen pb-24">
    <header class="px-5 pt-5 pb-3 bg-white border-b border-gray-200">
      <div class="flex items-end justify-between gap-3">
        <div>
          <div class="text-2xl font-bold tracking-wide text-[#553f62]">AS 快速報價</div>
          <div class="text-xs text-gray-500 mt-1">客服手機快速試算，複製文字貼給客人</div>
        </div>
        <div class="text-[11px] text-gray-400" id="versionText"></div>
      </div>
    </header>

    <section class="p-4 space-y-4">
      <div class="card p-4 space-y-3">
        <div class="flex items-center justify-between">
          <h2 class="text-base font-semibold text-[#553f62]">報價條件</h2>
          <button id="btnReload" class="text-xs px-3 py-1.5 rounded-full border border-[#553f62]/30 text-[#553f62]">更新資料</button>
        </div>

        <div>
          <label class="label">客服 / 備註用</label>
          <input id="staffName" class="field focus-ring" placeholder="例如：星星">
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label">行程</label>
            <select id="serviceType" class="field focus-ring">
              <option value="送機">送機</option>
              <option value="接機">接機</option>
            </select>
          </div>
          <div>
            <label class="label">機場</label>
            <select id="airport" class="field focus-ring"></select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label">日期</label>
            <input id="rideDate" type="date" class="field focus-ring">
          </div>
          <div>
            <label class="label">時間</label>
            <input id="rideTime" type="time" class="field focus-ring" value="09:00">
          </div>
        </div>

        <div>
          <label class="label">主要地區</label>
          <input id="mainZone" list="zoneList" class="field focus-ring" placeholder="輸入或選擇，例如 300 新竹市東區">
          <datalist id="zoneList"></datalist>
        </div>

        <div>
          <label class="label">提供給客人的地址文字</label>
          <input id="mainAddress" class="field focus-ring" placeholder="例如：新竹市東區關新路">
        </div>

        <div>
          <label class="label">車型</label>
          <select id="carType" class="field focus-ring">
            <option value="小車">小車</option>
            <option value="大車">大車</option>
            <option value="進口商務車(SIENNA/BENZ V)">進口商務車</option>
            <option value="New Alphard 40">New Alphard 40</option>
          </select>
        </div>

        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="label">大人</label>
            <select id="adult" class="field focus-ring"></select>
          </div>
          <div>
            <label class="label">兒童</label>
            <select id="child" class="field focus-ring"></select>
          </div>
          <div>
            <label class="label">幼童</label>
            <select id="infant" class="field focus-ring"></select>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="label">大行李</label>
            <select id="checkedLuggage" class="field focus-ring"></select>
          </div>
          <div>
            <label class="label">登機箱</label>
            <select id="carryLuggage" class="field focus-ring"></select>
          </div>
          <div>
            <label class="label">座椅</label>
            <select id="seatCount" class="field focus-ring"></select>
          </div>
        </div>
      </div>

      <div class="card p-4 space-y-3">
        <div class="flex items-center justify-between">
          <h2 class="text-base font-semibold text-[#553f62]">加價與來回</h2>
          <label class="flex items-center gap-2 text-sm text-[#553f62]">
            <input id="hasReturn" type="checkbox" class="accent-[#553f62]">
            同時報價來回
          </label>
        </div>

        <label class="flex items-center gap-2 text-sm text-gray-700">
          <input id="signboard" type="checkbox" class="accent-[#553f62]">
          舉牌服務
        </label>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label">加點地區</label>
            <input id="extraZone" list="zoneList" class="field focus-ring" placeholder="沒有可留空">
          </div>
          <div>
            <label class="label">加點費用</label>
            <input id="extraStopFee" type="number" inputmode="numeric" min="0" step="100" class="field focus-ring" placeholder="0">
          </div>
        </div>
        <input id="extraAddress" class="field focus-ring" placeholder="加點地址文字，沒有可留空">

        <div id="returnBlock" class="hidden border-t border-gray-100 pt-3 space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="label">回程行程</label>
              <select id="returnServiceType" class="field focus-ring">
                <option value="接機">接機</option>
                <option value="送機">送機</option>
              </select>
            </div>
            <div>
              <label class="label">回程時間</label>
              <input id="returnTime" type="time" class="field focus-ring" value="18:00">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="label">回程日期</label>
              <input id="returnDate" type="date" class="field focus-ring">
            </div>
            <div>
              <label class="label">回程地區</label>
              <input id="returnZone" list="zoneList" class="field focus-ring">
            </div>
          </div>
          <input id="returnAddress" class="field focus-ring" placeholder="回程地址文字">
        </div>
      </div>

      <div class="card p-4">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-base font-semibold text-[#553f62]">費用明細</h2>
          <button id="btnQuote" class="text-sm bg-[#553f62] text-white px-4 py-2 rounded-xl">取得報價</button>
        </div>
        <div id="feeList" class="text-gray-600 text-sm leading-relaxed">
          請先選擇地區後按「取得報價」。
        </div>
      </div>

      <div class="card p-4 bg-[#f8f5fa]">
        <h2 class="text-sm font-semibold text-[#553f62] mb-2">將提供給客人的文字</h2>
        <textarea id="quoteText" class="w-full min-h-[230px] bg-white border border-[#e6e2ea] rounded-xl p-3 text-sm leading-relaxed focus-ring" readonly></textarea>
      </div>
    </section>
  </main>

  <div class="bottom-bar">
    <div class="max-w-md mx-auto flex items-center gap-3">
      <div class="flex-1">
        <div class="text-xs text-gray-500">預估總額</div>
        <div id="totalText" class="text-2xl font-bold text-[#553f62]">$0</div>
      </div>
      <button id="btnCopy" class="bg-[#f07cad] text-white px-5 py-3 rounded-xl font-semibold shadow-sm disabled:opacity-50" disabled>複製報價</button>
    </div>
  </div>

  <script>
    const APP_VERSION = "quote-v1.0.2";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzMLYBvdbo4mkkEUVFcjST44oh7VUXhx7gZjWejm2R8XX549ITaReot0pRAN3mbwA8n/exec";
    const BOOKING_URL = location.href.includes("quote.html") ? location.href.replace("quote.html", "index.html") : "index.html";
    let priceRows = [];
    let lastQuote = null;

    const $ = (id) => document.getElementById(id);
    const money = (n, plus) => {
      const value = Number(n || 0);
      if (value < 0) return "-$" + Math.abs(value).toLocaleString("en-US");
      return (plus ? "+$" : "$") + value.toLocaleString("en-US");
    };
    const clean = (v) => String(v || "").trim();

    function fillNumberSelect(id, max, min = 0) {
      const el = $(id);
      el.innerHTML = "";
      for (let i = min; i <= max; i++) {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = String(i);
        el.appendChild(opt);
      }
    }

    async function loadPrices() {
      $("feeList").innerHTML = "報價資料載入中...";
      try {
        const res = await fetch(`${GAS_URL}?action=getPrices&t=${Date.now()}`);
        const data = await res.json();
        priceRows = data.prices || [];
        renderPriceOptions();
        $("feeList").innerHTML = "請先選擇地區後按「取得報價」。";
      } catch (err) {
        $("feeList").innerHTML = "報價資料載入失敗，請稍後再試。";
        Swal.fire("資料庫連線異常", "目前無法讀取報價資料庫。", "warning");
      }
    }

    function renderPriceOptions() {
      const airports = [...new Set(priceRows.map(r => clean(r.a)).filter(Boolean))];
      $("airport").innerHTML = airports.map(a => `<option value="${a}">${a}</option>`).join("") || `<option value="桃園機場">桃園機場</option>`;
      const zones = [...new Map(priceRows.map(r => [`${clean(r.b)} ${clean(r.c)}`.trim(), `${clean(r.b)} ${clean(r.c)}`.trim()])).values()].filter(Boolean);
      $("zoneList").innerHTML = zones.map(z => `<option value="${z}"></option>`).join("");
      if (!$("mainZone").value && zones.length) $("mainZone").value = zones[0];
      if (!$("returnZone").value && zones.length) $("returnZone").value = zones[0];
    }

    function buildPayload() {
      const paxText = `${$("adult").value}大 ${$("child").value}中 ${$("infant").value}小`;
      const luggageText = `${$("checkedLuggage").value}大 ${$("carryLuggage").value}登機`;
      return {
        channelCode: "AS",
        staffName: clean($("staffName").value),
        serviceType: $("serviceType").value,
        airport: $("airport").value,
        rideDate: $("rideDate").value,
        rideTime: $("rideTime").value,
        mainZone: clean($("mainZone").value),
        mainAddress: clean($("mainAddress").value),
        extraZone: clean($("extraZone").value),
        extraAddress: clean($("extraAddress").value),
        extraStopFee: Number($("extraStopFee").value || 0),
        carType: $("carType").value,
        paxText,
        luggageText,
        seatCount: Number($("seatCount").value || 0),
        signboard: $("signboard").checked,
        hasReturn: $("hasReturn").checked,
        returnServiceType: $("returnServiceType").value,
        returnAirport: $("airport").value,
        returnDate: $("returnDate").value,
        returnTime: $("returnTime").value,
        returnZone: clean($("returnZone").value),
        returnAddress: clean($("returnAddress").value),
        appVersion: APP_VERSION
      };
    }

    function routeLine(type, airport, addressOrZone) {
      const place = clean(addressOrZone) || "接送地區";
      return type === "接機" ? `${airport} → ${place}` : `${place} → ${airport}`;
    }

    function formatQuoteDate(value) {
      if (!value) return "";
      const date = new Date(`${value}T00:00:00+08:00`);
      const normalized = String(value).replace(/-/g, "/");
      if (isNaN(date.getTime())) return normalized;
      const weeks = ["日", "一", "二", "三", "四", "五", "六"];
      return `${normalized} (${weeks[date.getDay()]})`;
    }

    function formatQuoteMoney(value, plus) {
      const n = Number(value || 0);
      if (n < 0) return `-NT$${Math.abs(n).toLocaleString("en-US")}`;
      return `${plus ? "+" : ""}NT$${n.toLocaleString("en-US")}`;
    }

    function buildQuoteFeeLines(items) {
      return (items || [])
        .filter(item => !item.isTotal && !String(item.label || "").includes("小計"))
        .map(item => {
          if (item.note) return `${item.label}｜${item.note}`;
          return `${item.label}｜${formatQuoteMoney(item.amount, item.isExtra)}`;
        });
    }

    function buildQuoteText(payload, result) {
      const lines = [];
      const divider = "━━━━━";
      lines.push("您好，感謝您諮詢安興專車接送。");
      lines.push("以下為您的行程參考報價：");
      lines.push("");
      lines.push("");
      lines.push("安興專車接送｜參考報價");
      lines.push(divider);
      lines.push("");
      lines.push("【行程資訊】");
      lines.push(`▪︎ 行程：${payload.serviceType}服務`);
      lines.push(`▪︎ 路線：${routeLine(payload.serviceType, payload.airport, payload.mainAddress || payload.mainZone)}`);
      if (payload.rideDate) lines.push(`▪︎ 日期：${formatQuoteDate(payload.rideDate)}`);
      if (payload.rideTime) lines.push(`▪︎ 時間：${payload.rideTime}`);
      lines.push(`▪︎ 車型：${payload.carType.replace("(SIENNA/BENZ V)", "")}`);
      lines.push(`▪︎ 人數：${payload.paxText}`);
      lines.push(`▪︎ 行李：${payload.luggageText}`);
      if (payload.extraAddress || payload.extraZone) lines.push(`▪︎ 加點：${payload.extraAddress || payload.extraZone}`);
      if (payload.hasReturn) {
        lines.push("");
        lines.push("【回程資訊】");
        lines.push(`▪︎ 行程：${payload.returnServiceType}服務`);
        lines.push(`▪︎ 路線：${routeLine(payload.returnServiceType, payload.airport, payload.returnAddress || payload.returnZone)}`);
        if (payload.returnDate) lines.push(`▪︎ 日期：${formatQuoteDate(payload.returnDate)}`);
        if (payload.returnTime) lines.push(`▪︎ 時間：${payload.returnTime}`);
      }
      lines.push("");
      lines.push(divider);
      lines.push("【費用明細】");
      lines.push("");
      buildQuoteFeeLines(result.items).forEach(line => {
        lines.push(line);
        lines.push("");
      });
      lines.push(`預估總額｜NT$${Number(result.total || 0).toLocaleString("en-US")}`);
      lines.push(divider);
      lines.push("");
      lines.push("");
      lines.push("📍以上為依據目前提供資訊試算之參考報價。");
      lines.push("實際費用仍將依完整上下車地址、是否加點、行李數量及實際安排車型後確認。");
      lines.push("");
      lines.push("");
      lines.push("📍本公司採預約保留制，完成預約後將為您安排車輛與司機。");
      lines.push("");
      lines.push("");
      lines.push("");
      lines.push("若此報價符合您的需求，歡迎透過官方 LINE 完成正式預約。");
      lines.push("首次透過系統預約，另享折扣碼優惠。");
      lines.push("");
      lines.push("官方 LINE 預約：");
      lines.push("https://page.line.me/ansing");
      lines.push("");
      lines.push("期待為您提供安全、舒適、準時的接送服務。");
      lines.push("");
      lines.push("安興專車接送｜深耕新竹・服務全台");
      lines.push("— 合法營運｜專業接送｜安心抵達 —");
      return lines.join("\n");
    }

    function renderQuote(payload, result) {
      lastQuote = { payload, result };
      const rows = (result.items || []).map(item => {
        if (item.note) return `<div class="money-row"><span>${item.label}</span><span>${item.note}</span></div>`;
        return `<div class="money-row ${item.isTotal ? "total" : ""}"><span>${item.label}</span><span>${money(item.amount, item.isExtra)}</span></div>`;
      }).join("");
      $("feeList").innerHTML = rows;
      $("totalText").textContent = `$${Number(result.total || 0).toLocaleString("en-US")}`;
      $("quoteText").value = buildQuoteText(payload, result);
      $("btnCopy").disabled = false;
    }

    async function getQuote() {
      const payload = buildPayload();
      if (!payload.mainZone) return Swal.fire("請選擇主要地區", "快速報價需要先選擇地區，才抓得到資料庫價格。", "info");
      $("btnQuote").disabled = true;
      $("btnQuote").textContent = "試算中...";
      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "quickQuote", data: payload })
        }).then(r => r.json());
        if (!res.success) throw new Error(res.error || "無法取得報價");
        renderQuote(payload, res);
      } catch (err) {
        Swal.fire("報價失敗", err.message || "請稍後再試。", "error");
      } finally {
        $("btnQuote").disabled = false;
        $("btnQuote").textContent = "取得報價";
      }
    }

    async function copyQuote() {
      if (!lastQuote) return;
      const text = $("quoteText").value;
      try {
        await navigator.clipboard.writeText(text);
      } catch (err) {
        $("quoteText").select();
        document.execCommand("copy");
      }
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "saveQuickQuote",
          data: { ...lastQuote.payload, result: lastQuote.result, quoteText: text, appVersion: APP_VERSION }
        })
      }).catch(() => {});
      Swal.fire({ title: "已複製", text: "可以直接貼到 LINE、IG、Messenger 或簡訊給客人。", icon: "success", timer: 1400, showConfirmButton: false });
    }

    function init() {
      $("versionText").textContent = APP_VERSION;
      fillNumberSelect("adult", 7, 1);
      fillNumberSelect("child", 3, 0);
      fillNumberSelect("infant", 2, 0);
      fillNumberSelect("checkedLuggage", 7, 0);
      fillNumberSelect("carryLuggage", 4, 0);
      fillNumberSelect("seatCount", 4, 0);
      const today = new Date();
      const tomorrow = new Date(today.getTime() + 24 * 60 * 60 * 1000);
      $("rideDate").value = tomorrow.toISOString().slice(0, 10);
      $("returnDate").value = tomorrow.toISOString().slice(0, 10);
      $("hasReturn").addEventListener("change", () => $("returnBlock").classList.toggle("hidden", !$("hasReturn").checked));
      $("serviceType").addEventListener("change", () => {
        $("returnServiceType").value = $("serviceType").value === "送機" ? "接機" : "送機";
      });
      $("btnQuote").addEventListener("click", getQuote);
      $("btnCopy").addEventListener("click", copyQuote);
      $("btnReload").addEventListener("click", loadPrices);
      loadPrices();
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
