<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客服快速代填預約</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --primary: #553f62;
      --accent: #f07cad;
      --soft: #f8f3f7;
      --line: #e7dde8;
      --text: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f6f4f7;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      letter-spacing: 0;
    }
    .shell {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 18px 14px 96px;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246, 244, 247, .94);
      backdrop-filter: blur(10px);
      padding: 12px 0;
      border-bottom: 1px solid rgba(231, 221, 232, .8);
    }
    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(31, 41, 55, .06);
      padding: 16px;
      margin-top: 14px;
    }
    .section-title {
      color: var(--primary);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid #d8cddd;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 82px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(85, 63, 98, .12);
    }
    .grid-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .mini-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .time-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .full { grid-column: 1 / -1; }
    .hint {
      font-size: 12px;
      color: #8a7b92;
      line-height: 1.6;
      margin-top: 6px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--primary);
      background: var(--soft);
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .pill input { width: auto; min-height: auto; margin-right: 6px; accent-color: var(--primary); }
    .last-message-panel {
      display: none;
      margin-top: 14px;
      border: 1px solid #e7dde8;
      border-radius: 14px;
      background: #fff;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(31, 41, 55, .06);
    }
    .last-message-panel.show { display: block; }
    .last-message-panel textarea {
      width: 100%;
      min-height: 160px;
      border: 1px solid #e7dde8;
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 8px;
    }
    .last-message-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .submitbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      background: rgba(255, 255, 255, .96);
      border-top: 1px solid var(--line);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 24px rgba(31, 41, 55, .08);
    }
    .submit-inner {
      width: min(100%, 920px);
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .primary-btn {
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      min-height: 46px;
      padding: 0 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .secondary-btn {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--primary);
      min-height: 44px;
      padding: 0 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .summary {
      color: var(--primary);
      font-size: 13px;
      line-height: 1.5;
    }
    .hidden { display: none !important; }
    @media (max-width: 640px) {
      .shell { padding-left: 10px; padding-right: 10px; }
      .grid-form { grid-template-columns: 1fr; gap: 10px; }
      .panel { border-radius: 14px; padding: 14px; }
      .submit-inner { align-items: stretch; flex-direction: column; }
      .primary-btn, .secondary-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="flex items-center justify-between gap-3">
        <div>
          <h1 class="text-[22px] font-bold text-[#553f62] m-0">客服快速代填預約</h1>
          <p class="text-sm text-gray-500 mt-1">固定客、客服代填、手動車資，不套折扣。</p>
          <p class="text-[11px] text-gray-400 mt-1">版本：<span id="versionDisplay">載入中</span></p>
        </div>
        <button class="secondary-btn !min-h-[38px]" type="button" onclick="resetForm()">清空</button>
      </div>
    </div>

    <form id="manualForm">
      <section class="panel">
        <div class="section-title">來源與固定客戶</div>
    <div class="grid-form">
          <div>
            <label for="source">來源</label>
            <select id="source" name="source">
              <option value="AS">AS</option>
              <option value="AZ">AZ</option>
              <option value="123">123</option>
              <option value="W">W</option>
              <option value="ANNA">ANNA</option>
              <option value="遠貿">遠貿</option>
              <option value="大台灣">大台灣</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div id="customSourceWrap" class="hidden">
            <label for="customSource">自訂來源</label>
            <input id="customSource" name="customSource" placeholder="例如：某公司、某店家">
          </div>
          <div class="full">
            <label for="templateSelect">固定客戶範本</label>
            <input id="templateSearch" type="search" placeholder="搜尋姓名、電話、來源或客戶代碼，例如：陳" class="mb-2">
            <select id="templateSelect">
              <option value="">手動填寫，或選擇固定客戶</option>
            </select>
            <div id="templateHint" class="hint">讀取固定客戶中...</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">本次行程</div>
        <div class="grid-form">
          <div>
            <label for="serviceType">行程</label>
            <select id="serviceType" name="serviceType" required>
              <option value="送機">送機</option>
              <option value="接機">接機</option>
            </select>
          </div>
          <div>
            <label for="airport">機場</label>
            <select id="airport" name="airport" required>
              <option value="桃園機場">桃園機場</option>
              <option value="松山機場">松山機場</option>
              <option value="台中機場">台中機場</option>
            </select>
          </div>
          <div>
            <label for="rideDate">日期</label>
            <input id="rideDate" name="rideDate" type="date" required>
          </div>
          <div>
            <label>時間</label>
            <div class="time-pair">
              <select id="rideHour" aria-label="去程小時"></select>
              <select id="rideMinute" aria-label="去程分鐘"></select>
            </div>
          </div>
          <div>
            <label for="flightNumber">航班編號</label>
            <input id="flightNumber" name="flightNumber" placeholder="例如 BR7、CI11" style="text-transform: uppercase;">
          </div>
          <div>
            <label for="fare">車資金額</label>
            <input id="fare" name="fare" type="number" inputmode="numeric" min="0" required placeholder="由客服手動輸入">
          </div>
          <div class="full">
            <label for="address">接送地址</label>
            <input id="address" name="address" required placeholder="完整地址">
          </div>
          <div class="full">
            <label for="extraLocation">加點</label>
            <input id="extraLocation" name="extraLocation" placeholder="沒有請留空">
          </div>
          <div class="full">
            <label class="pill">
              <input id="hasReturn" type="checkbox">
              同時預約回程
            </label>
          </div>
        </div>

        <div id="returnPanel" class="mt-4 pt-4 border-t border-[#e7dde8] hidden">
          <div class="section-title !text-[15px]">回程資料</div>
          <div class="grid-form">
            <div>
              <label for="returnServiceType">回程行程</label>
              <select id="returnServiceType" name="returnServiceType">
                <option value="送機">送機</option>
                <option value="接機">接機</option>
              </select>
            </div>
            <div>
              <label for="returnFare">回程車資</label>
              <input id="returnFare" name="returnFare" type="number" inputmode="numeric" min="0" placeholder="不填則同去程金額">
            </div>
            <div>
              <label for="returnDate">回程日期</label>
              <input id="returnDate" name="returnDate" type="date">
            </div>
            <div>
              <label>回程時間</label>
              <div class="time-pair">
                <select id="returnHour" aria-label="回程小時"></select>
                <select id="returnMinute" aria-label="回程分鐘"></select>
              </div>
            </div>
            <div class="full">
              <label for="returnFlightNumber">回程航班</label>
              <input id="returnFlightNumber" name="returnFlightNumber" placeholder="例如 BR7、CI11" style="text-transform: uppercase;">
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">乘客與服務內容</div>
        <div class="grid-form">
          <div>
            <label for="customerName">乘客姓名</label>
            <input id="customerName" name="customerName" required placeholder="例如 陳小姐">
          </div>
          <div>
            <label for="customerTitle">稱謂</label>
            <select id="customerTitle" name="customerTitle">
              <option value="先生">先生</option>
              <option value="小姐">小姐</option>
              <option value="">不顯示</option>
            </select>
          </div>
          <div>
            <label for="phone">電話</label>
            <input id="phone" name="phone" type="tel" inputmode="tel" required placeholder="09xx-xxx-xxx">
          </div>
          <div>
            <label for="carType">車型</label>
            <select id="carType" name="carType" required>
              <option value="小車">小車</option>
              <option value="大車">大車</option>
              <option value="進口商務車">進口商務車</option>
            </select>
          </div>
          <div>
            <label for="paymentMethod">付款方式</label>
            <select id="paymentMethod" name="paymentMethod" required>
              <option value="現金">現金</option>
              <option value="轉帳">轉帳</option>
              <option value="月結簽單">月結簽單</option>
              <option value="簽單+收現">簽單+收現</option>
              <option value="轉帳+收現">轉帳+收現</option>
            </select>
          </div>
          <div class="full">
            <label>人數</label>
            <div class="mini-grid">
              <select id="adultCount" aria-label="成人">
                <option value="1">1大</option><option value="2">2大</option><option value="3">3大</option><option value="4">4大</option><option value="5">5大</option><option value="6">6大</option><option value="7">7大</option><option value="8">8大</option>
              </select>
              <select id="childCount" aria-label="兒童">
                <option value="0">0中</option><option value="1">1中</option><option value="2">2中</option><option value="3">3中</option><option value="4">4中</option><option value="5">5中</option><option value="6">6中</option><option value="7">7中</option><option value="8">8中</option>
              </select>
              <select id="infantCount" aria-label="幼兒">
                <option value="0">0小</option><option value="1">1小</option><option value="2">2小</option><option value="3">3小</option><option value="4">4小</option><option value="5">5小</option><option value="6">6小</option><option value="7">7小</option><option value="8">8小</option>
              </select>
            </div>
          </div>
          <div class="full">
            <label>行李</label>
            <div class="mini-grid two">
              <select id="checkedLuggageCount" aria-label="大型行李">
                <option value="0">0大</option><option value="1">1大</option><option value="2">2大</option><option value="3">3大</option><option value="4">4大</option><option value="5">5大</option><option value="6">6大</option><option value="7">7大</option><option value="8">8大</option>
              </select>
              <select id="carryLuggageCount" aria-label="登機箱">
                <option value="0">0登機</option><option value="1">1登機</option><option value="2">2登機</option><option value="3">3登機</option><option value="4">4登機</option><option value="5">5登機</option><option value="6">6登機</option><option value="7">7登機</option><option value="8">8登機</option>
              </select>
            </div>
          </div>
          <div>
            <label for="seatDetails">座椅</label>
            <input id="seatDetails" name="seatDetails" value="無">
          </div>
          <div>
            <label for="signboard">舉牌</label>
            <input id="signboard" name="signboard" list="signboardOptions" value="無" placeholder="無 / 需要 / 舉牌內容">
            <datalist id="signboardOptions">
              <option value="無"></option>
              <option value="需要"></option>
            </datalist>
          </div>
          <div class="full">
            <label for="remarks">備註需求</label>
            <textarea id="remarks" name="remarks" placeholder="例如 無煙車、需收據、客人特殊需求"></textarea>
          </div>
        </div>
      </section>
      <section id="lastMessagePanel" class="last-message-panel">
        <div class="section-title" style="margin-bottom:4px;">最近建立的預約文字</div>
        <div style="font-size:12px;color:#6b7280;">關掉彈出視窗後，可在這裡重新開啟或複製，不會重複建立預約。</div>
        <textarea id="lastCustomerMessage" readonly></textarea>
        <div class="last-message-actions">
          <button class="secondary-btn" type="button" onclick="openLastCustomerMessage()">重新開啟</button>
          <button class="primary-btn" type="button" onclick="copyLastCustomerMessage()">複製文字</button>
        </div>
      </section>
      <section class="panel">
        <div class="section-title">用預約編號產生通知文字</div>
        <div class="hint">輸入完整單號或主單號，可重新產生同格式的客服回覆文字。</div>
        <div class="grid-form">
          <div class="full">
            <label for="lookupReservationId">預約編號</label>
            <input id="lookupReservationId" placeholder="例如 NA-20260616yrX3 或 NA-20260616yrX3-去程">
          </div>
        </div>
        <div class="last-message-actions">
          <button class="secondary-btn" type="button" onclick="clearLookupReservationId()">清空</button>
          <button class="primary-btn" type="button" onclick="generateMessageByReservationId()">產生文字</button>
        </div>
      </section>
    </form>
  </div>

  <div class="submitbar">
    <div class="submit-inner">
      <div class="summary" id="summaryText">未建立預約</div>
      <button id="submitBtn" class="primary-btn" type="button" onclick="submitManualBooking()">送出建立預約</button>
    </div>
  </div>

  <script>
    const APP_VERSION = "manual-booking-v1.0.24";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyHkLho-EhceBtJCSd0Vz5e1NtSDILWH08nD_8jJoJzd4c7unaXiI6q_A0ETgpuYG5x/exec";
    let templates = [];

    const $ = id => document.getElementById(id);
    const money = v => Number(String(v || "").replace(/[^\d.-]/g, "")) || 0;
    let lastCustomerMessage = "";

    document.addEventListener("DOMContentLoaded", () => {
      $("versionDisplay").textContent = APP_VERSION;
      initTimeSelects();
      $("source").addEventListener("change", handleSourceChange);
      $("hasReturn").addEventListener("change", handleReturnToggle);
      $("serviceType").addEventListener("change", syncReturnType);
      $("templateSelect").addEventListener("change", applyTemplate);
      $("templateSearch").addEventListener("input", renderTemplateOptions);
      ["flightNumber", "returnFlightNumber"].forEach(id => $(id).addEventListener("input", forceUppercase));
      $("phone").addEventListener("input", formatPhoneInput);
      ["source", "customSource", "serviceType", "rideDate", "rideHour", "rideMinute", "fare", "hasReturn", "returnHour", "returnMinute", "returnFare"].forEach(id => {
        const el = $(id);
        if (el) el.addEventListener("input", updateSummary);
        if (el) el.addEventListener("change", updateSummary);
      });
      loadTemplates();
      updateSummary();
    });

    async function loadTemplates() {
      try {
        const data = await fetch(`${GAS_URL}?action=getManualBookingTemplates&t=${Date.now()}`).then(r => r.json());
        let setupCreated = false;
        if (data && data.success && data.sheetExists === false) {
          const setup = await fetch(`${GAS_URL}?action=setupManualCustomerSheet&t=${Date.now()}`).then(r => r.json());
          if (setup.success) {
            setupCreated = true;
            data.suggestedHeaders = setup.headers || data.suggestedHeaders;
          }
        }
        templates = data.templates || [];
        renderSourceOptions(templates);
        renderTemplateOptions();
        $("templateHint").textContent = setupCreated
          ? `已建立「固定客戶」工作表與表頭，可先手動填寫或到 Google Sheet 新增範本。`
          : templates.length
          ? `已載入 ${templates.length} 筆固定客戶範本。`
          : `尚未建立固定客戶範本，可先手動填寫。建議欄位：${(data.suggestedHeaders || []).join("、")}`;
      } catch (err) {
        $("templateHint").textContent = "固定客戶範本讀取失敗，可先手動填寫。";
      }
    }

    function applyTemplate() {
      const idx = $("templateSelect").value;
      if (idx === "") return;
      const t = templates[Number(idx)] || {};
      const known = knownSources();
      setValue("source", known.includes(t.source) ? t.source : (t.source ? "其他" : $("source").value));
      setValue("customSource", known.includes(t.source) ? "" : t.source);
      handleSourceChange();
      setValue("serviceType", normalizeServiceType(t.serviceType) || "送機");
      setValue("airport", t.airport || "桃園機場");
      setValue("address", t.address);
      setValue("extraLocation", t.extraLocation);
      setValue("customerName", t.name);
      setValue("phone", formatPhoneNumber(t.phone));
      setValue("carType", t.carType || "小車");
      setPaxFieldsFromText(t.paxCount || "1大 0中 0小");
      setLuggageFieldsFromText(t.luggageCount || "0大 0登機");
      setValue("seatDetails", t.seatDetails || "無");
      setValue("signboard", t.signboard || "無");
      setValue("paymentMethod", t.paymentMethod || "現金");
      setValue("fare", money(t.fare) || "");
      setValue("remarks", t.remarks);
      syncReturnType();
      updateSummary();
    }

    function renderTemplateOptions() {
      const keyword = ($("templateSearch")?.value || "").trim().toLowerCase();
      const matched = templates
        .map((tpl, idx) => ({ tpl, idx }))
        .filter(item => {
          if (!keyword) return true;
          const haystack = [item.tpl.source, item.tpl.code, item.tpl.name, item.tpl.phone, item.tpl.address, item.tpl.remarks]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();
          return haystack.includes(keyword);
        });
      $("templateSelect").innerHTML = '<option value="">手動填寫，或選擇固定客戶</option>' + matched.map(({ tpl, idx }) => {
        const label = [tpl.source, tpl.code, tpl.name, tpl.phone].filter(Boolean).join(" / ");
        return `<option value="${idx}">${escapeHtml(label)}</option>`;
      }).join("");
      $("templateHint").textContent = keyword
        ? `符合「${$("templateSearch").value}」的固定客戶：${matched.length} 筆`
        : templates.length
        ? `已載入 ${templates.length} 筆固定客戶範本。`
        : $("templateHint").textContent;
    }

    function initTimeSelects() {
      const hourOptions = Array.from({ length: 24 }, (_, i) => `<option value="${pad2(i)}">${pad2(i)}</option>`).join("");
      const minuteOptions = Array.from({ length: 12 }, (_, i) => `<option value="${pad2(i * 5)}">${pad2(i * 5)}</option>`).join("");
      ["rideHour", "returnHour"].forEach(id => $(id).innerHTML = hourOptions);
      ["rideMinute", "returnMinute"].forEach(id => $(id).innerHTML = minuteOptions);
      $("rideHour").value = "08";
      $("rideMinute").value = "00";
      $("returnHour").value = "08";
      $("returnMinute").value = "00";
    }

    function handleSourceChange() {
      $("customSourceWrap").classList.toggle("hidden", $("source").value !== "其他");
      updateSummary();
    }

    function forceUppercase(event) {
      const input = event.target;
      const pos = input.selectionStart;
      input.value = input.value.toUpperCase();
      try { input.setSelectionRange(pos, pos); } catch (e) {}
    }

    function formatPhoneNumber(value) {
      const digits = String(value || "").replace(/\D/g, "").slice(0, 10);
      if (digits.length <= 4) return digits;
      if (digits.length <= 7) return `${digits.slice(0, 4)}-${digits.slice(4)}`;
      return `${digits.slice(0, 4)}-${digits.slice(4, 7)}-${digits.slice(7)}`;
    }

    function formatPhoneInput(event) {
      const input = event.target;
      input.value = formatPhoneNumber(input.value);
    }

    function handleReturnToggle() {
      const enabled = $("hasReturn").checked;
      $("returnPanel").classList.toggle("hidden", !enabled);
      $("returnDate").required = enabled;
      syncReturnType();
      updateSummary();
    }

    function syncReturnType() {
      if ($("serviceType").value === "送機") $("returnServiceType").value = "接機";
      else $("returnServiceType").value = "送機";
      updateSummary();
    }

    function currentSource() {
      return $("source").value === "其他" ? $("customSource").value.trim() : $("source").value;
    }

    function collectPayload() {
      return {
        source: currentSource(),
        templateCode: selectedTemplateCode(),
        serviceType: $("serviceType").value,
        airport: $("airport").value,
        rideDate: $("rideDate").value,
        rideTime: buildTime("ride"),
        flightNumber: $("flightNumber").value.trim().toUpperCase(),
        address: $("address").value.trim(),
        extraLocation: $("extraLocation").value.trim(),
        fare: $("fare").value,
        hasReturn: $("hasReturn").checked,
        returnServiceType: $("returnServiceType").value,
        returnDate: $("returnDate").value,
        returnTime: buildTime("return"),
        returnFlightNumber: $("returnFlightNumber").value.trim().toUpperCase(),
        returnFare: $("returnFare").value,
        customerName: $("customerName").value.trim(),
        customerTitle: $("customerTitle").value,
        phone: formatPhoneNumber($("phone").value),
        carType: $("carType").value,
        paymentMethod: $("paymentMethod").value,
        paxCount: buildPaxCount(),
        luggageCount: buildLuggageCount(),
        sportLuggage: "無",
        seatDetails: $("seatDetails").value.trim() || "無",
        signboard: $("signboard").value,
        remarks: $("remarks").value.trim(),
        appVersion: APP_VERSION
      };
    }

    function selectedTemplateCode() {
      const idx = $("templateSelect").value;
      if (idx === "") return "";
      const t = templates[Number(idx)] || {};
      return t.code || t.name || "";
    }

    function knownSources() {
      return Array.from(new Set(["AS", "AZ", "123", "W", "ANNA", "遠貿", "大台灣", ...templates.map(t => t.source).filter(Boolean)]));
    }

    function renderSourceOptions(items) {
      const current = $("source").value;
      const options = Array.from(new Set(["AS", "AZ", "123", "W", "ANNA", "遠貿", "大台灣", ...(items || []).map(t => t.source).filter(Boolean)]));
      $("source").innerHTML = options.map(source => `<option value="${escapeHtml(source)}">${escapeHtml(source)}</option>`).join("") + '<option value="其他">其他</option>';
      if (options.includes(current) || current === "其他") $("source").value = current;
    }

    function buildPaxCount() {
      return `${$("adultCount").value}大 ${$("childCount").value}中 ${$("infantCount").value}小`;
    }

    function buildLuggageCount() {
      return `${$("checkedLuggageCount").value}大 ${$("carryLuggageCount").value}登機`;
    }

    function buildTime(prefix) {
      return `${$(prefix + "Hour").value}:${$(prefix + "Minute").value}`;
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function setPaxFieldsFromText(value) {
      const text = String(value || "");
      const adult = (text.match(/(\d+)\s*(?:大|成人|人)/) || [])[1] || "1";
      const child = (text.match(/(\d+)\s*(?:中|兒童|小孩)/) || [])[1] || "0";
      const infant = (text.match(/(\d+)\s*(?:小|幼兒|嬰兒)/) || [])[1] || "0";
      setValue("adultCount", clampSelectValue(adult, 1, 8));
      setValue("childCount", clampSelectValue(child, 0, 8));
      setValue("infantCount", clampSelectValue(infant, 0, 8));
    }

    function setLuggageFieldsFromText(value) {
      const text = String(value || "");
      const checked = (text.match(/(\d+)\s*(?:大|大型|托運)/) || [])[1] || "0";
      const carry = (text.match(/(\d+)\s*(?:登機|小|手提)/) || [])[1] || "0";
      setValue("checkedLuggageCount", clampSelectValue(checked, 0, 8));
      setValue("carryLuggageCount", clampSelectValue(carry, 0, 8));
    }

    function clampSelectValue(value, min, max) {
      const n = Math.max(min, Math.min(max, Number(value || 0)));
      return String(n);
    }

    function validatePayload(p) {
      const errors = [];
      if (!p.source) errors.push("來源");
      if (!p.customerName) errors.push("乘客姓名");
      if (!p.phone.replace(/\D/g, "")) errors.push("電話");
      if (!p.rideDate) errors.push("日期");
      if (!p.rideTime) errors.push("時間");
      if (!p.address) errors.push("接送地址");
      if (!money(p.fare)) errors.push("車資金額");
      if (!p.paxCount) errors.push("人數");
      if (!p.luggageCount) errors.push("行李");
      if (p.hasReturn) {
        if (!p.returnDate) errors.push("回程日期");
        if (!p.returnTime) errors.push("回程時間");
      }
      return errors;
    }

    async function submitManualBooking() {
      const payload = collectPayload();
      const errors = validatePayload(payload);
      if (errors.length) {
        Swal.fire("資料未填完整", errors.join("、"), "warning");
        return;
      }
      const confirmText = `${payload.source}｜${payload.rideDate} ${payload.rideTime} ${payload.serviceType}\n${payload.customerName} / ${payload.phone}\n車資 $${money(payload.fare).toLocaleString()}${payload.hasReturn ? `\n回程 $${money(payload.returnFare || payload.fare).toLocaleString()}` : ""}`;
      const ok = await Swal.fire({
        title: "確認建立預約？",
        text: confirmText,
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "建立預約",
        cancelButtonText: "再檢查",
        confirmButtonColor: "#553f62"
      }).then(r => r.isConfirmed);
      if (!ok) return;

      $("submitBtn").disabled = true;
      $("submitBtn").textContent = "建立中...";
      Swal.fire({ title: "正在建立預約單", text: "請勿關閉畫面", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "createManualBooking", data: payload }),
          headers: { "Content-Type": "text/plain;charset=utf-8" }
        }).then(r => r.json());
        if (!res.success) throw new Error(res.error || "建立失敗");
        const ids = (res.reservationIds || []).join("\n");
        const customerText = buildCustomerConfirmMessage(payload);
        saveLastCustomerMessage(customerText);
        await Swal.fire({
          title: "預約已建立",
          html: `<div style="text-align:left;line-height:1.7;font-size:14px;">
            單號：<br><pre style="white-space:pre-wrap;background:#f8f3f7;border-radius:10px;padding:10px;">${escapeHtml(ids)}</pre>
            <div style="color:#6b7280;margin-bottom:10px;">已寫入預約單、原始檔，並同步建立行事曆。</div>
            <label style="display:block;color:#553f62;font-weight:700;margin-bottom:6px;">傳給客人的確認文字</label>
            <textarea id="customerConfirmText" style="width:100%;height:260px;border:1px solid #e7dde8;border-radius:12px;padding:10px;font-size:13px;line-height:1.6;">${escapeHtml(customerText)}</textarea>
          </div>`,
          icon: "success",
          confirmButtonText: "複製文字",
          showCancelButton: true,
          cancelButtonText: "關閉",
          confirmButtonColor: "#553f62",
          preConfirm: async () => {
            const text = document.getElementById("customerConfirmText")?.value || customerText;
            try { await navigator.clipboard.writeText(text); } catch (e) {}
            return true;
          }
        });
        updateSummary(ids || "已建立");
      } catch (err) {
        Swal.fire("建立失敗", err.message || "請稍後再試", "error");
      } finally {
        $("submitBtn").disabled = false;
        $("submitBtn").textContent = "送出建立預約";
      }
    }

    function updateSummary(doneText) {
      if (typeof doneText === "string" && doneText) {
        $("summaryText").textContent = doneText;
        return;
      }
      const total = money($("fare").value) + ($("hasReturn").checked ? money($("returnFare").value || $("fare").value) : 0);
      $("summaryText").textContent = `${currentSource() || "未選來源"}｜${$("serviceType").value || "行程"}｜總車資 $${total.toLocaleString()}`;
    }

    function buildCustomerConfirmMessage(p) {
      const trips = [buildCustomerTripBlock(p, {
        label: "去程",
        serviceType: p.serviceType,
        rideDate: p.rideDate,
        rideTime: p.rideTime,
        flightNumber: p.flightNumber,
        fare: p.fare
      })];
      if (p.hasReturn) {
        trips.push(buildCustomerTripBlock(p, {
          label: "回程",
          serviceType: p.returnServiceType,
          rideDate: p.returnDate,
          rideTime: p.returnTime,
          flightNumber: p.returnFlightNumber,
          fare: p.returnFare || p.fare
        }));
      }
      return [
        "【預約成功通知】親愛的客戶您好，您的接送服務已預約成功。",
        "以下為您的預約明細：",
        "",
        trips.join("\n\n"),
        "",
        "▌ 其他說明────────",
        "．司機資料將於前一日 18:00 發送",
        "．行程異動請於出發前 5 小時告知",
        "．需變更請直接回覆本訊息",
        "",
        "【24小時客服專線】",
        "➤ ᴘʜᴏɴᴇ 電話：0955311306"
      ].join("\n");
    }

    async function generateMessageByReservationId() {
      const input = $("lookupReservationId");
      const reservationId = (input?.value || "").trim();
      if (!reservationId) {
        Swal.fire("請輸入預約編號", "", "warning");
        return;
      }
      Swal.fire({ title: "查詢中", text: "正在讀取預約資料...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const url = `${GAS_URL}?action=getManualBookingTextData&reservationId=${encodeURIComponent(reservationId)}&t=${Date.now()}`;
        const data = await fetch(url).then(r => r.json());
        if (!data.success) throw new Error(data.error || "查無資料");
        const text = buildCustomerConfirmMessageFromOrders(data.orders || []);
        saveLastCustomerMessage(text);
        Swal.close();
        await openLastCustomerMessage();
      } catch (err) {
        Swal.fire("查詢失敗", err.message || "請稍後再試", "error");
      }
    }

    function clearLookupReservationId() {
      $("lookupReservationId").value = "";
    }

    function buildCustomerConfirmMessageFromOrders(orders) {
      const list = (orders || []).filter(Boolean);
      if (!list.length) return "";
      const blocks = list.map((order, index) => buildCustomerTripBlockFromOrder(order, list.length > 1, index));
      return [
        "【預約成功通知】親愛的客戶您好，您的接送服務已預約成功。",
        "以下為您的預約明細：",
        "",
        blocks.join("\n\n"),
        "",
        "▌ 其他說明────────",
        "．司機資料將於前一日 18:00 發送",
        "．行程異動請於出發前 5 小時告知",
        "．需變更請直接回覆本訊息",
        "",
        "【24小時客服專線】",
        "➤ ᴘʜᴏɴᴇ 電話：0955311306"
      ].join("\n");
    }

    function buildCustomerTripBlockFromOrder(order, multipleTrips, index) {
      const service = order.serviceType || "接機";
      const label = order.label || (index === 1 ? "回程" : "去程");
      const title = multipleTrips ? `▌ 預約資訊（${label}）────────` : "▌ 預約資訊────────";
      const dateText = formatCustomerDate(order.rideDate);
      const fareLine = formatCustomerFareWithManualCash(order.paymentMethod, order.fare || order.grandTotal, order.manualCashCollected);
      const remarkText = formatCustomerRemarkText(order.remarks);
      return [
        title,
        `．日期時間：${dateText} ${order.rideTime || ""}`.trim(),
        `．服務項目：${service}`,
        `．航班編號：${order.flightNumber || "無"}`,
        `．接送機場：${order.airport || "無"}`,
        "",
        "▌ 乘客與行程───────",
        `．乘車人員：${order.customerName || "無"}`,
        `．聯絡電話：${order.phone || ""}`,
        `．乘車人數：${formatCustomerPax(order.paxCount)}`,
        `．行李件數：${formatCustomerLuggage(order.luggageCount)}`,
        "．接送地址：",
        `    ${order.address || "無"}`,
        order.extraLocation ? `．加點地址：\n    ${order.extraLocation}` : "",
        "",
        "▌ 車型與費用───────",
        `．乘車車型：${order.carType || "無"}`,
        `．車資總計：${fareLine}`,
        `．特殊備註：${remarkText}`
      ].filter(line => line !== null && line !== undefined).join("\n").replace(/\n{4,}/g, "\n\n\n");
    }

    function buildCustomerTripBlock(p, trip) {
      const service = trip.serviceType || "接機";
      const label = trip.label || "";
      const dateText = formatCustomerDate(trip.rideDate);
      const timeText = trip.rideTime || "";
      const flight = trip.flightNumber || "無";
      const pax = formatCustomerPax(p.paxCount);
      const luggage = formatCustomerLuggage(p.luggageCount);
      const fareLine = formatCustomerFare(p.paymentMethod, trip.fare);
      const remarkText = formatCustomerRemarkText(p.remarks);
      const extraLocation = String(p.extraLocation || "").trim();
      const blockTitle = p.hasReturn && label ? `▌ 預約資訊（${label}）────────` : "▌ 預約資訊────────";
      return [
        blockTitle,
        `．日期時間：${dateText} ${timeText}`,
        `．服務項目：${service}`,
        `．航班編號：${flight}`,
        `．接送機場：${p.airport || "無"}`,
        "",
        "▌ 乘客與行程───────",
        `．乘車人員：${displayCustomerName(p)}`,
        `．聯絡電話：${p.phone || ""}`,
        `．乘車人數：${pax}`,
        `．行李件數：${luggage}`,
        "．接送地址：",
        `    ${p.address || "無"}`,
        extraLocation ? `．加點地址：\n    ${extraLocation}` : "",
        "",
        "▌ 車型與費用───────",
        `．乘車車型：${p.carType || "無"}`,
        `．車資總計：${fareLine}`,
        `．特殊備註：${remarkText}`
      ].filter(line => line !== null && line !== undefined).join("\n").replace(/\n{4,}/g, "\n\n\n");
    }

    function formatCustomerRemarkText(value) {
      const text = String(value || "").replace(/\r\n/g, "\n").trim();
      if (!text) return "無";
      if (/收據/.test(text) && !/需開立收據|需收據/.test(text)) return "需開立收據";
      return text;
    }

    function displayCustomerName(p) {
      const name = String(p.customerName || "").trim();
      const title = String(p.customerTitle || "").trim();
      if (!title || /(?:先生|小姐|女士|太太)$/.test(name)) return name;
      return `${name}${title}`;
    }

    function saveLastCustomerMessage(text) {
      lastCustomerMessage = text || "";
      $("lastCustomerMessage").value = lastCustomerMessage;
      $("lastMessagePanel").classList.toggle("show", Boolean(lastCustomerMessage));
    }

    async function copyLastCustomerMessage() {
      if (!lastCustomerMessage) {
        Swal.fire("目前沒有可複製的文字", "", "info");
        return;
      }
      try { await navigator.clipboard.writeText(lastCustomerMessage); } catch (e) {}
      Swal.fire({ title: "已複製", icon: "success", timer: 900, showConfirmButton: false });
    }

    async function openLastCustomerMessage() {
      if (!lastCustomerMessage) {
        Swal.fire("目前沒有可開啟的文字", "", "info");
        return;
      }
      await Swal.fire({
        title: "最近建立的預約文字",
        html: `<textarea id="customerConfirmText" style="width:100%;height:300px;border:1px solid #e7dde8;border-radius:12px;padding:10px;font-size:13px;line-height:1.6;">${escapeHtml(lastCustomerMessage)}</textarea>`,
        confirmButtonText: "複製文字",
        showCancelButton: true,
        cancelButtonText: "關閉",
        confirmButtonColor: "#553f62",
        preConfirm: async () => {
          const text = document.getElementById("customerConfirmText")?.value || lastCustomerMessage;
          saveLastCustomerMessage(text);
          try { await navigator.clipboard.writeText(text); } catch (e) {}
          return true;
        }
      });
    }

    function formatCustomerSignboard(value) {
      const text = String(value || "").trim();
      if (!text || text === "無" || text === "不需要") return "";
      return text;
    }

    function formatCustomerDate(value) {
      if (!value) return "";
      const parts = String(value).split("-");
      if (parts.length !== 3) return value;
      const dt = new Date(`${value}T00:00:00`);
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      return `${Number(parts[1])}/${Number(parts[2])} (${weekdays[dt.getDay()]})`;
    }

    function formatCustomerPax(value) {
      const text = String(value || "").trim();
      const match = text.match(/(\d+)\s*大(?:\s*(\d+)\s*中)?(?:\s*(\d+)\s*小)?/);
      if (!match) return text || "請確認";
      const parts = [];
      const adult = Number(match[1] || 0);
      const child = Number(match[2] || 0);
      const infant = Number(match[3] || 0);
      if (adult) parts.push(`${adult}大`);
      if (child) parts.push(`${child}中`);
      if (infant) parts.push(`${infant}小`);
      return parts.join(" ") || "0人";
    }

    function formatCustomerLuggage(value) {
      const text = String(value || "").trim();
      const match = text.match(/(\d+)\s*大(?:\s*(\d+)\s*登機)?/);
      if (!match) return text || "無";
      const checked = Number(match[1] || 0);
      const carry = Number(match[2] || 0);
      const parts = [];
      if (checked) parts.push(`${checked}大`);
      if (carry) parts.push(`${carry}登機`);
      return parts.join(" ") || "無";
    }

    function formatCustomerFare(paymentMethod, fare) {
      const amount = `$${money(fare).toLocaleString()} 元`;
      const payment = String(paymentMethod || "");
      if (payment.includes("現金") || payment.includes("收現")) return `${amount} (車上付現)`;
      if (payment.includes("轉帳")) return `${amount} (轉帳)`;
      if (payment.includes("簽單") || payment.includes("月結")) return `${amount} (月結簽單)`;
      return `${amount}${payment ? ` (${payment})` : ""}`;
    }

    function formatCustomerFareWithManualCash(paymentMethod, fare, manualCashCollected) {
      const cash = money(manualCashCollected);
      if (cash > 0) return `$${cash.toLocaleString()} 元 (車上付現)`;
      return formatCustomerFare(paymentMethod, fare);
    }

    function resetForm() {
      $("manualForm").reset();
      $("templateSelect").value = "";
      $("rideHour").value = "08";
      $("rideMinute").value = "00";
      $("returnHour").value = "08";
      $("returnMinute").value = "00";
      setPaxFieldsFromText("1大 0中 0小");
      setLuggageFieldsFromText("0大 0登機");
      setValue("seatDetails", "無");
      handleSourceChange();
      handleReturnToggle();
      updateSummary();
    }

    function setValue(id, value) {
      const el = $(id);
      if (el) el.value = value || "";
    }

    function normalizeServiceType(value) {
      const text = String(value || "");
      if (text.includes("接") || text.includes("回")) return "接機";
      if (text.includes("送")) return "送機";
      return "";
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }
  </script>
</body>
</html>
