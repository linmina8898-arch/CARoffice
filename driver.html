<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安興租車 - 司機系統綁定</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .bg-primary { background-color: #553f62; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- 綁定卡片 -->
    <div id="mainCard" class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm border-t-8 border-[#553f62] hidden">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-[#553f62]">司機資料綁定</h1>
            <p class="text-sm text-gray-500 mt-2 font-bold">請輸入正確資訊以完成系統連結</p>
        </div>

        <form id="bindForm" class="space-y-5">
            <!-- 隱藏的 LINE ID 與 顯示名稱 -->
            <input type="hidden" id="lineId">
            <input type="hidden" id="lineName">

            <!-- 顯示 LINE 帳號資訊 -->
            <div id="lineProfileBlock" class="hidden flex items-center justify-center space-x-3 bg-gray-50 p-3 rounded-xl border border-gray-200">
                <img id="lineAvatar" src="" alt="Avatar" class="w-10 h-10 rounded-full shadow-sm hidden">
                <div class="text-left">
                    <p class="text-[10px] text-gray-500 font-bold">即將綁定的 LINE 帳號</p>
                    <p id="displayLineName" class="text-sm font-black text-[#553f62]">載入中...</p>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">司機代號 (例：A001)</label>
                <input type="text" id="driverCode" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#553f62] outline-none uppercase font-bold text-gray-800" placeholder="請輸入您的代號" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">登記的聯絡電話</label>
                <!-- 加入 maxlength="12" -->
                <input type="tel" id="driverPhone" maxlength="12" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#553f62] outline-none font-bold text-gray-800" placeholder="0900-000-000" required>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-[#553f62] text-white font-bold py-4 rounded-xl shadow-lg hover:bg-opacity-90 transition text-lg">
                確認綁定
            </button>
        </form>
        
        <!-- 提示文字區塊 -->
        <div class="text-[11px] text-gray-400 mt-6 text-center leading-relaxed">
            <p>※ 綁定後，系統派單將會直接發送到您的個人 LINE。</p>
            <p>※ 資料必須與管理員試算表中的記載完全相符。</p>
        </div>
    </div>

    <!-- 讀取中狀態 -->
    <div id="loading" class="flex flex-col items-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-[#553f62] mb-4"></div>
        <p class="text-[#553f62] font-bold">身分驗證中...</p>
    </div>

    <script>
        // ✅ 司機專用的 LIFF ID
        const LIFF_ID = "2009827083-famMEsm0"; 
        
        // GAS 網址 (與預約系統共用)
        const GAS_URL = "https://script.google.com/macros/s/AKfycby2xCCpwmEE69XozoWn0cY0QSjHc9i9O_CwT5jqgXs2O8aCxbzZ_rCmNLOwSinzlN5j/exec";

        // 電話號碼自動格式化邏輯
        document.getElementById('driverPhone').addEventListener('input', function(e) {
            let val = this.value.replace(/\D/g, ''); // 移除所有非數字
            if (val.length > 10) val = val.slice(0, 10); // 強制限制最多10碼數字
            
            if (val.length > 4) {
                // 自動加上 '-'
                val = val.replace(/(\d{4})(\d{3})?(\d{0,3})?/, (m, p1, p2, p3) => p1 + (p2 ? '-' + p2 : '') + (p3 ? '-' + p3 : ''));
            }
            this.value = val;
        });

        function autoClose() {
            try {
                if (liff.isInClient()) {
                    liff.closeWindow();
                    return;
                }
                window.close();
            } catch (e) {
                console.error("關閉視窗失敗", e);
            }
            setTimeout(() => {
                Swal.fire({
                    title: '流程已結束',
                    html: '系統已記錄您的操作。<br><br>請點擊手機畫面右上角或左上角的「<b>X</b>」或「<b>完成</b>」離開此頁面。',
                    icon: 'info',
                    confirmButtonColor: '#553f62',
                    confirmButtonText: '我知道了'
                });
            }, 400);
        }

        async function init() {
            try {
                if (window !== window.parent) {
                    document.getElementById('lineId').value = "Preview_User";
                    document.getElementById('lineName').value = "預覽測試員";
                    document.getElementById('displayLineName').innerText = "預覽測試員";
                    document.getElementById('lineProfileBlock').classList.remove('hidden');
                    showMainForm();
                    return;
                }

                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                
                // 抓取並顯示 LINE ID 與 名稱
                document.getElementById('lineId').value = profile.userId;
                document.getElementById('lineName').value = profile.displayName;
                document.getElementById('displayLineName').innerText = profile.displayName;
                
                if (profile.pictureUrl) {
                    document.getElementById('lineAvatar').src = profile.pictureUrl;
                    document.getElementById('lineAvatar').classList.remove('hidden');
                }
                document.getElementById('lineProfileBlock').classList.remove('hidden');

                showMainForm();
            } catch (err) {
                console.error(err);
                Swal.fire({
                    title: '系統錯誤',
                    text: 'LINE 連結失敗，請檢查網路或聯絡管理員',
                    icon: 'error',
                    confirmButtonColor: '#553f62'
                }).then(autoClose);
            }
        }

        function showMainForm() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainCard').classList.remove('hidden');
        }

        document.getElementById('bindForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = '正在處理並存檔...';

            const payload = {
                action: 'bindDriverLine',
                data: {
                    driverCode: document.getElementById('driverCode').value.trim().toUpperCase(),
                    // 送出時再次確保移除了所有 '-' 符號，只傳純數字給後端
                    phone: document.getElementById('driverPhone').value.trim().replace(/\D/g, ''),
                    lineId: document.getElementById('lineId').value,
                    lineName: document.getElementById('lineName').value
                }
            };

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (result.success) {
                    Swal.fire({
                        title: '綁定成功！',
                        text: `${result.name} 司機您好，您的 LINE 帳號已成功連結安興租車系統。`,
                        icon: 'success',
                        confirmButtonColor: '#553f62',
                        confirmButtonText: '返回 LINE',
                        allowOutsideClick: false
                    }).then(autoClose);
                } else {
                    Swal.fire({
                        title: '綁定失敗',
                        text: result.error, 
                        icon: 'error',
                        confirmButtonColor: '#553f62',
                        confirmButtonText: '確定', 
                        allowOutsideClick: false
                    }).then(autoClose); 
                }
            } catch (err) {
                Swal.fire({
                    title: '連線錯誤',
                    text: '目前無法傳送資料，請聯絡客服協助',
                    icon: 'error',
                    confirmButtonColor: '#553f62',
                    allowOutsideClick: false
                }).then(autoClose);
            }
        });

        window.onload = init;
    </script>
</body>
</html>
