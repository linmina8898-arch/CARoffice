<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS-派車系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #553f62; --bg: #f9fafb; --text-main: #1f2937; --text-sub: #6b7280; --accent: #f07cad; border-color: #e5e7eb; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        .nav-active { color: var(--primary); font-weight: bold; border-bottom: 2px solid var(--primary); }
        .card { background: #fff; border: 1px solid var(--border-color); }
        .tag-badge { display: inline-block; padding: 2px 6px; font-size: 11px; border: 1px solid #d1d5db; color: #4b5563; }
        .text-accent { color: var(--accent); }
        /* 簽名板 */
        #signaturePad { border: 1px solid #ccc; width: 100%; height: 200px; touch-action: none; background: #fff; }
        .detail-section { border-bottom: 1px solid #f3f4f6; padding-bottom: 1.25rem; margin-bottom: 1.25rem; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 頂部導航 -->
    <header class="bg-white border-b border-gray-200 z-10 px-4 py-3 flex justify-between items-center">
        <div class="font-bold text-lg text-[#553f62] tracking-wider">安興租車 Driver</div>
        <button onclick="window.location.href='tel:0909150588'" class="text-sm font-bold text-[#553f62] border border-[#553f62] px-3 py-1 bg-gray-50 rounded shadow-sm">聯絡客服</button>
    </header>

    <!-- 主視圖區 -->
    <main id="mainContent" class="flex-1 overflow-y-auto hidden pb-16 bg-[#f9fafb]">
        
        <!-- 視圖 1：服務案件 -->
        <div id="view-tasks">
            <!-- 任務列表 (主選單) -->
            <div id="taskListView" class="p-4 space-y-6"></div>

            <!-- 任務明細 (內頁) -->
            <div id="taskDetailView" class="hidden bg-white min-h-full">
                <!-- 內頁標題區 -->
                <div class="sticky top-0 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between z-10 shadow-sm">
                    <button onclick="closeTaskDetail()" class="text-[#553f62] font-bold text-sm">◀ 返回列表</button>
                    <span class="text-sm font-bold text-gray-800" id="detailHeaderTitle"></span>
                    <button id="anomalyBtn" class="text-xs text-red-600 border border-red-200 bg-red-50 px-2 py-1 rounded font-bold">異況回報</button>
                </div>
                
                <div class="p-5 space-y-2" id="taskDetailContent">
                    <!-- 動態載入明細 -->
                </div>

                <!-- 底部動作按鈕 -->
                <div class="p-6 bg-gray-50 border-t border-gray-200" id="taskActionArea">
                    <!-- 動態載入按鈕 -->
                </div>
            </div>
        </div>

        <!-- 視圖 2：歷史紀錄 -->
        <div id="view-history" class="p-4 space-y-2 hidden"></div>

        <!-- 視圖 3：個人中心 -->
        <div id="view-profile" class="p-6 hidden">
            <div class="card p-6 text-center shadow-sm rounded-xl">
                <div class="w-16 h-16 bg-gray-100 rounded-full mx-auto mb-3 flex items-center justify-center border border-gray-200">
                    <span class="text-[#553f62] font-bold text-xl">AS</span>
                </div>
                <h2 id="profName" class="text-lg font-bold text-gray-800">讀取中...</h2>
                <p id="profPhone" class="text-gray-500 text-sm mt-1"></p>
                
                <div class="mt-6 pt-6 border-t border-gray-100 grid grid-cols-2 gap-4 divide-x divide-gray-100">
                    <div>
                        <p class="text-xs text-gray-500 mb-1">上月趟次</p>
                        <p id="profCountLast" class="text-xl font-bold text-gray-800">0</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">本月趟次</p>
                        <p id="profCountThis" class="text-xl font-bold text-[#553f62]">0</p>
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-gray-100 text-left text-sm space-y-3 text-gray-600">
                    <div class="flex justify-between"><span>姓名</span><span class="font-bold text-gray-800" id="profNameDetail">-</span></div>
                    <div class="flex justify-between"><span>車號</span><span class="font-bold text-gray-800" id="profCarNo">-</span></div>
                    <div class="flex justify-between"><span>車型</span><span class="font-bold text-gray-800" id="profCarType">-</span></div>
                    <div class="flex justify-between"><span>車色</span><span class="font-bold text-gray-800" id="profCarColor">-</span></div>
                    <div class="flex justify-between"><span>銀行代碼</span><span class="font-bold text-gray-800" id="profBankCode">-</span></div>
                    <div class="flex justify-between"><span>銀行帳號</span><span class="font-bold text-gray-800" id="profBankAcc">-</span></div>
                    <div class="flex justify-between"><span>保單到期日</span><span class="font-bold text-gray-800" id="profInsurance">-</span></div>
                </div>
            </div>
            <div class="text-center text-[10px] text-gray-400 mt-6 font-mono">System Version: <span class="version-display"></span></div>
        </div>
    </main>

    <!-- 底部導航列 -->
    <nav id="bottomNav" class="bg-white border-t border-gray-200 flex justify-around items-center h-14 fixed bottom-0 w-full z-20 hidden shadow-[0_-2px_10px_rgba(0,0,0,0.03)]">
        <button onclick="switchTab('tasks', this)" class="nav-btn nav-active flex-1 h-full text-xs transition">服務案件</button>
        <button onclick="switchTab('history', this)" class="nav-btn flex-1 h-full text-xs text-gray-500 transition">歷史案件</button>
        <button onclick="switchTab('profile', this)" class="nav-btn flex-1 h-full text-xs text-gray-500 transition">個人中心</button>
    </nav>

    <!-- 綁定/登入遮罩 -->
    <div id="authScreen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 transition-opacity duration-300">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#553f62] mb-4" id="authSpinner"></div>
        <p id="authMsg" class="text-[#553f62] text-sm font-bold">系統驗證中...</p>
        
        <form id="bindForm" class="w-full max-w-sm mt-8 hidden space-y-4">
            <h2 class="text-lg font-bold text-center text-[#553f62] mb-2">司機帳號綁定</h2>
            <div class="bg-[#f8f6fa] border border-[#553f62] p-3 text-center mb-2 rounded-lg">
                <span class="text-xs text-gray-500">當前 LINE 帳號：</span>
                <span id="bindLineName" class="text-sm font-bold text-[#553f62]"></span>
            </div>
            <input type="text" id="bindName" placeholder="真實姓名" class="w-full p-3 border border-gray-300 bg-white text-sm focus:outline-none focus:border-[#553f62] rounded-lg" required>
            <input type="tel" id="bindPhone" placeholder="手機號碼" maxlength="12" class="w-full p-3 border border-gray-300 bg-white text-sm focus:outline-none focus:border-[#553f62] rounded-lg" required>
            <p class="text-[10px] text-gray-500 text-center">※ 綁定後僅限此 LINE 帳號登入</p>
            <button type="submit" class="w-full bg-[#553f62] text-white py-3 font-bold text-sm mt-2 rounded-lg">確認綁定</button>
        </form>
        <div class="absolute bottom-4 text-center text-[10px] text-gray-400 font-mono">System Version: <span class="version-display"></span></div>
    </div>

    <!-- 簽名板 Modal -->
    <div id="sigModal" class="fixed inset-0 bg-white z-[60] flex flex-col hidden">
        <div class="p-4 border-b border-gray-200 text-center font-bold text-[#553f62] bg-gray-50 flex justify-between items-center">
            <span>客戶簽名確認</span>
            <button onclick="closeSigModal()" class="text-gray-400 text-xl font-normal px-2">✕</button>
        </div>
        <div class="flex-1 p-6 flex flex-col items-center justify-center space-y-4">
            <p class="text-xs text-gray-500 text-center">請客戶於下方框內簽名，確認行程已完成</p>
            <canvas id="signaturePad"></canvas>
            <div class="flex justify-between w-full space-x-4 pt-4">
                <button onclick="clearSig()" class="flex-1 py-3 border border-gray-300 text-gray-600 font-bold text-sm rounded-lg">重新簽名</button>
                <button onclick="submitSig()" class="flex-1 py-3 bg-[#553f62] text-white font-bold text-sm rounded-lg">完成結案</button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009971109-pdmG3XEe"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwyUja6YJWlUTUEFWdGcmvAWvfkU_1Ft9UyAeXPeQ5ZLATwBz8q1oYQHUXO_qpBgHtx/exec"; 
        const DRIVER_VERSION = "v1.9.4";
        
        document.querySelectorAll('.version-display').forEach(el => el.innerText = DRIVER_VERSION);

        let driverData = null;
        let tasks = [];
        let historyData = [];
        let currentDetailTask = null; 
        let currentSigOrderId = null;
        
        // 手機號碼格式化
        document.getElementById('bindPhone').addEventListener('input', function(e) {
            let val = this.value.replace(/\D/g, ''); 
            if (val.length > 10) val = val.substring(0, 10); 
            if (val.length > 4) val = val.replace(/(\d{4})(\d{3})?(\d{0,3})?/, (m, p1, p2, p3) => p1 + (p2 ? '-' + p2 : '') + (p3 ? '-' + p3 : ''));
            this.value = val;
        });

        const canvas = document.getElementById('signaturePad'), ctx = canvas.getContext('2d');
        let isDrawing = false;
        function initCanvas() {
            canvas.width = canvas.parentElement.clientWidth - 48; 
            canvas.height = 200;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';
        }
        canvas.addEventListener('touchstart', e => { isDrawing=true; const rect = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); e.preventDefault(); });
        canvas.addEventListener('touchmove', e => { if(!isDrawing)return; const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); ctx.stroke(); e.preventDefault(); });
        canvas.addEventListener('touchend', () => isDrawing=false);
        function clearSig() { ctx.clearRect(0,0, canvas.width, canvas.height); }
        function closeSigModal() { document.getElementById('sigModal').classList.add('hidden'); }

        function requireGPS() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) { Swal.fire('錯誤', '設備不支援定位', 'error'); reject('No Geolocation'); }
                Swal.fire({ title: '定位中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                navigator.geolocation.getCurrentPosition(
                    (pos) => { Swal.close(); resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
                    (err) => {
                        Swal.close();
                        Swal.fire({
                            title: '定位遭拒絕', text: '請開啟位置資訊權限才能回報狀態。', icon: 'warning',
                            showCancelButton: true, confirmButtonColor: '#553f62', confirmButtonText: '聯絡客服', cancelButtonText: '取消'
                        }).then((r) => { if(r.isConfirmed) window.location.href='tel:0909150588'; });
                        reject(err);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        async function apiCall(action, data) {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: action, data: data }) }).then(r=>r.json());
            if(!res.success) throw new Error(res.error || 'API 錯誤');
            return res;
        }

        async function init() {
            try {
                if(window !== window.parent || !LIFF_ID || LIFF_ID === "YOUR_DRIVER_LIFF_ID") { 
                    document.getElementById('authMsg').innerText = "預覽模式";
                    document.getElementById('authSpinner').classList.add('hidden');
                    document.getElementById('bindLineName').innerText = "預覽測試帳號";
                    document.getElementById('bindForm').classList.remove('hidden');
                    document.getElementById('bindForm').onsubmit = (e) => handleBind(e, "TEST_LINE_ID_" + Math.floor(Math.random()*1000));
                    return;
                }
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                
                const checkRes = await apiCall('driverCheckAuth', { lineId: profile.userId });
                if(checkRes.isBound) {
                    driverData = checkRes.driver;
                    showMainApp();
                } else {
                    document.getElementById('authMsg').innerText = "請驗證身分";
                    document.getElementById('authSpinner').classList.add('hidden');
                    document.getElementById('bindLineName').innerText = profile.displayName;
                    document.getElementById('bindForm').classList.remove('hidden');
                    document.getElementById('bindForm').onsubmit = (e) => handleBind(e, profile.userId);
                }
            } catch (err) { Swal.fire('錯誤', 'LIFF 初始化失敗', 'error'); }
        }

        async function handleBind(e, lineId) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.disabled = true; btn.innerText = "處理中...";
            const bindName = document.getElementById('bindName').value.trim();
            const bindPhone = document.getElementById('bindPhone').value.trim(); 
            const bindLineName = document.getElementById('bindLineName').innerText; 
            try {
                const res = await apiCall('driverBindAuth', { lineId: lineId, lineName: bindLineName, name: bindName, phone: bindPhone });
                driverData = res.driver; 
                showMainApp();
            } catch (err) {
                Swal.fire({ title: '綁定失敗', text: err.message, icon: 'error' });
                btn.disabled = false; btn.innerText = "確認綁定";
            }
        }

        function showMainApp() {
            document.getElementById('authScreen').classList.add('opacity-0');
            setTimeout(() => document.getElementById('authScreen').classList.add('hidden'), 300);
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('bottomNav').classList.remove('hidden');
            document.getElementById('profName').innerText = driverData.name;
            document.getElementById('profPhone').innerText = driverData.phone;
            
            // 綁定詳細資料
            document.getElementById('profNameDetail').innerText = driverData.name || '-';
            document.getElementById('profCarNo').innerText = driverData.carNo || '-';
            document.getElementById('profCarType').innerText = driverData.carType || '-';
            document.getElementById('profCarColor').innerText = driverData.carColor || '-';
            document.getElementById('profBankCode').innerText = driverData.bankCode || '-';
            document.getElementById('profBankAcc').innerText = driverData.bankAcc || '-';
            document.getElementById('profInsurance').innerText = driverData.insurance || '-';

            loadTasks();
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-gray-500'); });
            el.classList.remove('text-gray-500'); el.classList.add('nav-active');
            ['tasks', 'history', 'profile'].forEach(t => document.getElementById(`view-${t}`).classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            if(tab === 'tasks') { closeTaskDetail(); loadTasks(); }
            if(tab === 'history') loadHistory();
        }

        function getRelativeDay(dateStr) {
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateStr); target.setHours(0,0,0,0);
            const diffDays = Math.round((target - today) / (1000 * 60 * 60 * 24));
            let label = (diffDays === 0) ? '今天' : (diffDays === 1) ? '明天' : (diffDays === 2) ? '後天' : (diffDays < 0) ? '過往' : '未來';
            return `${label} ${dateStr}`;
        }

        async function loadTasks() {
            try {
                const res = await apiCall('driverGetTasks', { lineId: driverData ? driverData.lineId : "TEST_LINE_ID" });
                tasks = res.tasks;
                document.getElementById('profCountThis').innerText = res.thisMonthCount;
                document.getElementById('profCountLast').innerText = res.lastMonthCount;
                renderTaskList();
                
                if(currentDetailTask) {
                    const updatedTask = tasks.find(t => t.orderId === currentDetailTask.orderId);
                    if(updatedTask) openTaskDetail(updatedTask.orderId);
                    else closeTaskDetail();
                }
            } catch(e) {}
        }

        function renderTaskList() {
            const container = document.getElementById('taskListView');
            if(tasks.length === 0) { container.innerHTML = `<div class="text-center text-gray-400 mt-10 text-sm">目前無派車任務</div>`; return; }
            
            const groups = {};
            tasks.forEach(t => {
                const g = getRelativeDay(t.date);
                if(!groups[g]) groups[g] = [];
                groups[g].push(t);
            });

            let html = '';
            const sortedKeys = Object.keys(groups).sort((a, b) => a.split(' ')[1].localeCompare(b.split(' ')[1]));
            sortedKeys.forEach(gKey => {
                html += `<div class="mb-6"><h3 class="text-xs font-bold text-gray-400 mb-2 border-b pb-1 tracking-widest">${gKey}</h3><div class="space-y-3">`;
                
                groups[gKey].sort((a,b) => a.time.localeCompare(b.time)).forEach(t => {
                    let sText = t.driverStatus || "未出發", sColor = sText === "未出發" ? "text-gray-300" : "text-[#553f62]";
                    
                    // 地址處理：移除前3碼郵遞區號，取前10碼
                    let cleanAddr = t.address.replace(/^\d{3}/, '').trim();
                    let area = cleanAddr.substring(0, 10);
                    let airportDisplay = t.airport || "機場";
                    
                    let route = t.type === '接機' ? `${airportDisplay} → ${area}` : `${area} → ${airportDisplay}`;
                    let hasExtra = t.extraStop && t.extraStop !== '無';
                    
                    html += `
                    <div onclick="openTaskDetail('${t.orderId}')" class="card p-4 rounded-xl shadow-sm flex justify-between items-center cursor-pointer active:bg-gray-50 border-l-4 border-l-[#553f62]">
                        <div class="flex-1 min-w-0 pr-2">
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="font-bold text-lg text-gray-800">${t.time}</span>
                                <span class="tag-badge rounded">${t.type}</span>
                                ${hasExtra ? `<span class="text-[10px] font-black text-accent border border-pink-200 bg-pink-50 px-1 rounded">加點</span>` : ''}
                            </div>
                            <div class="text-xs text-gray-500 font-medium truncate">${route}</div>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <span class="text-[10px] font-bold ${sColor} border px-2 py-0.5 rounded-full">${sText}</span>
                            <div class="text-gray-300 text-xs mt-2 font-bold">詳細 ▶</div>
                        </div>
                    </div>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        function openTaskDetail(orderId) {
            const t = tasks.find(x => x.orderId === orderId); 
            if(!t) return; 
            currentDetailTask = t;
            
            document.getElementById('taskListView').classList.add('hidden'); 
            document.getElementById('taskDetailView').classList.remove('hidden');
            document.getElementById('detailHeaderTitle').innerText = `${t.date} ${t.time}`;
            
            let airportStr = `${t.airport} ${t.flightNo && t.flightNo !== '無' ? t.flightNo : ''}`.trim();
            
            let cashHtml = '';
            if(t.paymentMethod && (t.paymentMethod.includes('現') || t.paymentMethod.includes('現金'))) {
                cashHtml = `
                    <div class="mt-4 p-4 bg-pink-50 border border-pink-100 rounded-xl flex justify-between items-center">
                        <span class="text-sm font-bold text-gray-700">應收現金金額</span>
                        <span class="text-xl font-black text-accent">$${t.grandTotal || 0}</span>
                    </div>`;
            }

            document.getElementById('taskDetailContent').innerHTML = `
                <div class="detail-section">
                    <div class="flex justify-between items-start mb-5">
                        <div>
                            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">客戶姓名</div>
                            <div class="font-bold text-2xl text-gray-800">${t.custName}</div>
                        </div>
                        <a href="tel:${t.custPhone}" class="bg-[#553f62] text-white p-3.5 rounded-full shadow-lg active:scale-90 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.037 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                            </svg>
                        </a>
                    </div>
                    <div class="grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded-xl">
                        <div>
                            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">行程類別</div>
                            <div class="font-black text-[#553f62]">${t.type}</div>
                        </div>
                        <div>
                            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">機場航班</div>
                            <div class="font-black text-gray-800">${airportStr}</div>
                        </div>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-4">服務需求明細</div>
                    <div class="grid grid-cols-2 gap-y-5 gap-x-4 text-sm bg-white border border-gray-100 p-4 rounded-xl shadow-sm">
                        <div class="flex flex-col border-b border-gray-50 pb-2"><span>乘客人數</span><span class="font-black text-base text-[#553f62]">${t.paxCount || '未註記'}</span></div>
                        <div class="flex flex-col border-b border-gray-50 pb-2"><span>行李件數</span><span class="font-black text-base">${t.luggage || '0'}件</span></div>
                        <div class="flex flex-col border-b border-gray-50 pb-2"><span>胖胖箱</span><span class="font-black text-base">${t.sportLuggage || '無'}</span></div>
                        <div class="flex flex-col border-b border-gray-50 pb-2"><span>安全座椅</span><span class="font-black text-base">${t.seats || '無'}</span></div>
                    </div>
                    ${t.extraStop && t.extraStop !== '無' ? `
                    <div class="mt-4 p-4 bg-[#fff5f8] border border-pink-100 rounded-xl shadow-sm">
                        <div class="text-[10px] text-accent font-black uppercase mb-1">📍 加點服務項目</div>
                        <div class="text-base font-black text-gray-800">${t.extraStop}</div>
                    </div>` : ''}
                </div>
                <div class="space-y-4">
                    ${t.remarks && t.remarks !== '無' ? `
                    <div>
                        <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">司機注意事項</div>
                        <div class="bg-yellow-50 p-4 rounded-xl text-sm text-gray-700 border border-yellow-100 font-bold leading-relaxed shadow-sm">${t.remarks}</div>
                    </div>` : ''}
                    ${cashHtml}
                </div>
            `;
            
            document.getElementById('anomalyBtn').onclick = () => reportAnomaly(t.orderId);
            
            let s = t.driverStatus || "未出發", bT = '出發', nS = '已出發';
            if (s === '已出發') { bT = '抵達'; nS = '已抵達'; } 
            else if (s === '已抵達') { bT = '客上'; nS = '客上'; } 
            else if (s === '客上') { bT = '客下(結案)'; nS = '已結案'; }
            
            document.getElementById('taskActionArea').innerHTML = `
                <button onclick="handleStatusClick('${t.orderId}', '${nS}', '${t.paymentMethod || ''}')" 
                        class="w-full bg-[#553f62] text-white py-4.5 rounded-2xl text-lg font-black active:scale-[0.97] transition-all shadow-xl">
                    ${bT}
                </button>
            `;
        }

        function closeTaskDetail() { 
            currentDetailTask = null; 
            document.getElementById('taskDetailView').classList.add('hidden'); 
            document.getElementById('taskListView').classList.remove('hidden'); 
        }

        async function handleStatusClick(o, n, p) { 
            if (n === '已結案' && p.includes('簽')) { 
                openSigModal(o); 
            } else if (n === '聯絡客服') {
                window.location.href = 'tel:0909150588';
            } else if (n === '已結案') { 
                const r = await Swal.fire({ 
                    title: '確認結案？', 
                    text: '行程即將結束並歸檔。', 
                    icon: 'question', 
                    showCancelButton: true, 
                    confirmButtonColor: '#553f62', 
                    confirmButtonText: '確認結案', 
                    cancelButtonText: '取消' 
                }); 
                if(r.isConfirmed) updateStatus(o, n); 
            } else { 
                updateStatus(o, n); 
            } 
        }

        async function updateStatus(o, n) { 
            try { 
                const c = await requireGPS(); 
                Swal.fire({ title: '回報中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() }); 
                await apiCall('driverUpdateStatus', { orderId: o, status: n, lat: c.lat, lng: c.lng, lineId: driverData ? driverData.lineId : "TEST" }); 
                Swal.fire({ title: '已回報', text: n, icon: 'success', timer: 1000, showConfirmButton: false }); 
                loadTasks(); 
            } catch(e) { 
                if(e !== 'No Geolocation') Swal.fire('打卡失敗', e.message, 'error'); 
            } 
        }

        async function reportAnomaly(o) {
            const { value: f } = await Swal.fire({ 
                title: '異況回報', 
                html: `
                    <select id="anoType" class="w-full p-3 border border-gray-300 mb-3 text-sm rounded-lg font-bold">
                        <option value="人數/行李不符">人數/行李不符</option>
                        <option value="聯絡不上客人">聯絡不上客人</option>
                        <option value="臨時變更行程">臨時變更行程</option>
                        <option value="車輛故障/事故">車輛故障或事故</option>
                        <option value="其他">其他</option>
                    </select>
                    <textarea id="anoNote" rows="3" class="w-full p-3 border border-gray-300 text-sm rounded-lg font-bold" placeholder="簡述狀況..."></textarea>`, 
                focusConfirm: false, 
                showCancelButton: true, 
                confirmButtonColor: '#e3342f', 
                confirmButtonText: '發送調度', 
                cancelButtonText: '取消', 
                preConfirm: () => { return { type: document.getElementById('anoType').value, note: document.getElementById('anoNote').value } } 
            });
            
            if (f) { 
                Swal.fire({ title: '傳送中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() }); 
                try { 
                    await apiCall('driverReportAnomaly', { orderId: o, type: f.type, note: f.note, driverName: driverData ? driverData.name : "測試司機" }); 
                    Swal.fire('已通報', '已通知調度人員', 'success'); 
                } catch(e) { 
                    Swal.fire('通報失敗', '請直撥客服\n(系統訊息: ' + e.message + ')', 'error'); 
                } 
            }
        }

        async function loadHistory() { 
            Swal.showLoading(); 
            try { 
                const res = await apiCall('driverGetHistory', { lineId: driverData ? driverData.lineId : "TEST_LINE_ID" }); 
                const c = document.getElementById('view-history'); 
                if(res.history.length === 0) { 
                    c.innerHTML = `<div class="text-center text-gray-400 mt-10 text-sm">無歷史紀錄</div>`; 
                    Swal.close(); 
                    return; 
                } 
                c.innerHTML = res.history.map(t => `
                    <div class="card p-4 rounded-xl mb-3 shadow-sm">
                        <div class="text-sm font-bold text-gray-800">${t.date} ${t.time} ${t.type}</div>
                        <div class="text-[11px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${t.addressMasked} <> ${t.airport} &nbsp;&nbsp; ${t.custNameMasked}</div>
                    </div>`).join(''); 
                Swal.close(); 
            } catch(e) { 
                Swal.fire('錯誤', '無法載入', 'error'); 
            } 
        }

        function openSigModal(o) { 
            currentSigOrderId = o; 
            document.getElementById('sigModal').classList.remove('hidden'); 
            setTimeout(initCanvas, 100); 
        }

        async function submitSig() { 
            document.getElementById('sigModal').classList.add('hidden'); 
            await updateStatus(currentSigOrderId, '已結案'); 
        }

        window.onload = init;
    </script>
</body>
</html>
