<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS派車 - 司機端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #553f62; --accent: #f07cad; --bg: #f3f4f6; }
        body { font-family: sans-serif; background-color: var(--bg); -webkit-tap-highlight-color: transparent; font-size: 14px; }
        .nav-active { color: var(--primary); font-weight: 700; border-bottom: 3px solid var(--primary); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .font-bold { font-weight: 600 !important; }
        .font-black { font-weight: 700 !important; }
        .task-route { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .driver-field { display: grid; grid-template-columns: 72px minmax(0, 1fr); gap: 8px; align-items: start; padding: 8px 0; border-bottom: 1px solid rgba(229,231,235,.8); }
        .driver-field-label { color: #6b7280; font-size: 12px; font-weight: 400; white-space: nowrap; }
        .driver-field-value { color: #1f2937; font-weight: 500; text-align: right; overflow-wrap: anywhere; }
        /* 簽名板 */
        #signaturePad { border: 2px dashed #cbd5e1; border-radius: 10px; width: 100%; flex: 1; min-height: 58vh; touch-action: none; background: #fff; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-800">

    <!-- 頂部導航 -->
    <header class="bg-white shadow-sm z-10 px-4 py-3 flex justify-between items-center relative">
        <div class="font-black text-xl text-[#553f62] tracking-widest">AS派車 <span class="text-sm font-bold text-[#f07cad]">Driver</span></div>
        <button onclick="window.location.href='tel:0955311306'" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-full text-xs font-bold border border-red-200 shadow-sm flex items-center gap-1">
            聯絡客服
        </button>
    </header>

    <!-- 主視圖區 -->
    <main id="mainContent" class="flex-1 overflow-y-auto p-4 hidden pb-20 relative">
        <!-- 任務列表 (預設) -->
        <div id="view-tasks">
            <!-- 分頁標籤 -->
            <div class="flex space-x-2 mb-4 bg-gray-200 p-1 rounded-lg shadow-inner justify-center max-w-sm mx-auto">
                <button id="tab-today" class="task-tab-btn px-3 py-1.5 rounded-md text-sm font-bold bg-white text-[#553f62] shadow-sm flex-1 transition" onclick="setTaskTab('today')">今天</button>
                <button id="tab-tomorrow" class="task-tab-btn px-3 py-1.5 rounded-md text-sm text-gray-500 font-bold flex-1 transition" onclick="setTaskTab('tomorrow')">明天</button>
                <button id="tab-all" class="task-tab-btn px-3 py-1.5 rounded-md text-sm text-gray-500 font-bold flex-1 transition" onclick="setTaskTab('all')">全部</button>
                <button id="tab-pending" class="task-tab-btn px-3 py-1.5 rounded-md text-sm text-gray-500 font-bold flex-1 transition" onclick="setTaskTab('pending')">待收單</button>
            </div>
            <!-- 任務清單 -->
            <div id="task-list" class="space-y-4"></div>
        </div>
        
        <!-- 歷史紀錄 -->
        <div id="view-history" class="space-y-4 hidden"></div>
        
        <!-- 個人中心 -->
        <div id="view-profile" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 id="profName" class="text-2xl font-black text-[#553f62] text-center mb-6 border-b border-gray-100 pb-4">讀取中...</h2>
                <div class="space-y-4 text-sm">
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">聯絡電話</span><span id="profPhone" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">服務車號</span><span id="profCarNo" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">車輛顏色</span><span id="profCarColor" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">車型款式</span><span id="profCarType" class="font-bold text-gray-800"></span></div>
                    <div class="h-px bg-gray-100 my-2"></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">銀行代碼</span><span id="profBankCode" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">銀行帳號</span><span id="profBankAcc" class="font-bold text-gray-800"></span></div>
                    <div class="h-px bg-gray-100 my-2"></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">駕照到期日</span><span id="profLicense" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">保險到期日</span><span id="profInsurance" class="font-bold text-gray-800"></span></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 任務明細獨立頁面 (原生滾動，解決無法往下滑問題) -->
    <div id="view-task-detail" class="fixed inset-0 bg-[#f3f4f6] z-[40] hidden overflow-y-auto">
        <header class="bg-[#553f62] shadow-md px-4 py-3 flex items-center justify-between sticky top-0 z-50">
            <button onclick="closeTaskDetail()" class="text-white font-bold text-xl px-2 py-1 active:bg-white/20 rounded">⬅</button>
            <h1 class="text-lg font-black text-white tracking-widest">任務明細</h1>
            <div class="w-8"></div> <!-- 佔位對齊用 -->
        </header>
        <div id="task-detail-content" class="p-4 pb-24">
            <!-- 明細內容由 JS 動態生成 -->
        </div>
    </div>

    <!-- 底部導航列 -->
    <nav id="bottomNav" class="bg-white border-t border-gray-200 flex justify-around items-center h-16 fixed bottom-0 w-full z-20 hidden shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('tasks', this)" class="nav-btn nav-active flex-1 h-full flex flex-col items-center justify-center text-gray-400 transition">
            <span class="text-sm font-bold">服務案件</span>
        </button>
        <button onclick="switchTab('history', this)" class="nav-btn flex-1 h-full flex flex-col items-center justify-center text-gray-400 transition">
            <span class="text-sm font-bold">歷史案件</span>
        </button>
        <button onclick="switchTab('profile', this)" class="nav-btn flex-1 h-full flex flex-col items-center justify-center text-gray-400 transition">
            <span class="text-sm font-bold">個人中心</span>
        </button>
    </nav>

    <!-- 綁定/登入遮罩 -->
    <div id="authScreen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-[#553f62] mb-4" id="authSpinner"></div>
        <p id="authMsg" class="text-[#553f62] font-bold">LINE 授權登入中...</p>
        
        <form id="bindForm" class="w-full max-w-sm mt-8 hidden space-y-4">
            <h2 class="text-xl font-black text-center text-[#553f62] mb-2">司機帳號綁定</h2>
            <p class="text-xs text-gray-500 text-center mb-4">首次登入需驗證身分，後續將自動登入</p>
            
            <!-- 顯示當下 LINE 帳號名稱 -->
            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 text-center mb-2 shadow-inner">
                <span class="text-xs text-gray-500">當前綁定 LINE 帳號：</span><br>
                <span id="lineNameDisplay" class="font-black text-[#553f62] text-sm">讀取中...</span>
            </div>

            <input type="text" id="bindName" placeholder="司機真實姓名" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-[#553f62] outline-none font-bold" required>
            <input type="tel" id="bindPhone" placeholder="司機手機號碼 (0900-000-000)" maxlength="12" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-[#553f62] outline-none font-bold" required>
            <button type="submit" class="w-full bg-[#f07cad] text-white py-3.5 rounded-xl font-black shadow-md hover:opacity-90">立即綁定</button>
        </form>
        
        <!-- 登入頁版本號顯示 -->
        <div class="absolute bottom-6 text-center text-[10px] text-gray-400 font-mono">
            System Version: <span class="app-version-display"></span>
        </div>
    </div>

    <!-- 簽名板 Modal -->
    <div id="sigModal" class="fixed inset-0 bg-[#f3f4f6] z-[60] flex flex-col hidden">
        <div class="px-4 py-3 bg-white shadow-sm border-b border-gray-100">
            <div class="flex items-center justify-between gap-3">
                <div class="min-w-0">
                    <div class="text-base font-bold text-[#553f62]">客戶確認簽名</div>
                    <div id="sigOrderInfo" class="text-xs text-gray-500 truncate">月結簽單</div>
                </div>
                <button onclick="closeSigModal()" class="text-sm text-gray-500 px-3 py-1.5 rounded-lg bg-gray-100">取消</button>
            </div>
        </div>
        <div class="flex-1 p-4 flex flex-col min-h-0">
            <p class="text-xs text-red-500 text-center mb-2 font-bold">※ 請客戶於下方簽名，確認行程已安全結束</p>
            <canvas id="signaturePad"></canvas>
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="clearSig()" class="py-3 bg-gray-200 text-gray-700 rounded-xl font-bold">重簽</button>
                <button onclick="submitSig()" class="py-3 bg-[#553f62] text-white rounded-xl font-bold shadow-md">確認簽名結案</button>
            </div>
        </div>
    </div>

    <script>
        // --- 系統版本記錄 ---
        const APP_VERSION = "v1.14.14";

        // ⚠️ 請填入專屬的司機端 LIFF ID 和 官方帳號連結
        const LIFF_ID = "2009971109-pdmG3XEe"; 
        const LINE_OA_LINK = "https://line.me/R/ti/p/@ansing"; // 官方帳號加入連結
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzMLYBvdbo4mkkEUVFcjST44oh7VUXhx7gZjWejm2R8XX549ITaReot0pRAN3mbwA8n/exec"; // 最新的 GAS 網址

        let driverData = null;
        let tasks = [];
        let historyData = [];
        let reconciliationData = null;
        let currentSigOrderId = null;
        let currentTaskTab = 'today'; 
        let authTimeoutTimer = null;
        let currentDetailOrderId = null;
        let statusSubmitting = false;
        
        // 簽名板邏輯
        const canvas = document.getElementById('signaturePad');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let hasSignatureDrawn = false;

        function initCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#553f62';
        }
        
        canvas.addEventListener('touchstart', e => { isDrawing=true; hasSignatureDrawn = true; const rect = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); e.preventDefault(); });
        canvas.addEventListener('touchmove', e => { if(!isDrawing)return; hasSignatureDrawn = true; const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); ctx.stroke(); e.preventDefault(); });
        canvas.addEventListener('touchend', () => isDrawing=false);
        canvas.addEventListener('mousedown', e => { isDrawing=true; hasSignatureDrawn = true; const rect = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top); });
        canvas.addEventListener('mousemove', e => { if(!isDrawing)return; hasSignatureDrawn = true; const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke(); });
        canvas.addEventListener('mouseup', () => isDrawing=false);
        canvas.addEventListener('mouseleave', () => isDrawing=false);
        function clearSig() { ctx.clearRect(0,0, canvas.width, canvas.height); hasSignatureDrawn = false; }
        function closeSigModal() { document.getElementById('sigModal').classList.add('hidden'); }

        // --- 自動格式化手機號碼 (0900-000-000) ---
        document.getElementById('bindPhone').addEventListener('input', function(e) {
            let val = e.target.value.replace(/\D/g, ''); 
            if(val.length > 4) {
                val = val.replace(/(\d{4})(\d{3})?(\d{0,3})?/, (m, p1, p2, p3) => p1 + (p2 ? '-' + p2 : '') + (p3 ? '-' + p3 : ''));
            }
            e.target.value = val;
        });

        // --- 核心：GPS 定位 (大幅加快讀取速度) ---
        function requireGPS() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    Swal.fire('錯誤', '您的設備不支援定位功能', 'error');
                    reject('No Geolocation');
                }
                Swal.fire({ title: '取得定位中', text: '請稍候...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        Swal.close();
                        resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    },
                    (err) => {
                        Swal.close();
                        Swal.fire({
                            title: '定位失敗',
                            html: '<p class="text-left text-sm text-gray-600">系統必須取得定位才能執行回報。<br><br>請至手機設定開啟「位置資訊」權限，或聯絡調度。</p>',
                            icon: 'warning',
                            showCancelButton: true,
                            confirmButtonText: '聯絡調度',
                            cancelButtonText: '取消'
                        }).then((r) => { if(r.isConfirmed) window.location.href='tel:0955311306'; });
                        reject(err);
                    },
                    { enableHighAccuracy: false, timeout: 5000, maximumAge: 60000 }
                );
            });
        }

        // --- 核心：API 溝通 ---
        async function apiCall(action, data, timeoutMs = 12000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: action, data: data }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    signal: controller.signal
                }).then(r=>r.json());
                if(!res.success) throw new Error(res.error || 'API 錯誤');
                return res;
            } catch (err) {
                if (err.name === 'AbortError') throw new Error('連線逾時，請重新整理或稍後再試');
                throw err;
            } finally {
                clearTimeout(timer);
            }
        }

        function withTimeout(promise, ms, message) {
            return Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject(new Error(message)), ms))
            ]);
        }

        function clearAuthTimeout() {
            if (authTimeoutTimer) {
                clearTimeout(authTimeoutTimer);
                authTimeoutTimer = null;
            }
        }

        // --- 初始化與登入 (包含強迫加好友) ---
        async function init() {
            document.querySelectorAll('.app-version-display').forEach(el => el.innerText = APP_VERSION);
            authTimeoutTimer = setTimeout(() => {
                const mainHidden = document.getElementById('mainContent').classList.contains('hidden');
                const bindHidden = document.getElementById('bindForm').classList.contains('hidden');
                if (!mainHidden || !bindHidden) return;
                document.getElementById('authSpinner').classList.add('hidden');
                document.getElementById('authMsg').innerHTML = '登入逾時，請確認網路後重新整理。<br><button onclick="window.location.reload()" class="mt-3 bg-[#553f62] text-white px-4 py-2 rounded-lg text-sm font-bold">重新登入</button>';
            }, 12000);

            try {
                if(window !== window.parent) { 
                    // 預覽模式假資料
                    clearAuthTimeout();
                    document.getElementById('authMsg').innerText = "預覽模式：請輸入司機資料";
                    document.getElementById('authSpinner').classList.add('hidden');
                    document.getElementById('lineNameDisplay').innerText = '測試預覽帳號'; 
                    document.getElementById('bindForm').classList.remove('hidden');
                    
                    driverData = { 
                        name: '王小明', phone: '0900-123-456', carNo: 'ABC-1234', carColor: '黑色', carType: '大車', 
                        bankCode: '822', bankAcc: '1234567890', license: '2030-01-01', insurance: '2025-12-31', lineId: 'preview' 
                    };
                    tasks = [
                        { orderId: 'AS-20260508', date: getFormattedDate(0), time: '14:30', type: '接機', airport: '桃園機場', address: '台北市信義區忠孝東路五段', custName: '李先生', custPhone: '0912345678', remarks: '舉牌：李大同\n需幫忙拿行李', extraStop: '無', seats: '無', luggage: '2', sportLuggage: '無', flightNo: 'BR123', driverStatus: '未出發', driverNote: '客人脾氣較急，請準時抵達', paymentMethod: '付現', tripAmt: '800', grandTotal: '1500', paxCount: '大2 小1', car: '進口商務車' },
                        { orderId: 'AS-20260509', date: getFormattedDate(0), time: '19:00', type: '送機', airport: '松山機場', address: '台北市大安區新生南路非常長的一段地址測試換行狀況', custName: '陳小姐', custPhone: '0987654321', remarks: '無', extraStop: '新北市板橋區', seats: '1個前向', luggage: '0', sportLuggage: '無', flightNo: '無', driverStatus: '已收單', paymentMethod: '簽單', tripAmt: '1000', grandTotal: '1000', paxCount: '大1', car: '小車' }
                    ];
                    return;
                }

                await withTimeout(liff.init({ liffId: LIFF_ID }), 8000, 'LIFF 初始化逾時');
                if (!liff.isLoggedIn()) { liff.login(); return; }

                // 檢查是否加入好友
                const checkFriendshipAndProceed = async () => {
                    proceedLogin();
                    return;
                    try {
                        const friendStatus = await Promise.race([
                            liff.getFriendship(),
                            new Promise(resolve => setTimeout(() => resolve({ friendFlag: true, timeout: true }), 1200))
                        ]);
                        if (!friendStatus.friendFlag) {
                            Swal.fire({
                                title: '請先加入官方帳號',
                                html: `<div style="text-align: left; line-height: 1.6; font-size: 14px;">
                                        <p>為了接收「派車通知」與「系統自動提醒」，請務必先加入 AS派車 官方帳號好友。</p>
                                        <p style="color: #f07cad; font-weight: bold; margin-top: 10px;">加完好友後，請手持「關閉」好友畫面，回到此畫面並點擊下方按鈕進入系統。</p>
                                        <div style="text-align: center; margin-top: 20px;">
                                            <a href="${LINE_OA_LINK}" target="_blank" style="background-color: #f07cad; color: white; padding: 10px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; display: inline-block;">點我前往加好友</a>
                                        </div>
                                    </div>`,
                                confirmButtonText: '我已加完好友，進入系統',
                                confirmButtonColor: '#553f62',
                                allowOutsideClick: false
                            }).then(async (result) => {
                                if (result.isConfirmed) {
                                    try {
                                        const recheckStatus = await liff.getFriendship();
                                        if (recheckStatus.friendFlag) {
                                            proceedLogin();
                                        } else {
                                            Swal.fire({
                                                title: '尚未偵測到好友狀態',
                                                text: '系統目前仍未偵測到您的好友狀態。若您已成功加入，可能是連線延遲，請直接點擊下方進入。',
                                                confirmButtonText: '進入系統',
                                                confirmButtonColor: '#553f62',
                                                allowOutsideClick: false
                                            }).then(() => {
                                                proceedLogin();
                                            });
                                        }
                                    } catch(e) { proceedLogin(); }
                                }
                            });
                            return;
                        }
                        proceedLogin();
                    } catch (err) {
                        console.error("Friendship check failed", err);
                        proceedLogin(); // fallback
                    }
                };

                const proceedLogin = async () => {
                    const profile = await withTimeout(liff.getProfile(), 5000, 'LINE 資料讀取逾時');
                    const checkRes = await apiCall('driverCheckAuth', { lineId: profile.userId }, 8000);
                    if(checkRes.isBound) {
                        driverData = checkRes.driver;
                        loginSuccess();
                    } else {
                        clearAuthTimeout();
                        document.getElementById('authMsg').innerText = "請驗證您的司機身分";
                        document.getElementById('authSpinner').classList.add('hidden');
                        document.getElementById('lineNameDisplay').innerText = profile.displayName;
                        document.getElementById('bindForm').classList.remove('hidden');
                        document.getElementById('bindForm').onsubmit = (e) => handleBind(e, profile.userId);
                    }
                };

                // 開始執行流程
                checkFriendshipAndProceed();

            } catch (err) {
                clearAuthTimeout();
                document.getElementById('authSpinner').classList.add('hidden');
                document.getElementById('authMsg').innerText = '登入失敗，請重新整理或聯絡調度。';
                Swal.fire('系統錯誤', err.message || 'LIFF 初始化失敗，請確認已在 LINE 中開啟', 'error');
            }
            initCanvas();
        }

        function loginSuccess() {
            clearAuthTimeout();
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('bottomNav').classList.remove('hidden');
            
            // 寫入個人中心資料
            document.getElementById('profName').innerText = driverData.name || '-';
            document.getElementById('profPhone').innerText = driverData.phone || '-';
            document.getElementById('profCarNo').innerText = driverData.carNo || '-';
            document.getElementById('profCarColor').innerText = driverData.carColor || '-';
            document.getElementById('profCarType').innerText = driverData.carType || '-';
            document.getElementById('profBankCode').innerText = driverData.bankCode || '-';
            document.getElementById('profBankAcc').innerText = driverData.bankAcc || '-';
            document.getElementById('profLicense').innerText = driverData.license || '-';
            document.getElementById('profInsurance').innerText = driverData.insurance || '-';
            
            loadTasks();
        }

        async function handleBind(e, lineId) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.disabled = true; btn.innerText = "驗證中...";
            try {
                const lineName = document.getElementById('lineNameDisplay').innerText;
                const res = await apiCall('driverBindAuth', { 
                    lineId: lineId, 
                    lineName: lineName,
                    name: document.getElementById('bindName').value.trim(),
                    phone: document.getElementById('bindPhone').value.trim()
                });
                Swal.fire('綁定成功', '歡迎加入AS派車！', 'success').then(() => window.location.reload());
            } catch (err) {
                Swal.fire('綁定失敗', err.message, 'error');
                btn.disabled = false; btn.innerText = "立即綁定";
            }
        }

        // --- 畫面切換與資料載入 ---
        function switchTab(tab, el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            el.classList.add('nav-active');
            ['tasks', 'history', 'profile'].forEach(t => document.getElementById(`view-${t}`).classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            if(tab === 'tasks') renderTasks(); 
            if(tab === 'history') loadHistory();
        }

        function setTaskTab(tab) {
            currentTaskTab = tab;
            document.querySelectorAll('.task-tab-btn').forEach(b => {
                b.classList.remove('bg-white', 'text-[#553f62]', 'shadow-sm');
                b.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`tab-${tab}`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('bg-white', 'text-[#553f62]', 'shadow-sm');
            renderTasks();
        }

        function getFormattedDate(offsetDays = 0) {
            const date = new Date();
            date.setDate(date.getDate() + offsetDays);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        async function loadTasks() {
            const taskContainer = document.getElementById('task-list');
            if (!tasks.length && taskContainer) {
                taskContainer.innerHTML = `<div class="text-center text-gray-400 mt-16 text-sm">任務載入中...</div>`;
            }
            try {
                const res = await apiCall('driverGetTasks', { lineId: driverData.lineId }, 12000);
                tasks = res.tasks;
                if(res.monthCount !== undefined) {
                    document.getElementById('profCount').innerText = res.monthCount;
                }
                renderTasks();
                // 如果明細頁開著，重新渲染明細內容以更新按鈕狀態
                if(currentDetailOrderId) {
                    openTaskDetail(currentDetailOrderId);
                }
            } catch(e) {
                if (taskContainer) {
                    taskContainer.innerHTML = `<div class="text-center text-gray-500 mt-16 text-sm leading-relaxed">任務載入逾時<br><button onclick="loadTasks()" class="mt-3 bg-[#553f62] text-white px-4 py-2 rounded-lg font-bold">重新載入</button></div>`;
                }
                Swal.fire('錯誤', e.message || '無法載入任務', 'error');
            }
        }

        async function loadHistory() {
            Swal.showLoading();
            try {
                const month = document.getElementById('driverReconMonth')?.value || new Date().toISOString().substring(0, 7);
                const res = await apiCall('driverGetHistoryBundle', { lineId: driverData.lineId, month });
                historyData = res.history || [];
                reconciliationData = res.reconciliation || { success: true, month, totalPayout: 0, totalCash: 0, netPayable: 0, count: 0, orders: [] };
                renderHistory();
                Swal.close();
            } catch(e) { Swal.fire('錯誤', '無法載入歷史', 'error'); }
        }

        // Helper 函式：過濾掉空值或 "無" 的字串
        const cleanVal = (v) => (!v || v === '無' || v === '-' || v === 'undefined') ? '' : String(v).trim();
        const escapeHtml = (v) => String(v || '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
        const displayNote = (v) => escapeHtml(cleanVal(v)).replace(/\n/g, '<br>');
        function formatPassengerCount(v) {
            const text = cleanVal(v);
            if (!text || text === '0') return '請確認預約單';
            const standard = text.match(/(\d+)\s*大(?:\s*(\d+)\s*中)?(?:\s*(\d+)\s*小)?/);
            if (standard) {
                const adult = Number(standard[1] || 0);
                const child = Number(standard[2] || 0);
                const infant = Number(standard[3] || 0);
                return adult + child + infant > 0 ? `${adult}大 ${child}中 ${infant}小` : '請確認預約單';
            }
            const legacy = text.match(/大\s*(\d+)(?:\s*中\s*(\d+))?(?:\s*小\s*(\d+))?/);
            if (legacy) {
                const adult = Number(legacy[1] || 0);
                const child = Number(legacy[2] || 0);
                const infant = Number(legacy[3] || 0);
                return adult + child + infant > 0 ? `${adult}大 ${child}中 ${infant}小` : '請確認預約單';
            }
            const slash = text.match(/^(\d+)\/(\d+)\/(\d+)$/);
            if (slash) {
                const adult = Number(slash[1] || 0);
                const child = Number(slash[2] || 0);
                const infant = Number(slash[3] || 0);
                return adult + child + infant > 0 ? `${adult}大 ${child}中 ${infant}小` : '請確認預約單';
            }
            return text;
        }
        function formatLuggageCount(v) {
            const text = cleanVal(v);
            if (!text) return '';
            return text.replace(/(\d+)\s*小/g, '$1登機').replace(/(\d+大)(?=\d)/g, '$1 ');
        }
        function displayPayoutStatus(v) {
            return cleanVal(v) === '已付款' ? '已結清' : (cleanVal(v) || '待確認');
        }
        const isPendingAccept = (t) => !cleanVal(t.driverStatus) || cleanVal(t.driverStatus) === '未出發';
        const parseTaskDateTime = (t) => {
            const date = cleanVal(t?.date);
            if (!date) return null;
            const time = cleanVal(t?.time) || '00:00';
            const dt = new Date(`${date}T${time}`);
            return Number.isNaN(dt.getTime()) ? null : dt;
        };
        const isTaskActionable = (t) => {
            const dt = parseTaskDateTime(t);
            if (!dt) return String(t?.date || '') >= getFormattedDate(0);
            return Date.now() <= dt.getTime() + 6 * 60 * 60 * 1000;
        };
        const parseMoney = (v) => {
            const n = parseFloat(String(v ?? '').replace(/[^\d.-]/g, ''));
            return Number.isNaN(n) ? 0 : n;
        };
        const parseCashAmount = (v) => {
            const n = parseMoney(v);
            return n > 0 && n <= 200000 ? n : 0;
        };
        function getDriverPaymentInfo(t) {
            const method = cleanVal(t.paymentMethod);
            const isCash = method.includes('現') || method.includes('車上') || method.includes('付現');
            const isBilling = method.includes('月結') || method.includes('簽單') || cleanVal(t.companyName);
            const isTransfer = method.includes('轉帳');
            const manualCash = parseCashAmount(t.manualCashCollected ?? t.cashCollected);
            const cashCollected = manualCash > 0 ? manualCash : (isCash ? parseCashAmount(t.tripAmt) : 0);
            const paymentStatus = isCash ? '司機收現' : (isBilling ? '月結簽單，客下請簽名' : (isTransfer ? '轉帳，不簽不收' : (method || '未標示')));
            return { isCash, isBilling, isTransfer, cashCollected, paymentStatus, hasSeparateCash: manualCash > 0 && !isCash };
        }

        // --- 渲染【主畫面清單 (加入「確認收單」按鈕)】 ---
        function renderTasks() {
            const container = document.getElementById('task-list');
            const todayStr = getFormattedDate(0);
            const tomorrowStr = getFormattedDate(1);

            let filteredTasks = tasks.filter(isTaskActionable);

            if (currentTaskTab === 'pending') {
                filteredTasks = filteredTasks.filter(t => isPendingAccept(t) && isTaskActionable(t));
            } else if (currentTaskTab === 'today') {
                filteredTasks = filteredTasks.filter(t => t.date === todayStr);
            } else if (currentTaskTab === 'tomorrow') {
                filteredTasks = filteredTasks.filter(t => t.date === tomorrowStr);
            }
            filteredTasks.sort((a, b) => {
                if (isPendingAccept(a) !== isPendingAccept(b)) return isPendingAccept(a) ? -1 : 1;
                return String(a.date + a.time).localeCompare(String(b.date + b.time));
            });

            if(filteredTasks.length === 0) { 
                container.innerHTML = `<div class="text-center text-gray-400 mt-20 font-bold flex flex-col items-center">此區間沒有待執行的任務</div>`; 
                return; 
            }
            
            container.innerHTML = filteredTasks.map(t => {
                let currentStep = t.driverStatus || "未出發";
                let signContent = cleanVal(t.signboard) ? t.signboard : (t.remarks && t.remarks.includes('舉牌') ? '詳見客戶備註' : '');
                let hasSign = signContent !== '';
                const paymentInfo = getDriverPaymentInfo(t);

                let tags = [];
                let mmdd = t.date.substring(5).replace('-', '/');
                if (cleanVal(t.extraStop)) tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-red-600 text-white">加點</span>`);
                if (paymentInfo.isBilling) {
                    tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-[#553f62] text-white">月結簽單</span>`);
                } else if (paymentInfo.isCash) {
                    tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-[#f07cad] text-white">現金</span>`);
                } else if (paymentInfo.isTransfer) {
                    tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded border border-[#553f62] text-[#553f62] bg-white">轉帳</span>`);
                } else if (cleanVal(t.paymentMethod)) {
                    tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded border border-gray-300 text-gray-600 bg-white">${cleanVal(t.paymentMethod)}</span>`);
                }
                if (paymentInfo.hasSeparateCash) tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-gray-500 text-white">已收現 $${paymentInfo.cashCollected.toLocaleString()}</span>`);
                if (hasSign) tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded border border-[#f07cad] text-[#f07cad]">舉牌</span>`);
                if (cleanVal(t.remarks) || cleanVal(t.driverNote)) tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-gray-500 text-white">有備註</span>`);
                const payoutAmount = parseMoney(t.driverPayout);
                tags.push(payoutAmount > 0
                    ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-[#f5f1f7] text-[#553f62] border border-[#553f62]/20">司機實拿車資 $${payoutAmount.toLocaleString()}</span>`
                    : `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-red-50 text-red-500 border border-red-100">車資未設定</span>`);
                let tagsHtml = tags.join('');

                let addressText = cleanVal(t.address);
                let shortAddress = addressText.length > 8 ? addressText.substring(0, 8) + '...' : addressText;
                let summaryRoute = t.type === '送機' ? `${shortAddress} ➜ ${t.airport}` : `${t.airport} ➜ ${shortAddress}`;

                // 判斷是否顯示「確認收單」按鈕在主畫面上
                let actionArea = '';
                if(currentStep === "未出發" || !currentStep) {
                    actionArea = `
                    <div class="mt-3 pt-3 border-t border-gray-100">
                        <button onclick="event.stopPropagation(); updateStatus('${t.orderId}', '已收單')" class="w-full bg-[#553f62] text-white py-2.5 rounded-xl font-bold shadow-md text-sm transition active:bg-[#463252]">確認收單</button>
                    </div>`;
                } else {
                    actionArea = `
                    <div class="mt-3 pt-2 border-t border-gray-100 flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-400">當前進度</span>
                        <span class="text-xs font-bold px-2 py-1 rounded bg-blue-50 text-blue-600 border border-blue-100">${currentStep}</span>
                    </div>`;
                }

                return `
                <div onclick="openTaskDetail('${t.orderId}')" class="glass-card p-4 rounded-xl border border-gray-200 shadow-sm relative overflow-hidden mb-4 cursor-pointer hover:bg-gray-50 active:bg-gray-100 transition">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-[#553f62]"></div>
                    <div class="pl-2">
                        <div class="flex justify-between items-start gap-3">
                            <div class="min-w-0">
                                <div class="text-xl font-black text-[#553f62] leading-tight">${mmdd}</div>
                                <div class="flex items-baseline gap-2 mt-1 min-w-0">
                                    <span class="text-xl font-black text-[#553f62] leading-tight">${t.time}</span>
                                    <span class="text-xl font-black ${t.type === '接機' ? 'text-[#f07cad]' : 'text-[#553f62]'} leading-tight">${t.type}</span>
                                </div>
                            </div>
                            <div class="flex flex-wrap justify-end gap-1 max-w-[54%]">${tagsHtml}</div>
                        </div>
                        <div class="task-route mt-2 text-sm text-gray-600 leading-snug">${summaryRoute}</div>
                        <div class="mt-2 text-[10px] font-mono text-gray-400 flex justify-end items-center gap-1">${t.orderId} <span class="text-gray-300">❯</span></div>
                        ${actionArea}
                    </div>
                </div>`;
            }).join('');
        }

        // --- 打開/關閉 獨立任務明細頁 ---
        function openTaskDetail(orderId) {
            currentDetailOrderId = orderId;
            const t = tasks.find(x => x.orderId === orderId);
            if (!t) {
                closeTaskDetail();
                return;
            }
            if (!isTaskActionable(t)) {
                closeTaskDetail();
                Swal.fire('任務已過期', '此任務已超過回報期限，請聯絡調度由中控台處理。', 'info');
                return;
            }

            let currentStep = t.driverStatus || "未出發";
            
            // 動態按鈕產生邏輯
            let actionBtn = '';
            if(currentStep === "未出發" || !currentStep) {
                actionBtn = `<button onclick="updateStatus('${t.orderId}', '已收單')" class="w-full bg-[#553f62] text-white py-3.5 rounded-xl font-bold shadow-md text-base transition active:bg-[#463252]">確認收單</button>`;
            } else if(currentStep === "已收單") {
                actionBtn = `<button onclick="updateStatus('${t.orderId}', '已出發')" class="w-full bg-[#553f62] text-white py-3.5 rounded-xl font-bold shadow-md text-base transition">點我出發</button>`;
            } else if(currentStep === "已出發") {
                actionBtn = `<button onclick="updateStatus('${t.orderId}', '已抵達')" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-md text-base transition">已抵達上車點</button>`;
            } else if(currentStep === "已抵達") {
                actionBtn = `<button onclick="updateStatus('${t.orderId}', '客上')" class="w-full bg-blue-800 text-white py-3.5 rounded-xl font-bold shadow-md text-base transition">客戶已上車</button>`;
            } else if(currentStep === "客上") {
                actionBtn = `<button onclick="handleCheckout('${t.orderId}', '${t.paymentMethod || ''}')" class="w-full bg-gray-800 text-white py-3.5 rounded-xl font-bold shadow-md text-base transition">客下 (完成行程)</button>`;
            }

            let signContent = cleanVal(t.signboard) ? t.signboard : (t.remarks && t.remarks.includes('舉牌') ? '詳見客戶備註' : '');
            let hasSign = signContent !== '';
            let callBtn = hasSign ? '' : `<a href="tel:${t.custPhone}" class="ml-2 bg-red-600 text-white px-2 py-0.5 rounded-full text-[11px] font-bold shadow-sm inline-block tracking-wide">致電客戶</a>`;

            const paymentInfo = getDriverPaymentInfo(t);
            const isCashPayment = paymentInfo.isCash;
            const isBillingPayment = paymentInfo.isBilling;
            const isTransferPayment = paymentInfo.isTransfer;
            let paymentGuideHtml = '';
            if (isTransferPayment) {
                paymentGuideHtml = `<div class="flex justify-between items-center py-3 border-t-2 border-gray-100 mt-2"><span class="text-gray-500 font-bold mr-2">付款方式</span><span class="text-[#553f62] font-bold text-right">轉帳，不簽不收</span></div>`;
            } else if (isBillingPayment) {
                paymentGuideHtml = `<div class="flex justify-between items-center py-3 border-t-2 border-pink-100 mt-2"><span class="text-gray-500 font-bold mr-2">付款方式</span><span class="text-[#553f62] font-bold text-right">月結簽單，客下請簽名</span></div>`;
            }
            let cashHtml = '';
            if (paymentInfo.cashCollected > 0) {
                let amtToCollect = paymentInfo.cashCollected;
                cashHtml = `<div class="flex justify-between items-center py-3 border-t-2 border-red-100 mt-2"><span class="text-gray-500 mr-2">現場收現金額</span><div class="text-right"><div class="text-red-600 font-bold text-xl">$${amtToCollect.toLocaleString()}</div>${cleanVal(t.cashCollectionNote) ? `<div class="text-xs text-gray-500">${cleanVal(t.cashCollectionNote)}</div>` : ''}</div></div>`;
            }

            let cNote = cleanVal(t.remarks) ? cleanVal(t.remarks).replace(/\n/g, '<br>') : '';
            let dNote = cleanVal(t.driverNote) ? cleanVal(t.driverNote).replace(/\n/g, '<br>') : '';
            let companyHtml = '';
            
            let lug = cleanVal(t.luggage) === '0' ? '' : formatLuggageCount(t.luggage);
            let sport = cleanVal(t.sportLuggage);
            let luggageText = '';
            if(lug || sport) {
                luggageText = lug;
                if(sport) luggageText += (lug ? ' ' : '') + '(胖箱: ' + sport + ')';
            }

            let addressHtml = cleanVal(t.address) ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cleanVal(t.address))}" target="_blank" class="text-blue-600 underline">${cleanVal(t.address)}</a>` : '';
            let extraStopHtml = cleanVal(t.extraStop) ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cleanVal(t.extraStop))}" target="_blank" class="text-blue-600 underline">${cleanVal(t.extraStop)}</a>` : '';

            let html = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4">
                    <div class="flex justify-between items-baseline mb-2 border-b border-gray-100 pb-2">
                        <span class="text-xs font-mono text-gray-400">${t.orderId}</span>
                        <span class="text-[10px] font-mono text-gray-300">任務明細</span>
                    </div>
                    <div class="flex items-baseline justify-between gap-3 mb-3">
                        <div class="flex items-baseline min-w-0">
                            <span class="text-2xl font-black text-[#553f62] mr-3">${t.date.substring(5).replace('-', '/')}</span>
                            <span class="text-2xl font-black text-[#553f62]">${t.time}</span>
                        </div>
                        <span class="text-2xl font-black ${t.type === '接機' ? 'text-[#f07cad]' : 'text-[#553f62]'} shrink-0">${t.type}</span>
                    </div>
                    
                    <div class="space-y-0 text-sm bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div class="driver-field"><span class="driver-field-label">接送機場</span><span class="driver-field-value">${cleanVal(t.airport)}</span></div>
                        <div class="driver-field"><span class="driver-field-label">航班編號</span><span class="driver-field-value text-[#f07cad]">${cleanVal(t.flightNo)}</span></div>
                        <div class="driver-field">
                            <span class="driver-field-label">客戶姓名</span>
                            <div class="driver-field-value flex items-center justify-end"><span>${cleanVal(t.custName)}</span>${callBtn}</div>
                        </div>
                        <div class="driver-field"><span class="driver-field-label">接送地址</span><span class="driver-field-value">${addressHtml}</span></div>
                        <div class="driver-field"><span class="driver-field-label">加點地址</span><span class="driver-field-value">${extraStopHtml}</span></div>
                        <div class="driver-field"><span class="driver-field-label">乘車人數</span><span class="driver-field-value">${formatPassengerCount(t.paxCount)}</span></div>
                        <div class="driver-field"><span class="driver-field-label">行李件數</span><span class="driver-field-value">${luggageText}</span></div>
                        <div class="driver-field"><span class="driver-field-label">預約車型</span><span class="driver-field-value">${cleanVal(t.car)}</span></div>
                        <div class="driver-field"><span class="driver-field-label">兒童座椅</span><span class="driver-field-value">${cleanVal(t.seats)}</span></div>
                        <div class="driver-field"><span class="driver-field-label">舉牌內容</span><span class="driver-field-value">${signContent}</span></div>
                        <div class="driver-field"><span class="driver-field-label">客戶備註</span><span class="driver-field-value text-red-500">${cNote}</span></div>
                        <div class="driver-field !border-b-0"><span class="driver-field-label">車商備註</span><span class="driver-field-value text-yellow-800">${dNote}</span></div>
                        ${paymentGuideHtml}
                        ${companyHtml}
                        ${cashHtml}
                    </div>
                </div>
                
                <div class="flex flex-col gap-3 mt-4 mb-4">
                    ${actionBtn}
                    <button onclick="reportAnomaly('${t.orderId}')" class="w-full border border-red-300 text-red-500 py-3 rounded-xl font-bold text-sm bg-white hover:bg-red-50 transition">異常狀況回報</button>
                </div>
            `;

            document.getElementById('task-detail-content').innerHTML = html;
            document.getElementById('view-task-detail').classList.remove('hidden');
        }

        function closeTaskDetail() {
            currentDetailOrderId = null;
            document.getElementById('view-task-detail').classList.add('hidden');
        }

        // --- 狀態更新邏輯 (針對「收單」加速，不讀取 GPS) ---
        function renderHistory() {
            const container = document.getElementById('view-history');
            const recon = reconciliationData || { month: new Date().toISOString().substring(0, 7), totalPayout: 0, count: 0, orders: [] };
            const monthValue = recon.month || new Date().toISOString().substring(0, 7);
            const reconOrders = recon.orders || [];
            const totalCash = parseCashAmount(recon.totalCash || 0);
            const isSettled = o => ['已結清', '已付款'].includes(cleanVal(o.payoutStatus));
            const unsettledOrders = reconOrders.filter(o => !isSettled(o));
            const settledPayout = reconOrders.filter(isSettled).reduce((sum, o) => sum + Number(o.payout || 0), 0);
            const unsettledPayout = unsettledOrders.reduce((sum, o) => sum + Number(o.payout || 0), 0);
            const unsettledCash = unsettledOrders.reduce((sum, o) => sum + parseCashAmount(o.cashCollected), 0);
            const outstandingNet = unsettledPayout - unsettledCash;
            const outstandingLabel = outstandingNet >= 0 ? '公司應付司機' : '司機應繳回公司';
            const reconByOrderId = Object.fromEntries(reconOrders.map(o => [o.orderId, o]));
            const monthlyHistory = historyData.filter(t => String(t.date || '').startsWith(monthValue));
            const pendingReportCount = Number(recon.pendingReportCount || 0);
            const reconHtml = `
                <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                    <div class="flex items-center justify-between gap-2 mb-3">
                        <div>
                            <p class="text-xs text-gray-400">對帳月份</p>
                            <p class="text-sm text-[#553f62]">${monthValue}</p>
                        </div>
                        <input type="month" id="driverReconMonth" value="${monthValue}" onchange="loadHistory()" class="border rounded-lg px-2 py-1 text-sm text-[#553f62]">
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-3 text-xs">
                        <div class="bg-gray-50 rounded-lg p-2"><div class="text-gray-500">本月車資金額</div><div class="text-[#553f62] font-bold text-base">$${Number(recon.totalPayout || 0).toLocaleString()}</div></div>
                        <div class="bg-gray-50 rounded-lg p-2"><div class="text-gray-500">司機已收現金</div><div class="text-gray-800 font-bold text-base">$${totalCash.toLocaleString()}</div></div>
                        <div class="bg-gray-50 rounded-lg p-2"><div class="text-gray-500">已結清車資</div><div class="text-gray-800 font-bold text-base">$${settledPayout.toLocaleString()}</div></div>
                        <div class="bg-gray-50 rounded-lg p-2"><div class="text-gray-500">未結清車資</div><div class="text-[#553f62] font-bold text-base">$${unsettledPayout.toLocaleString()}</div></div>
                    </div>
                    <div class="rounded-lg px-3 py-3 mb-3 ${outstandingNet >= 0 ? 'bg-[#f5f1f7] text-[#553f62]' : 'bg-red-50 text-red-600'}">
                        <div class="text-xs">${outstandingLabel}</div>
                        <div class="text-xl font-bold">$${Math.abs(outstandingNet).toLocaleString()}</div>
                        <div class="text-[11px] opacity-80 mt-1">未結清車資 $${unsettledPayout.toLocaleString()} - 未結清已收現 $${unsettledCash.toLocaleString()}</div>
                    </div>
                    <div class="text-xs text-gray-500">本月共 ${recon.count || 0} 筆。${pendingReportCount ? `其中 ${pendingReportCount} 趟未確實回報。` : ''}</div>
                </div>`;

            const historyHtml = monthlyHistory.length === 0 ? `<div class="text-center text-gray-400 mt-8 text-sm">本月尚無對帳車趟</div>` : monthlyHistory.map(t => {
                const o = reconByOrderId[t.orderId] || {};
                const isAdjustment = (o.recordType || t.recordType) === '補貼/異常成本';
                const needsReport = Boolean(o.needsReport || t.needsReport);
                const cashCollected = parseCashAmount(o.cashCollected);
                const payout = Number(o.payout || 0);
                const balance = payout - cashCollected;
                const settled = isSettled(o);
                const paymentLabel = isAdjustment ? '補貼 / 異常成本' : (o.paymentStatus || o.paymentMethod || '未標示');
                const paymentHtml = cashCollected > 0
                    ? `${paymentLabel !== '司機收現' ? `<span class="mr-1">${paymentLabel}</span>` : ''}<span class="inline-flex px-1.5 py-0.5 rounded bg-gray-400 text-white">司機收現｜已收現 $${cashCollected.toLocaleString()}</span>`
                    : `<span>${paymentLabel}</span>`;
                const settledDate = o.payoutUpdatedAt ? ` ${String(o.payoutUpdatedAt).slice(5, 16)}` : '';
                const balanceHtml = settled
                    ? `<span class="inline-flex mt-1 px-1.5 py-0.5 rounded bg-[#553f62] text-white">已結清${settledDate}</span>`
                    : `<span class="inline-flex mt-1 px-1.5 py-0.5 rounded ${balance >= 0 ? 'bg-[#f5f1f7] text-[#553f62]' : 'bg-red-50 text-red-600'}">${balance >= 0 ? '公司應付' : '應繳回公司'} $${Math.abs(balance).toLocaleString()}</span>`;
                return `
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <div class="flex justify-between mb-1">
                        <span class="text-xs text-gray-600">${t.date} ${t.time}</span>
                        ${isAdjustment ? `<span class="text-xs text-[#553f62]">補貼</span>` : (needsReport ? `<span class="text-xs text-red-500">未確實回報</span>` : '')}
                    </div>
                    <div class="text-sm text-gray-600 whitespace-pre-line">${t.routeDisplay}</div>
                    <div class="text-xs text-gray-400 mt-1">${t.custNameMasked}</div>
                    <div class="flex justify-between items-end border-t border-gray-200 mt-3 pt-2">
                        <div class="text-xs text-gray-500">${paymentHtml}<br>${balanceHtml}${o.payoutNote ? `<span class="inline-flex ml-1 px-1.5 py-0.5 rounded bg-gray-400 text-white">備註：${displayNote(o.payoutNote)}</span>` : ''}</div>
                        <div class="text-right"><div class="text-[10px] text-gray-400">車資</div><div class="text-base font-bold text-[#553f62]">$${payout.toLocaleString()}</div></div>
                    </div>
                </div>
            `; }).join('');
            container.innerHTML = reconHtml + historyHtml;
        }

        async function updateStatus(orderId, newStatus, signatureDataUrl = '') {
            if (statusSubmitting) return false;
            if (!orderId) {
                Swal.fire('缺少預約單號', '請關閉任務明細後重新開啟，再進行回報。', 'error');
                return false;
            }
            if (newStatus === '已結案' && signatureDataUrl && !String(signatureDataUrl).startsWith('data:image/png;base64,')) {
                Swal.fire('簽名資料不完整', '請重新簽名後再送出。', 'error');
                return false;
            }
            statusSubmitting = true;
            try {
                const task = tasks.find(x => x.orderId === orderId);
                if (task && !isTaskActionable(task)) {
                    Swal.fire('任務已過期', '此任務已超過回報期限，請聯絡調度由中控台處理。', 'info');
                    statusSubmitting = false;
                    return false;
                }
                let coords = { lat: '', lng: '' };
                
                // 只有「收單」不需要等待定位，讓操作秒速完成
                if (newStatus !== '已收單') {
                    coords = await requireGPS(); 
                }

                Swal.fire({ title: '回報中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                
                await apiCall('driverUpdateStatus', {
                    orderId: orderId,
                    status: newStatus,
                    lat: coords.lat,
                    lng: coords.lng,
                    lineId: driverData.lineId,
                    signatureDataUrl,
                    driverName: driverData.name
                });
                
                Swal.fire({ title: '成功', text: `狀態更新為：${newStatus}`, icon: 'success', timer: 1000, showConfirmButton: false });
                loadTasks();
                statusSubmitting = false;
                return true;
            } catch(e) {
                if(e !== 'No Geolocation') Swal.fire('錯誤', e.message, 'error');
                statusSubmitting = false;
                return false;
            }
        }

        // --- 智能結案判定 (簽單 vs 免簽名) ---
        function handleCheckout(orderId, paymentMethod) {
            const task = tasks.find(x => x.orderId === orderId);
            if ((paymentMethod && (paymentMethod.includes('簽') || paymentMethod.includes('月結'))) || cleanVal(task?.companyName)) {
                openSigModal(orderId);
            } else {
                Swal.fire({
                    title: '確認完成行程？',
                    text: '此訂單付款方式為「轉帳/刷卡/付現」，不需簽單。',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#553f62',
                    confirmButtonText: '確認結案',
                    cancelButtonText: '取消'
                }).then((result) => {
                    if (result.isConfirmed) {
                        updateStatus(orderId, '已結案');
                        closeTaskDetail(); // 結案後關閉明細頁
                    }
                });
            }
        }

        // --- 異常回報 (LINE Notify) ---
        async function reportAnomaly(orderId) {
            const { value: formValues } = await Swal.fire({
                title: '異常狀況回報',
                html: `
                    <select id="anoType" class="w-full p-3 border rounded-xl mb-3 outline-none font-bold text-sm">
                        <option value="" selected disabled>請選擇異常類型</option>
                        <option value="人數/行李不符">現場人數/行李不符</option>
                        <option value="聯絡不上客人">聯絡不上客人</option>
                        <option value="臨時變更行程">客人臨時變更行程(加點等)</option>
                        <option value="車輛故障/事故">車輛故障或事故</option>
                        <option value="其他">其他緊急狀況</option>
                    </select>
                    <textarea id="anoNote" rows="3" class="w-full p-3 border rounded-xl outline-none text-sm placeholder-gray-400" placeholder="請簡述現場狀況..."></textarea>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonColor: '#e3342f',
                confirmButtonText: '立即通報調度',
                cancelButtonText: '取消',
                preConfirm: () => {
                    const type = document.getElementById('anoType').value;
                    if (!type) {
                        Swal.showValidationMessage('請選擇異常類型');
                        return false;
                    }
                    return { type, note: document.getElementById('anoNote').value }
                }
            });

            if (formValues) {
                Swal.fire({ title: '通報中', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    // ⚠️ 確保完整司機資訊送出
                    await apiCall('driverReportAnomaly', {
                        orderId: orderId,
                        type: formValues.type,
                        note: formValues.note,
                        driverName: driverData.name,
                        driverPhone: driverData.phone,
                        driverCarNo: driverData.carNo,
                        driverCarType: driverData.carType
                    });
                    Swal.fire('通報成功', '已發送至調度中心群組', 'success');
                } catch(e) { Swal.fire('通報失敗', '請直接撥打電話聯絡調度', 'error'); }
            }
        }

        // --- 簽名結案 ---
        function openSigModal(orderId) {
            currentSigOrderId = orderId;
            hasSignatureDrawn = false;
            const task = tasks.find(x => x.orderId === orderId);
            const company = cleanVal(task?.companyName) || '月結簽單';
            const dateTime = task ? `${task.date} ${task.time}` : '';
            document.getElementById('sigOrderInfo').innerText = `${company}｜${orderId}${dateTime ? '｜' + dateTime : ''}`;
            document.getElementById('sigModal').classList.remove('hidden');
            setTimeout(initCanvas, 100); 
        }

        async function submitSig() {
            if (!hasSignatureDrawn) {
                Swal.fire({
                    title: '請先完成簽名',
                    text: '月結簽單需要客戶簽名後，才可以客下完成。',
                    icon: 'warning',
                    confirmButtonColor: '#553f62'
                });
                return;
            }
            const signatureDataUrl = canvas.toDataURL('image/png');
            const ok = await updateStatus(currentSigOrderId, '已結案', signatureDataUrl);
            if (ok) {
                document.getElementById('sigModal').classList.add('hidden');
                closeTaskDetail(); // 結案後關閉明細頁
            }
        }

        window.onload = init;
    </script>
</body>
</html>
