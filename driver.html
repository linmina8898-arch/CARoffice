<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安興租車 - 司機系統綁定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="mainCard" class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm border-t-8 border-[#553f62] hidden">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-[#553f62]">司機資料綁定</h1>
            <p class="text-sm text-gray-500 mt-2 font-bold">請輸入代號與電話以完成綁定</p>
        </div>

        <form id="bindForm" class="space-y-5">
            <input type="hidden" id="lineId">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">司機代號 (例：A001)</label>
                <input type="text" id="driverCode" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#553f62] outline-none uppercase font-bold" placeholder="請輸入您的代號" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">登記的聯絡電話</label>
                <input type="tel" id="driverPhone" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#553f62] outline-none font-bold" placeholder="請輸入登記電話" required>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-[#553f62] text-white font-bold py-4 rounded-xl shadow-lg hover:bg-opacity-90 transition text-lg">確認綁定</button>
        </form>
    </div>

    <div id="loading" class="flex flex-col items-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-[#553f62] mb-4"></div>
        <p class="text-[#553f62] font-bold">身分驗證中...</p>
    </div>

    <script>
        const LIFF_ID = "2009922945-KmKUgqbg"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzUDj6qxlO7bCvz7wByuwzyydYsc-CeNh7K-kYVetwEtsRBVz7TzjHH_8umW3VwrhZh/exec";

        function safeClose() {
            if (liff.isInClient()) {
                liff.closeWindow();
            } else {
                Swal.fire({ title: '操作結束', text: '請手動關閉此視窗並回到 LINE。', confirmButtonColor: '#553f62' });
            }
        }

        async function init() {
            try {
                if (window !== window.parent) { document.getElementById('lineId').value = "Preview"; showForm(); return; }
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                document.getElementById('lineId').value = profile.userId;
                showForm();
            } catch (err) {
                Swal.fire({ title: '系統錯誤', text: 'LINE 連結失敗，請聯絡客服', icon: 'error' }).then(safeClose);
            }
        }

        function showForm() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainCard').classList.remove('hidden');
        }

        document.getElementById('bindForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = '正在處理中...';

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'bindDriverLine',
                        data: {
                            driverCode: document.getElementById('driverCode').value.trim().toUpperCase(),
                            phone: document.getElementById('driverPhone').value.trim().replace(/\D/g, ''),
                            lineId: document.getElementById('lineId').value
                        }
                    })
                });
                const result = await res.json();

                if (result.success) {
                    Swal.fire({ title: '綁定成功！', text: `${result.name} 司機您好，您的 LINE 已成功連結系統。`, icon: 'success', confirmButtonColor: '#553f62', allowOutsideClick: false }).then(safeClose);
                } else {
                    Swal.fire({ title: '綁定失敗', text: result.error, icon: 'error', confirmButtonColor: '#553f62', allowOutsideClick: false }).then(safeClose);
                }
            } catch (err) {
                Swal.fire({ title: '連線異常', text: '無法傳送資料，請聯絡客服協助', icon: 'error', confirmButtonColor: '#553f62', allowOutsideClick: false }).then(safeClose);
            }
        });

        window.onload = init;
    </script>
</body>
</html>
