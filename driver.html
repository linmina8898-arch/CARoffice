<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS派車 - 司機端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 恢復原本的流暢排版，字體統一調小 */
        body { font-family: sans-serif; background-color: #f3f4f6; font-weight: 400; }
        .text-xs-custom { font-size: 0.75rem; }
        .text-xxs { font-size: 0.65rem; }
        .nav-active { color: #553f62; border-top: 2px solid #553f62; font-weight: 400; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-700">

    <header class="bg-white px-4 py-3 flex justify-between items-center shadow-sm">
        <span class="text-[#553f62] font-normal">AS派車 Driver <span class="app-version-display"></span></span>
    </header>

    <main id="mainContent" class="flex-1 overflow-y-auto p-2 pb-16">
        <div id="task-list" class="space-y-2"></div>
    </main>

    <nav id="bottomNav" class="bg-white border-t flex justify-around items-center h-12 fixed bottom-0 w-full z-20">
        <button onclick="switchTab('tasks', this)" class="nav-active flex-1 h-full flex flex-col items-center justify-center">案件</button>
        <button onclick="switchTab('profile', this)" class="flex-1 h-full flex flex-col items-center justify-center">設定</button>
    </nav>

    <!-- 登入遮罩 -->
    <div id="authScreen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-[#553f62] mb-4"></div>
        <p id="authMsg">LINE 授權登入中...</p>
        <form id="bindForm" class="w-full max-w-sm mt-4 hidden">
            <input type="text" id="bindName" placeholder="司機真實姓名" class="w-full p-2 border mb-2 rounded border-gray-300">
            <input type="tel" id="bindPhone" placeholder="司機手機號碼" class="w-full p-2 border mb-2 rounded border-gray-300">
            <button type="submit" class="w-full bg-[#553f62] text-white py-2 rounded">立即綁定</button>
        </form>
        <div class="absolute bottom-6 text-gray-400 text-[10px]">v1.3.1</div>
    </div>

    <script>
        const APP_VERSION = "v1.3.1";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzMLYBvdbo4mkkEUVFcjST44oh7VUXhx7gZjWejm2R8XX549ITaReot0pRAN3mbwA8n/exec";
        
        window.onload = function() {
            document.querySelectorAll('.app-version-display').forEach(el => el.innerText = APP_VERSION);
            init();
        };

        async function init() {
            // 初始化邏輯 (LIFF 等)
            // 這裡保留您原有的初始化代碼
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            // 使用 text-xs (12px) 讓文字變小，但不會擠壓版面
            container.innerHTML = tasks.map(t => `
                <div class="bg-white p-3 rounded-lg border border-gray-200 text-xs">
                    <div class="flex justify-between mb-1">
                        <span class="text-gray-500">${t.time}</span>
                        <span class="text-[#f07cad] font-normal">${t.type}</span>
                    </div>
                    <div class="truncate text-gray-800">A: ${t.address}</div>
                    <div class="truncate text-gray-800">B: ${t.airport}</div>
                    <div class="mt-2 flex gap-1">
                        <button onclick="updateStatus('${t.orderId}', '已出發')" class="flex-1 bg-gray-100 py-1.5 rounded text-gray-700">出發</button>
                        <button onclick="updateStatus('${t.orderId}', '已抵達')" class="flex-1 bg-gray-100 py-1.5 rounded text-gray-700">抵達</button>
                        <button onclick="updateStatus('${t.orderId}', '客上')" class="flex-1 bg-gray-100 py-1.5 rounded text-gray-700">客上</button>
                        <button onclick="updateStatus('${t.orderId}', '已結案')" class="flex-1 bg-[#553f62] text-white py-1.5 rounded">結案</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(orderId, newStatus) {
            // 更新狀態邏輯
            // (確保使用與後端同步的 API Call)
        }

        function switchTab(tab, el) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            el.classList.add('nav-active');
        }
    </script>
</body>
</html>
