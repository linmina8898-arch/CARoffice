<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS-派車系統</title>
    <!-- 使用 Tailwind CSS 進行極簡 UI 佈局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 用於彈窗交互 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #553f62; --bg: #f9fafb; --text-main: #1f2937; --text-sub: #6b7280; --accent: #f07cad; border-color: #e5e7eb; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        .nav-active { color: var(--primary); font-weight: bold; border-bottom: 2px solid var(--primary); }
        .card { background: #fff; border: 1px solid var(--border-color); }
        .tag-badge { display: inline-block; padding: 2px 6px; font-size: 11px; border: 1px solid #d1d5db; color: #4b5563; }
        .text-accent { color: var(--accent); }
        /* 簽名板樣式 */
        #signaturePad { border: 1px solid #ccc; width: 100%; height: 160px; touch-action: none; background: #fff; }
        .detail-section { border-bottom: 1px solid #f3f4f6; padding-bottom: 0.3rem; margin-bottom: 0.3rem; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 頂部導航列 -->
    <header class="bg-white border-b border-gray-200 z-10 px-4 py-2 flex justify-between items-center shadow-sm">
        <div class="font-bold text-lg text-[#553f62] tracking-wider">安興租車 Driver</div>
        <button onclick="window.location.href='tel:0909150588'" class="text-xs font-bold text-[#553f62] border border-[#553f62] px-3 py-1 bg-gray-50 rounded">聯絡客服</button>
    </header>

    <!-- 主內容區 -->
    <main id="mainContent" class="flex-1 overflow-y-auto hidden pb-14 bg-[#f9fafb]">
        
        <!-- 視圖 1：服務案件清單與明細 -->
        <div id="view-tasks">
            <!-- 任務清單首頁 -->
            <div id="taskListView" class="p-2.5 space-y-3"></div>

            <!-- 任務詳細內頁 -->
            <div id="taskDetailView" class="hidden bg-white min-h-full">
                <div class="sticky top-0 bg-white border-b border-gray-200 px-4 py-1.5 flex items-center justify-between z-10 shadow-sm">
                    <button onclick="closeTaskDetail()" class="text-[#553f62] font-bold text-xs">◀ 返回</button>
                    <span class="text-xs font-bold text-gray-800" id="detailHeaderTitle"></span>
                    <button id="anomalyBtn" class="text-[10px] text-red-600 border border-red-200 bg-red-50 px-2 py-1 rounded font-bold">異況回報</button>
                </div>
                
                <div class="p-3 space-y-0.5" id="taskDetailContent"></div>

                <!-- 動作按鈕區 -->
                <div class="p-4 bg-gray-50 border-t border-gray-200" id="taskActionArea"></div>
            </div>
        </div>

        <!-- 視圖 2：歷史結案紀錄 -->
        <div id="view-history" class="p-2.5 space-y-2 hidden"></div>

        <!-- 視圖 3：司機個人中心 -->
        <div id="view-profile" class="p-4 hidden">
            <div class="card p-4 text-center shadow-sm rounded-lg">
                <div class="w-10 h-10 bg-gray-100 rounded-full mx-auto mb-2 flex items-center justify-center border border-gray-200">
                    <span class="text-[#553f62] font-bold text-base">AS</span>
                </div>
                <h2 id="profName" class="text-sm font-bold text-gray-800">讀取中...</h2>
                <div class="mt-4 pt-4 border-t border-gray-100 grid grid-cols-2 gap-2 divide-x divide-gray-100">
                    <div><p class="text-[9px] text-gray-400">上月趟次</p><p id="profCountLast" class="text-base font-bold text-gray-800">0</p></div>
                    <div><p class="text-[9px] text-gray-400">本月趟次</p><p id="profCountThis" class="text-base font-bold text-[#553f62]">0</p></div>
                </div>
                <div class="mt-4 pt-2 border-t border-gray-100 text-left text-xs space-y-1.5 text-gray-600">
                    <div class="flex justify-between"><span>車號</span><span class="font-bold text-gray-800" id="profCarNo">-</span></div>
                    <div class="flex justify-between"><span>車型</span><span class="font-bold text-gray-800" id="profCarType">-</span></div>
                    <div class="flex justify-between"><span>保單到期</span><span class="font-bold text-gray-800" id="profInsurance">-</span></div>
                </div>
            </div>
            <div class="text-center text-[10px] text-gray-400 mt-4 font-mono">v<span class="version-display"></span></div>
        </div>
    </main>

    <!-- 底部切換選單 -->
    <nav id="bottomNav" class="bg-white border-t border-gray-200 flex justify-around items-center h-11 fixed bottom-0 w-full z-20 hidden">
        <button onclick="switchTab('tasks', this)" class="nav-btn nav-active flex-1 h-full text-[10px]">服務案件</button>
        <button onclick="switchTab('history', this)" class="nav-btn flex-1 h-full text-[10px] text-gray-500">歷史案件</button>
        <button onclick="switchTab('profile', this)" class="nav-btn flex-1 h-full text-[10px] text-gray-500">個人中心</button>
    </nav>

    <!-- 登入/綁定 遮罩 -->
    <div id="authScreen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#553f62] mb-4" id="authSpinner"></div>
        <p id="authMsg" class="text-[#553f62] text-sm font-bold">驗證中...</p>
        <form id="bindForm" class="w-full max-w-sm mt-8 hidden space-y-4">
            <h2 class="text-lg font-bold text-center text-[#553f62] mb-2">帳號綁定</h2>
            <div class="bg-[#f8f6fa] border border-[#553f62] p-3 text-center mb-2 rounded-lg">
                <span class="text-xs text-gray-500">當前 LINE：</span><span id="bindLineName" class="text-sm font-bold text-[#553f62]"></span>
            </div>
            <input type="text" id="bindName" placeholder="真實姓名" class="w-full p-3 border border-gray-300 text-sm focus:outline-none focus:border-[#553f62] rounded-lg" required>
            <input type="tel" id="bindPhone" placeholder="手機號碼" maxlength="12" class="w-full p-3 border border-gray-300 text-sm focus:outline-none focus:border-[#553f62] rounded-lg" required>
            <button type="submit" class="w-full bg-[#553f62] text-white py-3 font-bold text-sm mt-2 rounded-lg">確認綁定</button>
        </form>
        <div class="absolute bottom-4 text-center text-[10px] text-gray-400 font-mono">v<span class="version-display"></span></div>
    </div>

    <!-- 電子簽名視窗 -->
    <div id="sigModal" class="fixed inset-0 bg-white z-[60] flex flex-col hidden">
        <div class="p-4 border-b border-gray-200 text-center font-bold text-[#553f62] bg-gray-50 flex justify-between items-center">
            <span>簽名確認</span><button onclick="closeSigModal()" class="text-gray-400 text-xl px-2">✕</button>
        </div>
        <div class="flex-1 p-4 flex flex-col items-center justify-center space-y-4">
            <canvas id="signaturePad" class="shadow-inner border border-gray-100 rounded"></canvas>
            <div class="flex justify-between w-full gap-3">
                <button onclick="clearSig()" class="flex-1 py-3 border border-gray-300 text-gray-600 font-bold text-xs rounded-lg">重簽</button>
                <button onclick="submitSig()" class="flex-1 py-3 bg-[#553f62] text-white font-bold text-xs rounded-lg">完成</button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009971109-pdmG3XEe"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbygdo8tU2q6XOcxGCRaQqKl13BsbOXQPAKynQuXmeur-kfGz4-pZox11pQ6TruDSW27/exec"; 
        const DRIVER_VERSION = "v1.9.9";
        
        document.querySelectorAll('.version-display').forEach(el => el.innerText = DRIVER_VERSION);
        let driverData = null, tasks = [], currentDetailTask = null, currentSigOrderId = null, cachedCoords = null;

        // GPS 預熱：點開頁面時就在背景抓定位，增加回報速度
        function preWarmGPS() { 
            navigator.geolocation.getCurrentPosition((pos) => { 
                cachedCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude }; 
            }, null, { enableHighAccuracy: true }); 
        }

        const canvas = document.getElementById('signaturePad'), ctx = canvas.getContext('2d');
        let isDrawing = false;
        function initCanvas() { canvas.width = canvas.parentElement.clientWidth - 32; canvas.height = 180; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000'; }
        canvas.addEventListener('touchstart', e => { isDrawing=true; const rect = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); e.preventDefault(); });
        canvas.addEventListener('touchmove', e => { if(!isDrawing)return; const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); ctx.stroke(); e.preventDefault(); });
        canvas.addEventListener('touchend', () => isDrawing=false);
        function clearSig() { ctx.clearRect(0,0, canvas.width, canvas.height); }
        function closeSigModal() { document.getElementById('sigModal').classList.add('hidden'); }

        // 強設定位：若背景預熱失敗，則現場抓取並設定短超時
        function requireGPS() {
            return new Promise((resolve) => {
                if (cachedCoords) { resolve(cachedCoords); return; }
                navigator.geolocation.getCurrentPosition(
                    (pos) => { cachedCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude }; resolve(cachedCoords); },
                    () => { resolve({ lat: 0, lng: 0 }); }, 
                    { enableHighAccuracy: true, timeout: 3000 }
                );
            });
        }

        async function apiCall(action, data) {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: action, data: data }) }).then(r=>r.json());
            if(!res.success) throw new Error(res.error || 'API 錯誤');
            return res;
        }

        async function init() {
            try {
                if(window !== window.parent || !LIFF_ID || LIFF_ID === "YOUR_DRIVER_LIFF_ID") { 
                    document.getElementById('authMsg').innerText = "預覽模式"; document.getElementById('authSpinner').classList.add('hidden'); document.getElementById('bindForm').classList.remove('hidden'); document.getElementById('bindForm').onsubmit = (e) => handleBind(e, "TEST_ID"); return;
                }
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                const checkRes = await apiCall('driverCheckAuth', { lineId: profile.userId });
                if(checkRes.isBound) { driverData = checkRes.driver; showMainApp(); } 
                else { 
                    document.getElementById('authMsg').innerText = "請驗證身分"; 
                    document.getElementById('authSpinner').classList.add('hidden'); 
                    document.getElementById('bindLineName').innerText = profile.displayName; 
                    document.getElementById('bindForm').classList.remove('hidden'); 
                    document.getElementById('bindForm').onsubmit = (e) => handleBind(e, profile.userId); 
                }
            } catch (err) { Swal.fire('錯誤', '初始化失敗', 'error'); }
        }

        async function handleBind(e, lineId) {
            e.preventDefault(); const btn = e.target.querySelector('button'); btn.disabled = true; btn.innerText = "處理中...";
            try { 
                const res = await apiCall('driverBindAuth', { lineId: lineId, lineName: document.getElementById('bindLineName').innerText, name: document.getElementById('bindName').value.trim(), phone: document.getElementById('bindPhone').value.trim() }); 
                driverData = res.driver; showMainApp(); 
            } catch (err) { Swal.fire('失敗', err.message, 'error'); btn.disabled = false; btn.innerText = "確認"; }
        }

        function showMainApp() { 
            document.getElementById('authScreen').classList.add('hidden'); document.getElementById('mainContent').classList.remove('hidden'); document.getElementById('bottomNav').classList.remove('hidden'); 
            document.getElementById('profName').innerText = driverData.name; 
            document.getElementById('profCarNo').innerText = driverData.carNo; 
            document.getElementById('profCarType').innerText = driverData.carType; 
            document.getElementById('profInsurance').innerText = driverData.insurance;
            loadTasks(); 
        }

        function switchTab(tab, el) { 
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-gray-500'); }); 
            el.classList.remove('text-gray-500'); el.classList.add('nav-active'); 
            ['tasks', 'history', 'profile'].forEach(t => document.getElementById(`view-${t}`).classList.add('hidden')); 
            document.getElementById(`view-${tab}`).classList.remove('hidden'); 
            if(tab === 'tasks') { closeTaskDetail(); loadTasks(); } 
            if(tab === 'history') loadHistory(); 
        }

        function getRelativeDay(dateStr) { 
            const today = new Date(); today.setHours(0,0,0,0); 
            const target = new Date(dateStr); target.setHours(0,0,0,0); 
            const diffDays = Math.round((target - today) / (1000 * 60 * 60 * 24)); 
            let label = (diffDays === 0) ? '今天' : (diffDays === 1) ? '明天' : (diffDays === 2) ? '後天' : (diffDays < 0) ? '過往' : '未來'; 
            return `${label} ${dateStr}`; 
        }

        async function loadTasks() { 
            try { 
                const res = await apiCall('driverGetTasks', { lineId: driverData.lineId }); 
                tasks = res.tasks; 
                document.getElementById('profCountThis').innerText = res.thisMonthCount; 
                document.getElementById('profCountLast').innerText = res.lastMonthCount; 
                renderTaskList(); 
                if(currentDetailTask) { 
                    const updatedTask = tasks.find(t => t.orderId === currentDetailTask.orderId); 
                    if(updatedTask) openTaskDetail(updatedTask.orderId); else closeTaskDetail(); 
                } 
            } catch(e) {} 
        }

        function renderTaskList() {
            const container = document.getElementById('taskListView');
            if(tasks.length === 0) { container.innerHTML = `<div class="text-center text-gray-400 mt-10 text-xs font-bold">目前無派車任務</div>`; return; }
            let html = ''; 
            const sorted = tasks.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
            sorted.forEach(t => {
                let sText = t.driverStatus || "待命", sColor = sText === "待命" ? "text-gray-300" : "text-[#553f62]";
                let cleanAddr = t.address.replace(/^\d{3}/, '').trim(), area = cleanAddr.substring(0, 10);
                let route = t.type === '接機' ? `${t.airport} → ${area}` : `${area} → ${t.airport}`;
                let hasExtra = t.extraStop && t.extraStop !== '無';
                html += `
                    <div onclick="openTaskDetail('${t.orderId}')" class="card p-2 rounded flex justify-between items-center active:bg-gray-50 border-l-4 border-l-[#553f62] shadow-sm">
                        <div class="flex-1 min-w-0 pr-2">
                            <div class="flex items-center space-x-1.5">
                                <span class="font-bold text-sm text-gray-800">${t.date.slice(5)} ${t.time}</span>
                                <span class="tag-badge rounded-sm px-1 py-0">${t.type}</span>
                                ${hasExtra ? `<span class="text-[9px] font-black text-accent border border-pink-100 bg-pink-50 px-1 rounded-sm">加點</span>` : ''}
                            </div>
                            <div class="text-[10px] text-gray-500 font-medium truncate">${route}</div>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <span class="text-[9px] font-bold ${sColor} border px-1.5 py-0 rounded-full">${sText}</span>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function openTaskDetail(orderId) {
            const t = tasks.find(x => x.orderId === orderId); if(!t) return; currentDetailTask = t;
            preWarmGPS();
            document.getElementById('taskListView').classList.add('hidden'); document.getElementById('taskDetailView').classList.remove('hidden');
            document.getElementById('detailHeaderTitle').innerText = `${t.date} ${t.time}`;
            let airportStr = `${t.airport} ${t.flightNo && t.flightNo !== '無' ? t.flightNo : ''}`.trim();
            let cashHtml = ''; 
            if(t.paymentMethod && t.paymentMethod.includes('現')) { 
                cashHtml = `<div class="mt-2 p-2 bg-pink-50 border border-pink-100 rounded flex justify-between items-center"><span class="text-xs font-bold text-gray-700">應收現金</span><span class="text-lg font-black text-accent">$${t.grandTotal || 0}</span></div>`; 
            }
            document.getElementById('taskDetailContent').innerHTML = `
                <div class="detail-section flex justify-between items-center">
                    <div><div class="text-[9px] text-gray-400 font-bold uppercase">乘客姓名</div><div class="font-bold text-base text-gray-800">${t.custName}</div></div>
                    <a href="tel:${t.custPhone}" class="bg-[#553f62] text-white p-2 rounded-full shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.037 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                    </a>
                </div>
                <div class="detail-section">
                    <div class="grid grid-cols-2 gap-2 bg-gray-50 p-2 rounded">
                        <div><div class="text-[9px] text-gray-400 font-bold uppercase">行程類別</div><div class="font-bold text-xs text-[#553f62]">${t.type}</div></div>
                        <div><div class="text-[9px] text-gray-400 font-bold uppercase">航班</div><div class="font-bold text-xs text-gray-800">${airportStr}</div></div>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="text-[9px] text-gray-400 font-bold uppercase mb-0.5">接送地址</div>
                    <div class="text-xs font-bold text-gray-800 leading-tight bg-blue-50 p-2 rounded border border-blue-100" onclick="window.location.href='https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t.address)}'">
                        ${t.address} <span class="text-[9px] text-blue-500 underline ml-1">導航</span>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="grid grid-cols-2 gap-y-1 gap-x-2 text-[10px] bg-white border border-gray-100 p-2 rounded shadow-sm">
                        <div><span>人數</span> <span class="font-bold text-[#553f62]">${t.paxCount}</span></div>
                        <div><span>行李</span> <span class="font-bold">${t.luggage}件</span></div>
                        <div class="border-t border-gray-50 pt-1"><span>胖箱</span> <span class="font-bold">${t.sportLuggage}</span></div>
                        <div class="border-t border-gray-50 pt-1"><span>座椅</span> <span class="font-bold">${t.seats}</span></div>
                    </div>
                    ${t.extraStop && t.extraStop !== '無' ? `
                    <div class="mt-2 p-1.5 bg-[#fff5f8] border border-pink-100 rounded shadow-sm">
                        <div class="text-[9px] text-accent font-black uppercase mb-0.5">加點服務</div>
                        <div class="text-xs font-bold text-gray-800">${t.extraStop}</div>
                    </div>` : ''}
                </div>
                <div class="space-y-1.5">
                    ${t.remarks && t.remarks !== '無' ? `<div><div class="text-[9px] text-gray-400 font-bold uppercase">備註</div><div class="bg-yellow-50 p-2 rounded text-[11px] text-gray-700 border border-yellow-100 font-bold leading-normal">${t.remarks}</div></div>` : ''}
                    ${cashHtml}
                </div>
            `;
            document.getElementById('anomalyBtn').onclick = () => reportAnomaly(t.orderId);
            let s = t.driverStatus || "未出發", bT = '出發', nS = '已出發'; 
            if (s === '已出發') { bT = '抵達'; nS = '已抵達'; } else if (s === '已抵達') { bT = '客上'; nS = '客上'; } else if (s === '客上') { bT = '結案'; nS = '已結案'; }
            document.getElementById('taskActionArea').innerHTML = `<button onclick="handleStatusClick('${t.orderId}', '${nS}', '${t.paymentMethod || ''}')" class="w-full bg-[#553f62] text-white py-3 rounded-lg text-sm font-black active:scale-[0.98] transition-all shadow-md">${bT}</button>`;
        }

        function closeTaskDetail() { currentDetailTask = null; document.getElementById('taskDetailView').classList.add('hidden'); document.getElementById('taskListView').classList.remove('hidden'); }
        
        async function handleStatusClick(o, n, p) { 
            if (n === '已結案' && p.includes('簽')) { 
                openSigModal(o); 
            } else if (n === '已結案') { 
                const r = await Swal.fire({ title: '確認結案？', icon: 'question', showCancelButton: true, confirmButtonColor: '#553f62', confirmButtonText: '確定', cancelButtonText: '取消' }); 
                if(r.isConfirmed) updateStatus(o, n); 
            } else { 
                updateStatus(o, n); 
            } 
        }

        async function updateStatus(o, n) { 
            try { 
                const c = await requireGPS(); 
                await apiCall('driverUpdateStatus', { orderId: o, status: n, lat: c.lat, lng: c.lng, lineId: driverData.lineId }); 
                Swal.fire({ title: n + '成功', icon: 'success', timer: 700, showConfirmButton: false }); 
                loadTasks(); 
            } catch(e) { Swal.fire('打卡失敗', '請重試', 'error'); } 
        }

        async function reportAnomaly(o) {
            const { value: f } = await Swal.fire({ title: '異況回報', html: `<select id="anoType" class="w-full p-2 border border-gray-300 mb-2 text-sm rounded font-bold"><option value="人數/行李不符">人數/行李不符</option><option value="聯絡不上客人">聯絡不上客人</option><option value="臨時變更行程">臨時變更行程</option><option value="車輛故障/事故">車輛故障或事故</option><option value="其他">其他</option></select><textarea id="anoNote" rows="2" class="w-full p-2 border border-gray-300 text-sm rounded font-bold" placeholder="簡述狀況..."></textarea>`, focusConfirm: false, showCancelButton: true, confirmButtonColor: '#e3342f', confirmButtonText: '送出', cancelButtonText: '取消', preConfirm: () => { return { type: document.getElementById('anoType').value, note: document.getElementById('anoNote').value } } });
            if (f) { 
                try { 
                    await apiCall('driverReportAnomaly', { 
                        orderId: o, type: f.type, note: f.note, 
                        driverName: driverData.name, 
                        driverPhone: driverData.phone, 
                        driverCarNo: driverData.carNo, 
                        driverCarType: driverData.carType 
                    }); 
                    Swal.fire('已通報', '', 'success'); 
                } catch(e) { Swal.fire('失敗', '請直撥客服', 'error'); } 
            }
        }

        async function loadHistory() { 
            Swal.showLoading(); 
            try { 
                const res = await apiCall('driverGetHistory', { lineId: driverData.lineId }); 
                const c = document.getElementById('view-history'); 
                if(res.history.length === 0) { c.innerHTML = `<div class="text-center text-gray-400 mt-10 text-xs">無紀錄</div>`; Swal.close(); return; } 
                c.innerHTML = res.history.map(t => `
                    <div class="card p-3 rounded mb-2 shadow-sm">
                        <div class="text-xs font-bold text-gray-800">${t.date} ${t.time} ${t.type}</div>
                        <div class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">${t.routeDisplay} &nbsp;&nbsp; ${t.custNameMasked}</div>
                    </div>`).join(''); 
                Swal.close(); 
            } catch(e) { Swal.fire('錯誤', '無法載入', 'error'); } 
        }

        function openSigModal(o) { currentSigOrderId = o; document.getElementById('sigModal').classList.remove('hidden'); setTimeout(initCanvas, 100); }
        async function submitSig() { document.getElementById('sigModal').classList.add('hidden'); await updateStatus(currentSigOrderId, '已結案'); }
        
        window.onload = init;
    </script>
</body>
</html>
