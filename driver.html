<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS派車 - 司機端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 僅縮小字體與移除粗體，不破壞版面結構 */
        * { font-size: 10px !important; font-weight: 400 !important; }
        body { background: #f3f4f6; }
        .nav-active { color: #553f62; border-top: 2px solid #553f62; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-700">
    <header class="bg-white px-2 py-1 flex justify-between items-center shadow-sm">
        <span class="text-[#553f62]">AS派車 Driver</span>
        <span class="text-gray-400">v1.3.1</span>
    </header>

    <main id="mainContent" class="flex-1 overflow-y-auto p-1 pb-12">
        <div id="task-list" class="space-y-1"></div>
    </main>

    <nav id="bottomNav" class="bg-white border-t flex justify-around items-center h-10 fixed bottom-0 w-full z-20">
        <button onclick="switchTab('tasks', this)" class="nav-active flex-1">案件</button>
        <button onclick="switchTab('profile', this)" class="flex-1">設定</button>
    </nav>

    <!-- 登入頁版本顯示 -->
    <div id="authScreen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6">
        <p>系統版本: v1.3.1</p>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzMLYBvdbo4mkkEUVFcjST44oh7VUXhx7gZjWejm2R8XX549ITaReot0pRAN3mbwA8n/exec";
        let tasks = [];

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = tasks.map(t => `
                <div class="bg-white p-2 rounded border border-gray-100 overflow-hidden">
                    <div class="flex justify-between mb-1">
                        <span>${t.time}</span>
                        <span class="text-[#f07cad]">${t.type}</span>
                    </div>
                    <div class="truncate">A: ${t.address}</div>
                    <div class="truncate">B: ${t.airport}</div>
                    <div class="mt-1 flex gap-1">
                        <button onclick="updateStatus('${t.orderId}', '已出發')" class="flex-1 bg-gray-100 py-1 rounded">出發</button>
                        <button onclick="updateStatus('${t.orderId}', '已抵達')" class="flex-1 bg-gray-100 py-1 rounded">抵達</button>
                        <button onclick="updateStatus('${t.orderId}', '客上')" class="flex-1 bg-gray-100 py-1 rounded">客上</button>
                        <button onclick="updateStatus('${t.orderId}', '已結案')" class="flex-1 bg-[#553f62] text-white py-1 rounded">結案</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(orderId, newStatus) {
            tasks = tasks.map(t => t.orderId === orderId ? {...t, driverStatus: newStatus} : t);
            renderTasks();
            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'driverUpdateStatus', data: { orderId, status: newStatus }}) });
            } catch(e) { location.reload(); }
        }

        async function init() {
            tasks = [{ orderId: 'T1', time: '14:30', type: '接機', address: '台北市信義區', airport: '桃園機場' }];
            renderTasks();
            document.getElementById('authScreen').classList.add('hidden');
        }
        window.onload = init;
    </script>
</body>
</html>
