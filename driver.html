<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS派車 - 司機端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #553f62; --accent: #f07cad; --bg: #f3f4f6; }
        body { font-family: sans-serif; background-color: var(--bg); -webkit-tap-highlight-color: transparent; }
        .nav-active { color: var(--primary); font-weight: 800; border-bottom: 3px solid var(--primary); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        /* 簽名板 */
        #signaturePad { border: 2px dashed #cbd5e1; border-radius: 8px; width: 100%; height: 200px; touch-action: none; background: #fff; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-800">

    <!-- 頂部導航 -->
    <header class="bg-white shadow-sm z-10 px-4 py-3 flex justify-between items-center">
        <div class="font-black text-xl text-[#553f62] tracking-widest">AS派車 <span class="text-sm font-bold text-[#f07cad]">Driver</span></div>
        <button onclick="window.location.href='tel:0955311306'" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-full text-xs font-bold border border-red-200 shadow-sm flex items-center gap-1">
            聯絡客服
        </button>
    </header>

    <!-- 主視圖區 -->
    <main id="mainContent" class="flex-1 overflow-y-auto p-4 hidden pb-20">
        <!-- 任務列表 (預設) -->
        <div id="view-tasks">
            <!-- 分頁標籤 -->
            <div class="flex space-x-2 mb-4 bg-gray-200 p-1 rounded-lg shadow-inner justify-center max-w-sm mx-auto">
                <button id="tab-today" class="task-tab-btn px-4 py-1.5 rounded-md text-sm font-bold bg-white text-[#553f62] shadow-sm flex-1" onclick="setTaskTab('today')">今天</button>
                <button id="tab-tomorrow" class="task-tab-btn px-4 py-1.5 rounded-md text-sm text-gray-500 font-bold flex-1" onclick="setTaskTab('tomorrow')">明天</button>
                <button id="tab-all" class="task-tab-btn px-4 py-1.5 rounded-md text-sm text-gray-500 font-bold flex-1" onclick="setTaskTab('all')">全部</button>
            </div>
            <!-- 任務清單 -->
            <div id="task-list" class="space-y-4"></div>
        </div>
        
        <!-- 歷史紀錄 -->
        <div id="view-history" class="space-y-4 hidden"></div>
        
        <!-- 個人中心 -->
        <div id="view-profile" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 id="profName" class="text-2xl font-black text-[#553f62] text-center mb-6 border-b border-gray-100 pb-4">讀取中...</h2>
                <div class="space-y-4 text-sm">
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">聯絡電話</span><span id="profPhone" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">服務車號</span><span id="profCarNo" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">車輛顏色</span><span id="profCarColor" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">車型款式</span><span id="profCarType" class="font-bold text-gray-800"></span></div>
                    <div class="h-px bg-gray-100 my-2"></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">銀行代碼</span><span id="profBankCode" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">銀行帳號</span><span id="profBankAcc" class="font-bold text-gray-800"></span></div>
                    <div class="h-px bg-gray-100 my-2"></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">駕照到期日</span><span id="profLicense" class="font-bold text-gray-800"></span></div>
                    <div class="flex justify-between items-center"><span class="text-gray-500 font-bold">保險到期日</span><span id="profInsurance" class="font-bold text-gray-800"></span></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部導航列 -->
    <nav id="bottomNav" class="bg-white border-t border-gray-200 flex justify-around items-center h-16 fixed bottom-0 w-full z-20 hidden shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('tasks', this)" class="nav-btn nav-active flex-1 h-full flex flex-col items-center justify-center text-gray-400 transition">
            <span class="text-sm font-bold mb-0.5">服務案件</span>
        </button>
        <button onclick="switchTab('history', this)" class="nav-btn flex-1 h-full flex flex-col items-center justify-center text-gray-400 transition">
            <span class="text-sm font-bold mb-0.5">歷史案件</span>
        </button>
        <button onclick="switchTab('profile', this)" class="nav-btn flex-1 h-full flex flex-col items-center justify-center text-gray-400 transition">
            <span class="text-sm font-bold mb-0.5">個人中心</span>
        </button>
    </nav>

    <!-- 綁定/登入遮罩 -->
    <div id="authScreen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-[#553f62] mb-4" id="authSpinner"></div>
        <p id="authMsg" class="text-[#553f62] font-bold">LINE 授權登入中...</p>
        
        <form id="bindForm" class="w-full max-w-sm mt-8 hidden space-y-4">
            <h2 class="text-xl font-black text-center text-[#553f62] mb-2">司機帳號綁定</h2>
            <p class="text-xs text-gray-500 text-center mb-6">首次登入需驗證身分，後續將自動登入</p>
            <input type="text" id="bindName" placeholder="司機真實姓名" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-[#553f62] outline-none font-bold" required>
            <input type="tel" id="bindPhone" placeholder="司機手機號碼 (0900-000-000)" maxlength="12" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-[#553f62] outline-none font-bold" required>
            <button type="submit" class="w-full bg-[#f07cad] text-white py-3.5 rounded-xl font-black shadow-md">立即綁定</button>
        </form>
        
        <!-- 登入頁版本號顯示 -->
        <div class="absolute bottom-6 text-center text-[10px] text-gray-400 font-mono">
            System Version: <span class="app-version-display"></span>
        </div>
    </div>

    <!-- 簽名板 Modal -->
    <div id="sigModal" class="fixed inset-0 bg-black/80 z-[60] flex flex-col hidden">
        <div class="p-4 bg-white text-center font-bold text-[#553f62] shadow-sm">客戶確認簽名</div>
        <div class="flex-1 bg-gray-100 p-4 flex flex-col justify-center">
            <p class="text-xs text-red-500 text-center mb-2 font-bold">※ 請客戶於下方框內簽名，確認行程已安全結束</p>
            <canvas id="signaturePad"></canvas>
            <div class="flex justify-between mt-4">
                <button onclick="clearSig()" class="px-6 py-2 bg-gray-300 text-gray-700 rounded-lg font-bold">重簽</button>
                <button onclick="submitSig()" class="px-6 py-2 bg-[#553f62] text-white rounded-lg font-bold">完成結案</button>
            </div>
        </div>
        <button onclick="closeSigModal()" class="absolute top-3 right-4 text-gray-400 text-2xl font-bold">✕</button>
    </div>

    <script>
        // --- 系統版本記錄 ---
        const APP_VERSION = "v1.4.0";

        // ⚠️ 請填入專屬的司機端 LIFF ID
        const LIFF_ID = "2009971109-pdmG3XEe"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyHkLho-EhceBtJCSd0Vz5e1NtSDILWH08nD_8jJoJzd4c7unaXiI6q_A0ETgpuYG5x/exec"; // 最新的 GAS 網址

        let driverData = null;
        let tasks = [];
        let historyData = [];
        let currentSigOrderId = null;
        let currentTaskTab = 'today'; 
        
        // 簽名板邏輯
        const canvas = document.getElementById('signaturePad');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        function initCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 200;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#553f62';
        }
        
        canvas.addEventListener('touchstart', e => { isDrawing=true; const rect = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); e.preventDefault(); });
        canvas.addEventListener('touchmove', e => { if(!isDrawing)return; const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); ctx.stroke(); e.preventDefault(); });
        canvas.addEventListener('touchend', () => isDrawing=false);
        function clearSig() { ctx.clearRect(0,0, canvas.width, canvas.height); }
        function closeSigModal() { document.getElementById('sigModal').classList.add('hidden'); }

        // --- 自動格式化手機號碼 (0900-000-000) ---
        document.getElementById('bindPhone').addEventListener('input', function(e) {
            let val = e.target.value.replace(/\D/g, ''); 
            if(val.length > 4) {
                val = val.replace(/(\d{4})(\d{3})?(\d{0,3})?/, (m, p1, p2, p3) => p1 + (p2 ? '-' + p2 : '') + (p3 ? '-' + p3 : ''));
            }
            e.target.value = val;
        });

        // --- 核心：強制 GPS 定位 ---
        function requireGPS() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    Swal.fire('錯誤', '您的設備不支援定位功能', 'error');
                    reject('No Geolocation');
                }
                Swal.fire({ title: '取得定位中', text: '請稍候...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        Swal.close();
                        resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    },
                    (err) => {
                        Swal.close();
                        Swal.fire({
                            title: '定位遭拒絕',
                            html: '<p class="text-left text-sm text-gray-600">系統必須取得 GPS 定位才能執行回報。<br><br>👉 請至手機設定開啟「位置資訊」權限，或聯絡調度。</p>',
                            icon: 'warning',
                            showCancelButton: true,
                            confirmButtonText: '聯絡調度',
                            cancelButtonText: '取消'
                        }).then((r) => { if(r.isConfirmed) window.location.href='tel:0955311306'; });
                        reject(err);
                    },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            });
        }

        // --- 核心：API 溝通 ---
        async function apiCall(action, data) {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: action, data: data }) }).then(r=>r.json());
            if(!res.success) throw new Error(res.error || 'API 錯誤');
            return res;
        }

        // --- 初始化與登入 ---
        async function init() {
            document.querySelectorAll('.app-version-display').forEach(el => el.innerText = APP_VERSION);

            try {
                if(window !== window.parent) { 
                    // 預覽模式假資料
                    document.getElementById('authMsg').innerText = "預覽模式：請輸入司機資料";
                    document.getElementById('authSpinner').classList.add('hidden');
                    document.getElementById('bindForm').classList.remove('hidden');
                    
                    driverData = { 
                        name: '王小明', phone: '0900-123-456', carNo: 'ABC-1234', carColor: '黑色', carType: '大車', 
                        bankCode: '822', bankAcc: '1234567890', license: '2030-01-01', insurance: '2025-12-31', lineId: 'preview' 
                    };
                    tasks = [
                        { orderId: 'AS-20260508', date: getFormattedDate(0), time: '14:30', type: '接機', airport: '桃園機場', address: '台北市信義區忠孝東路五段', custName: '李先生', custPhone: '0912-345-678', remarks: '舉牌：李大同\n需幫忙拿行李', extraStop: '新北市板橋區', seats: '1個前向', luggage: '2', sportLuggage: '無', flightNo: 'BR123', driverStatus: '未出發', driverNote: '客人脾氣較急，請準時抵達' },
                        { orderId: 'AS-20260509', date: getFormattedDate(1), time: '09:00', type: '送機', airport: '松山機場', address: '台北市大安區新生南路', custName: '陳小姐', custPhone: '0987-654-321', remarks: '無', extraStop: '無', seats: '無', luggage: '1', sportLuggage: '無', flightNo: 'CI456', driverStatus: '客上' }
                    ];
                    return;
                }

                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                
                const checkRes = await apiCall('driverCheckAuth', { lineId: profile.userId });
                if(checkRes.isBound) {
                    driverData = checkRes.driver;
                    loginSuccess();
                } else {
                    document.getElementById('authMsg').innerText = "請驗證您的司機身分";
                    document.getElementById('authSpinner').classList.add('hidden');
                    document.getElementById('bindForm').classList.remove('hidden');
                    document.getElementById('bindForm').onsubmit = (e) => handleBind(e, profile.userId);
                }
            } catch (err) {
                Swal.fire('系統錯誤', 'LIFF 初始化失敗，請確認已在 LINE 中開啟', 'error');
            }
            initCanvas();
        }

        function loginSuccess() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('bottomNav').classList.remove('hidden');
            
            // 寫入個人中心資料
            document.getElementById('profName').innerText = driverData.name || '-';
            document.getElementById('profPhone').innerText = driverData.phone || '-';
            document.getElementById('profCarNo').innerText = driverData.carNo || '-';
            document.getElementById('profCarColor').innerText = driverData.carColor || '-';
            document.getElementById('profCarType').innerText = driverData.carType || '-';
            document.getElementById('profBankCode').innerText = driverData.bankCode || '-';
            document.getElementById('profBankAcc').innerText = driverData.bankAcc || '-';
            document.getElementById('profLicense').innerText = driverData.license || '-';
            document.getElementById('profInsurance').innerText = driverData.insurance || '-';
            
            loadTasks();
        }

        async function handleBind(e, lineId) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.disabled = true; btn.innerText = "驗證中...";
            try {
                const res = await apiCall('driverBindAuth', { 
                    lineId: lineId, 
                    name: document.getElementById('bindName').value.trim(),
                    phone: document.getElementById('bindPhone').value.trim()
                });
                Swal.fire('綁定成功', '歡迎加入AS派車！', 'success').then(() => window.location.reload());
            } catch (err) {
                Swal.fire('綁定失敗', err.message, 'error');
                btn.disabled = false; btn.innerText = "立即綁定";
            }
        }

        // --- 畫面切換與資料載入 ---
        function switchTab(tab, el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            el.classList.add('nav-active');
            ['tasks', 'history', 'profile'].forEach(t => document.getElementById(`view-${t}`).classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            if(tab === 'tasks') renderTasks(); 
            if(tab === 'history') loadHistory();
        }

        function setTaskTab(tab) {
            currentTaskTab = tab;
            document.querySelectorAll('.task-tab-btn').forEach(b => {
                b.classList.remove('bg-white', 'text-[#553f62]', 'shadow-sm');
                b.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`tab-${tab}`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('bg-white', 'text-[#553f62]', 'shadow-sm');
            renderTasks();
        }

        function getFormattedDate(offsetDays = 0) {
            const date = new Date();
            date.setDate(date.getDate() + offsetDays);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        async function loadTasks() {
            Swal.showLoading();
            try {
                const res = await apiCall('driverGetTasks', { lineId: driverData.lineId });
                tasks = res.tasks;
                // 注意：若沒有後端回傳趟次，可以隱藏該區塊，先保留預設0
                if(res.monthCount !== undefined) {
                    document.getElementById('profCount').innerText = res.monthCount;
                }
                renderTasks();
                Swal.close();
            } catch(e) { Swal.fire('錯誤', '無法載入任務', 'error'); }
        }

        async function loadHistory() {
            Swal.showLoading();
            try {
                const res = await apiCall('driverGetHistory', { lineId: driverData.lineId });
                historyData = res.history;
                renderHistory();
                Swal.close();
            } catch(e) { Swal.fire('錯誤', '無法載入歷史', 'error'); }
        }

        // --- 展開/收合明細 ---
        window.toggleDetails = function(id, btn) {
            const detailEl = document.getElementById(id);
            if (detailEl.classList.contains('hidden')) {
                detailEl.classList.remove('hidden');
                btn.innerText = '隱藏明細 ▲';
            } else {
                detailEl.classList.add('hidden');
                btn.innerText = '展開明細 ▼';
            }
        };

        // --- 渲染畫面 ---
        function renderTasks() {
            const container = document.getElementById('task-list');
            const todayStr = getFormattedDate(0);
            const tomorrowStr = getFormattedDate(1);

            let filteredTasks = tasks.filter(t => t.date >= todayStr);

            if (currentTaskTab === 'today') {
                filteredTasks = filteredTasks.filter(t => t.date === todayStr);
            } else if (currentTaskTab === 'tomorrow') {
                filteredTasks = filteredTasks.filter(t => t.date === tomorrowStr);
            }

            if(filteredTasks.length === 0) { 
                container.innerHTML = `<div class="text-center text-gray-400 mt-20 font-bold flex flex-col items-center">此區間沒有待執行的任務</div>`; 
                return; 
            }
            
            container.innerHTML = filteredTasks.map(t => {
                let currentStep = t.driverStatus || "未出發";
                
                // 動態按鈕產生邏輯 (無綠色，以藍色/深色為主)
                let actionBtn = '';
                if(currentStep === "未出發" || !currentStep) {
                    actionBtn = `<button onclick="updateStatus('${t.orderId}', '已出發')" class="flex-1 bg-[#553f62] text-white py-3.5 rounded-xl font-bold shadow-md text-base">點我出發</button>`;
                } else if(currentStep === "已出發") {
                    actionBtn = `<button onclick="updateStatus('${t.orderId}', '已抵達')" class="flex-1 bg-[#f07cad] text-white py-3.5 rounded-xl font-bold shadow-md text-base">已抵達上車點</button>`;
                } else if(currentStep === "已抵達") {
                    actionBtn = `<button onclick="updateStatus('${t.orderId}', '客上')" class="flex-1 bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-md text-base">客戶已上車</button>`;
                } else if(currentStep === "客上") {
                    actionBtn = `<button onclick="openSigModal('${t.orderId}')" class="flex-1 bg-gray-800 text-white py-3.5 rounded-xl font-bold shadow-md text-base">客下 (準備結案)</button>`;
                }

                // 🔥 建立動態標籤 (Tags) - 單純的配色不雜亂
                let tags = [];
                // 主標籤
                tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-[#553f62] text-white">${t.type}</span>`);
                if (t.extraStop && t.extraStop !== '無') {
                    tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded border border-gray-400 text-gray-600">加點</span>`);
                }
                if (t.seats && t.seats !== '無') {
                    tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded border border-gray-400 text-gray-600">安全座椅</span>`);
                }
                if (t.remarks && (t.remarks.includes('舉牌') || t.remarks.includes('看板'))) {
                    tags.push(`<span class="text-[10px] font-bold px-1.5 py-0.5 rounded border border-[#f07cad] text-[#f07cad]">舉牌</span>`);
                }
                let tagsHtml = tags.join('');

                // 路線摘要 (截短地址顯示)
                let shortAddress = t.address.length > 6 ? t.address.substring(0, 6) + '...' : t.address;
                let summaryRoute = t.type === '送機' ? `${shortAddress} ➜ ${t.airport}` : `${t.airport} ➜ ${shortAddress}`;

                // 完整路線顯示
                let routeHtml = `<div class="text-sm font-bold text-gray-800 mt-2 mb-2"><div class="flex items-start"><span class="mr-2">A.</span><span>${t.type === '送機'? t.address : t.airport}</span></div><div class="flex items-start mt-1"><span class="mr-2">B.</span><span>${t.type === '接機'? t.address : t.airport}</span></div>`;
                if(t.extraStop && t.extraStop !== '無') routeHtml += `<div class="flex items-start mt-1 text-[#f07cad]"><span class="mr-2">📍</span><span>加點: ${t.extraStop}</span></div>`;
                routeHtml += `</div>`;

                // 調度備註
                let driverNoteHtml = '';
                if (t.driverNote && t.driverNote.trim() !== '') {
                    driverNoteHtml = `
                    <div class="mt-3 bg-yellow-50 border-l-4 border-yellow-400 p-2.5 rounded shadow-sm">
                        <p class="text-[11px] font-black text-yellow-700 mb-0.5">調度派車交代：</p>
                        <p class="text-xs text-yellow-800 whitespace-pre-wrap font-bold leading-relaxed">${t.driverNote}</p>
                    </div>`;
                }

                let remarksHtml = t.remarks ? t.remarks.replace(/\n/g, '<br>') : '無';

                return `
                <div class="glass-card p-4 rounded-xl border border-gray-200 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-[#553f62]"></div>
                    
                    <!-- 【重點摘要區塊】 -->
                    <div class="pl-2">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex flex-wrap gap-1">${tagsHtml}</div>
                            <span class="text-[10px] font-mono text-gray-400">${t.orderId}</span>
                        </div>
                        <div class="flex items-baseline mb-1">
                            <span class="text-xl font-black text-[#553f62] mr-3">${t.time}</span>
                            <span class="text-sm font-bold text-gray-700">${summaryRoute}</span>
                        </div>
                    </div>
                    
                    <button onclick="toggleDetails('detail-${t.orderId}', this)" class="w-full text-center text-xs font-bold text-gray-400 py-2 border-t border-gray-100 mt-2 hover:bg-gray-50 transition rounded-b-xl">展開明細 ▼</button>

                    <!-- 【詳細資訊區塊 (預設隱藏)】 -->
                    <div id="detail-${t.orderId}" class="hidden mt-1 pt-3 border-t border-gray-200 pl-2">
                        <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg mb-2">
                            <div>
                                <p class="font-bold text-gray-800">${t.custName}</p>
                                <p class="text-xs font-bold text-blue-600 mt-0.5"><a href="tel:${t.custPhone}" class="underline">${t.custPhone}</a></p>
                            </div>
                            <button onclick="reportAnomaly('${t.orderId}')" class="text-xs text-red-500 border border-red-200 bg-white px-2 py-1 rounded shadow-sm font-bold">異常回報</button>
                        </div>
                        
                        ${routeHtml}
                        ${driverNoteHtml}
                        
                        <div class="text-[11px] text-gray-500 mt-2 font-medium bg-gray-50 p-2 rounded leading-relaxed">
                            行李: ${t.luggage} ︱ 胖箱: ${t.sportLuggage} ︱ 座椅: ${t.seats}<br>
                            航班: <span class="font-bold text-[#f07cad]">${t.flightNo}</span><br>
                            備註: <span class="text-red-500 font-bold">${remarksHtml}</span>
                        </div>

                        <div class="flex gap-2 mt-4">
                            ${actionBtn}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderHistory() {
            const container = document.getElementById('view-history');
            if(historyData.length === 0) { container.innerHTML = `<div class="text-center text-gray-400 mt-20 font-bold">尚無歷史結案紀錄</div>`; return; }
            
            container.innerHTML = historyData.map(t => `
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <div class="flex justify-between mb-1">
                        <span class="text-xs font-bold text-gray-500">${t.date} ${t.time}</span>
                        <span class="text-xs font-bold text-blue-600">已結案</span>
                    </div>
                    <div class="text-sm font-bold text-gray-400 line-through">${t.routeDisplay}</div>
                    <div class="text-xs text-gray-400 mt-1">${t.custNameMasked}</div>
                </div>
            `).join('');
        }

        // --- 狀態更新邏輯 ---
        async function updateStatus(orderId, newStatus) {
            try {
                const coords = await requireGPS(); 
                Swal.fire({ title: '回報中', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                
                await apiCall('driverUpdateStatus', {
                    orderId: orderId,
                    status: newStatus,
                    lat: coords.lat,
                    lng: coords.lng,
                    lineId: driverData.lineId
                });
                
                Swal.fire({ title: '回報成功', text: `已更新狀態為：${newStatus}`, icon: 'success', timer: 1000, showConfirmButton: false });
                loadTasks();
            } catch(e) {
                if(e !== 'No Geolocation') Swal.fire('錯誤', e.message, 'error');
            }
        }

        // --- 異常回報 (LINE Notify) ---
        async function reportAnomaly(orderId) {
            const { value: formValues } = await Swal.fire({
                title: '異常狀況回報',
                html: `
                    <select id="anoType" class="w-full p-3 border rounded-xl mb-3 outline-none font-bold text-sm">
                        <option value="人數/行李不符">現場人數/行李不符</option>
                        <option value="聯絡不上客人">聯絡不上客人</option>
                        <option value="臨時變更行程">客人臨時變更行程(加點等)</option>
                        <option value="車輛故障/事故">車輛故障或事故</option>
                        <option value="其他">其他緊急狀況</option>
                    </select>
                    <textarea id="anoNote" rows="3" class="w-full p-3 border rounded-xl outline-none text-sm placeholder-gray-400" placeholder="請簡述現場狀況..."></textarea>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonColor: '#e3342f',
                confirmButtonText: '立即通報調度',
                cancelButtonText: '取消',
                preConfirm: () => {
                    return { type: document.getElementById('anoType').value, note: document.getElementById('anoNote').value }
                }
            });

            if (formValues) {
                Swal.fire({ title: '通報中', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                try {
                    await apiCall('driverReportAnomaly', {
                        orderId: orderId,
                        type: formValues.type,
                        note: formValues.note,
                        driverName: driverData.name
                    });
                    Swal.fire('通報成功', '已發送至調度中心群組', 'success');
                } catch(e) { Swal.fire('通報失敗', '請直接撥打電話聯絡調度', 'error'); }
            }
        }

        // --- 簽名結案 ---
        function openSigModal(orderId) {
            currentSigOrderId = orderId;
            document.getElementById('sigModal').classList.remove('hidden');
            setTimeout(initCanvas, 100); 
        }

        async function submitSig() {
            document.getElementById('sigModal').classList.add('hidden');
            await updateStatus(currentSigOrderId, '已結案');
        }

        window.onload = init;
    </script>
</body>
</html>
