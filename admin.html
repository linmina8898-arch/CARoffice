<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安興租車 - 派車中控台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- 引入字體與圖示 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #553f62;
            --accent: #f07cad;
            --bg-color: #f3f4f6;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-color); }
        
        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 排序表頭樣式 */
        .sortable { cursor: pointer; user-select: none; transition: background 0.2s; position: relative; }
        .sortable:hover { background-color: rgba(0, 0, 0, 0.1) !important; }
        .sort-icon { font-size: 0.8em; margin-left: 4px; opacity: 0.5; }
        .active-sort { color: #f07cad !important; opacity: 1 !important; }

        /* 標頭內部的篩選框樣式 */
        .filter-input, .filter-select {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 12px;
            padding: 4px 6px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 6px;
            outline: none;
            width: 100%;
            font-weight: normal;
            transition: all 0.2s;
        }
        .filter-input:focus, .filter-select:focus { 
            background-color: white; 
            color: #553f62; 
            border-color: #f07cad; 
            box-shadow: 0 0 0 2px rgba(240, 124, 173, 0.3);
        }
        .filter-input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .filter-select option { color: #333; background-color: white; }

    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- 1. 登入畫面 -->
    <div id="loginScreen" class="fixed inset-0 bg-gray-100 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-96 max-w-[90%] border-t-4 border-[#553f62]">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-black text-[#553f62] mb-1">安興租車</h1>
                <p class="text-sm text-gray-500 font-bold tracking-widest">後台管理系統</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">管理員帳號</label>
                    <input type="text" id="accInput" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#553f62] outline-none" placeholder="輸入帳號" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">管理員密碼</label>
                    <input type="password" id="pwdInput" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#553f62] outline-none" placeholder="輸入密碼" required>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-[#553f62] text-white font-bold py-3 rounded-lg hover:bg-opacity-90 shadow-md transition text-lg">登入系統</button>
            </form>
        </div>
    </div>

    <!-- 2. 主控台介面 -->
    <div id="dashboardScreen" class="flex w-full h-full hidden relative">
        <aside id="sidebar" class="fixed md:relative w-64 bg-[#553f62] text-white h-full flex flex-col shadow-2xl z-30 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
            <div class="p-6 border-b border-white/10 text-center">
                <h2 class="text-2xl font-black tracking-widest text-[#f07cad]">安興租車</h2>
                <p class="text-xs text-gray-300 mt-2">管理員：<span id="userNameDisplay" class="font-bold text-white"></span></p>
            </div>
            <nav class="flex-1 p-4 space-y-2" id="navMenu">
                <a href="#" id="menu-view" class="flex items-center space-x-3 w-full p-3 rounded-lg bg-white/10 text-white font-bold hidden">
                    <i class="fas fa-calendar-alt w-5 text-center"></i><span>任務調度中心</span>
                </a>
            </nav>
            <div class="p-4 border-t border-white/10">
                <button id="logoutBtn" class="w-full flex items-center justify-center space-x-2 p-3 rounded-lg text-white hover:bg-red-500/80 transition font-bold">
                    <i class="fas fa-sign-out-alt"></i><span>登出系統</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-gray-50 h-full overflow-hidden w-full">
            <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-10">
                <h2 class="text-lg font-bold text-gray-800" id="pageTitle">派車任務管理</h2>
                <button id="refreshBtn" class="text-[#553f62] hover:bg-purple-50 w-10 h-10 rounded-full transition text-lg shadow-sm border border-gray-100" title="重新整理資料"><i class="fas fa-sync-alt"></i></button>
            </header>

            <div class="flex-1 p-4 md:p-6 overflow-auto relative">
                <!-- 月曆模式 -->
                <div id="calendarView" class="w-full max-w-5xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-5 rounded-xl shadow-sm border border-gray-200 gap-4">
                        <div class="flex items-center space-x-6">
                            <button id="prevMonthBtn" class="text-gray-400 hover:text-[#553f62] transition p-2"><i class="fas fa-chevron-left fa-lg"></i></button>
                            <h2 id="calendarMonthYear" class="text-xl font-black text-[#553f62] min-w-[120px] text-center">載入中</h2>
                            <button id="nextMonthBtn" class="text-gray-400 hover:text-[#553f62] transition p-2"><i class="fas fa-chevron-right fa-lg"></i></button>
                        </div>
                        <div class="flex flex-col md:flex-row items-center gap-4">
                            <p id="calendarMonthStats" class="text-sm font-bold text-gray-600 bg-gray-100 px-4 py-2 rounded-lg"></p>
                            <button id="viewFullMonthBtn" class="bg-[#553f62] text-white text-sm font-bold px-5 py-2.5 rounded-lg hover:bg-opacity-90 shadow-md transition flex items-center">
                                <i class="fas fa-table mr-2"></i> 查看本月所有清單
                            </button>
                        </div>
                    </div>
                    <div class="grid grid-cols-7 gap-2 text-center font-bold text-gray-500 mb-2 text-sm">
                        <div class="text-red-400">日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div class="text-[#553f62]">六</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-3 pb-10"></div>
                </div>

                <!-- 橫式清單模式 -->
                <div id="detailView" class="hidden flex-col w-full h-full">
                    <div class="flex items-center justify-between mb-5">
                        <button id="backToCalendarBtn" class="flex items-center space-x-2 text-[#553f62] font-bold bg-white border border-gray-200 px-5 py-2 rounded-lg hover:bg-gray-50 transition shadow-sm">
                            <i class="fas fa-arrow-left"></i><span>返回月曆</span>
                        </button>
                        <h3 id="detailDateTitle" class="text-xl font-black text-gray-800"></h3>
                        <div class="w-32"></div>
                    </div>
                    
                    <div class="flex space-x-2 mb-4 bg-gray-200 p-1.5 rounded-lg w-max" id="orderTabs">
                        <button class="tab-btn px-5 py-2 rounded-md font-bold text-sm shadow bg-white text-[#553f62]" data-target="unassigned">🔴 待派車</button>
                        <button class="tab-btn px-5 py-2 rounded-md font-bold text-sm text-gray-500" data-target="assigned">🟢 已派車 / 完成</button>
                    </div>

                    <!-- 恢復正常寬度的表格容器 -->
                    <div id="ordersContainer" class="pb-20"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 指派司機彈窗 -->
    <div id="assignModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="bg-[#553f62] p-5 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">指派任務</h3>
                <button onclick="closeModal()" class="text-white opacity-70 hover:opacity-100 transition"><i class="fas fa-times fa-lg"></i></button>
            </div>
            <div class="p-6">
                <p id="modalOrderId" class="text-center font-mono font-bold bg-gray-100 p-3 rounded-lg mb-5 text-sm text-gray-600 border border-gray-200"></p>
                <label class="block text-sm font-bold text-gray-700 mb-2">請選擇派發司機：</label>
                <select id="driverSelect" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-[#553f62] text-sm font-bold text-gray-700"></select>
                <button id="confirmAssignBtn" class="w-full mt-6 bg-[#f07cad] text-white font-bold py-3.5 rounded-xl shadow-md text-lg hover:bg-opacity-90 transition">確認派車</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby2xCCpwmEE69XozoWn0cY0QSjHc9i9O_CwT5jqgXs2O8aCxbzZ_rCmNLOwSinzlN5j/exec"; 

        let currentUser = null;
        let allOrders = [];
        let allDrivers = [];
        let currentTab = 'unassigned';
        let assigningRowIndex = null;
        let currentMonthDate = new Date(); 
        let selectedDateForDetail = null;

        let sortConfig = { key: 'time', dir: 'asc' };
        let filterConfigs = { date: '', time: '', type: 'all', car: 'all', route: '', pax: '', lug: '', remarks: '' };

        function formatGasDate(rawDate) {
            if (!rawDate) return "";
            const str = String(rawDate).replace(/^'/g, "").trim();
            if (str.includes('T')) {
                const d = new Date(str);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }
            return str.substring(0, 10);
        }

        function formatGasTime(rawTime) {
            if (!rawTime) return "00:00";
            const str = String(rawTime).replace(/^'/g, "").trim();
            if (str.includes('1899') || str.includes('T')) {
                const d = new Date(str);
                return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            }
            return str;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerText = '處理中...';
            try {
                const res = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'adminLogin', 
                        data: { account: document.getElementById('accInput').value, password: document.getElementById('pwdInput').value } 
                    }) 
                });
                const result = await res.json();
                if(result.success) {
                    currentUser = result.user;
                    document.getElementById('userNameDisplay').innerText = currentUser.name;
                    if(currentUser.permissions.view) document.getElementById('menu-view').classList.remove('hidden');
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('dashboardScreen').classList.remove('hidden');
                    loadDashboardData();
                } else { 
                    Swal.fire('登入失敗', result.error, 'error'); 
                    btn.disabled = false; btn.innerText = '登入系統';
                }
            } catch(err) { 
                Swal.fire('連線錯誤', '無法連上伺服器', 'error'); 
                btn.disabled = false; btn.innerText = '登入系統';
            }
        });

        async function loadDashboardData() {
            try {
                const [orderRes, driverRes] = await Promise.all([
                    fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getAdminOrders' }) }).then(r=>r.json()),
                    fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDriverList' }) }).then(r=>r.json())
                ]);
                if(orderRes.success) {
                    allOrders = orderRes.orders.map(o => {
                        Object.keys(o).forEach(k => { if(typeof o[k] === 'string' && k !== 'route') o[k] = o[k].replace(/^'/g, "").trim(); });
                        o.date = formatGasDate(o.date); o.time = formatGasTime(o.time);
                        return o;
                    });
                }
                if(driverRes.success) {
                    allDrivers = driverRes.drivers;
                    let h = '<option value="">-- 選擇指派司機 --</option>';
                    allDrivers.forEach(d => h += `<option value="${d.code}">${d.name} (${d.carInfo})</option>`);
                    document.getElementById('driverSelect').innerHTML = h;
                }
                
                if (selectedDateForDetail) renderOrders(); else renderCalendar();
            } catch(e) { console.error(e); }
        }

        function renderCalendar() {
            const year = currentMonthDate.getFullYear();
            const month = currentMonthDate.getMonth();
            const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
            document.getElementById('calendarMonthYear').innerText = `${year}年 ${month + 1}月`;
            
            let total = 0, assigned = 0, unassigned = 0;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const daily = {};
            for(let i=1; i<=daysInMonth; i++) daily[`${monthPrefix}-${String(i).padStart(2,'0')}`] = { u:0, a:0 };

            allOrders.forEach(o => {
                if (o.date && o.date.startsWith(monthPrefix)) {
                    total++;
                    const isA = o.status === '已派車' || o.status === '完成';
                    if (isA) { assigned++; if(daily[o.date]) daily[o.date].a++; } 
                    else { unassigned++; if(daily[o.date]) daily[o.date].u++; }
                }
            });
            document.getElementById('calendarMonthStats').innerText = `本月：${total} 趟 (已派 ${assigned} / 待派 ${unassigned})`;
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            for(let i=0; i<firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = "bg-gray-100/50 rounded-xl h-[110px] opacity-30";
                grid.appendChild(empty);
            }
            
            for(let i=1; i<=daysInMonth; i++) {
                const date = `${monthPrefix}-${String(i).padStart(2,'0')}`;
                const data = daily[date] || {u:0, a:0};
                const isToday = new Date().toISOString().startsWith(date);
                
                const cell = document.createElement('div');
                cell.className = `border rounded-xl h-[110px] p-2 flex flex-col cursor-pointer hover:border-[#553f62] transition shadow-sm ${data.u > 0 ? 'bg-red-50 border-red-200' : (data.a > 0 ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-gray-200')}`;
                cell.onclick = () => openDayDetail(date);
                
                const num = document.createElement('span');
                num.className = isToday ? 'bg-[#553f62] text-white w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold shadow-md' : 'text-gray-700 font-bold text-sm';
                num.innerText = i;
                cell.appendChild(num);

                if(data.u > 0 || data.a > 0) {
                    const bContainer = document.createElement('div');
                    bContainer.className = "mt-auto space-y-1";
                    if(data.u > 0) bContainer.innerHTML += `<div class="bg-white text-red-600 text-[10px] font-bold py-1 rounded border border-red-200 text-center shadow-sm">🔴 ${data.u} 趟</div>`;
                    if(data.a > 0) bContainer.innerHTML += `<div class="bg-white text-emerald-700 text-[10px] font-bold py-1 rounded border border-emerald-200 text-center shadow-sm">🟢 ${data.a} 趟</div>`;
                    cell.appendChild(bContainer);
                }
                grid.appendChild(cell);
            }
        }

        // --- 核心修正：強制重置搜尋條件與頁籤 ---
        function resetFiltersAndTab() {
            filterConfigs = { date: '', time: '', type: 'all', car: 'all', route: '', pax: '', lug: '', remarks: '' };
            currentTab = 'unassigned'; // 強制回到「待派車」
            document.querySelectorAll('.tab-btn').forEach(b => { 
                b.classList.remove('shadow', 'bg-white', 'text-[#553f62]'); 
                b.classList.add('text-gray-500'); 
                if(b.dataset.target === currentTab) {
                    b.classList.add('shadow', 'bg-white', 'text-[#553f62]');
                    b.classList.remove('text-gray-500');
                }
            });
        }

        window.openDayDetail = (dateStr) => {
            selectedDateForDetail = dateStr;
            resetFiltersAndTab();
            document.getElementById('calendarView').classList.add('hidden');
            const dv = document.getElementById('detailView');
            dv.classList.remove('hidden');
            dv.classList.add('flex');
            document.getElementById('detailDateTitle').innerText = dateStr;
            renderOrders();
        };

        window.viewFullMonth = () => {
            const year = currentMonthDate.getFullYear();
            const month = String(currentMonthDate.getMonth() + 1).padStart(2, '0');
            selectedDateForDetail = `${year}-${month}`;
            resetFiltersAndTab();
            document.getElementById('calendarView').classList.add('hidden');
            const dv = document.getElementById('detailView');
            dv.classList.remove('hidden');
            dv.classList.add('flex');
            document.getElementById('detailDateTitle').innerText = `${year}年${month}月 全月清單`;
            renderOrders();
        };

        document.getElementById('backToCalendarBtn').onclick = () => {
            selectedDateForDetail = null;
            document.getElementById('detailView').classList.remove('flex');
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('calendarView').classList.remove('hidden');
            renderCalendar();
        };

        window.handleSort = (key) => {
            if (sortConfig.key === key) sortConfig.dir = sortConfig.dir === 'asc' ? 'desc' : 'asc';
            else { sortConfig.key = key; sortConfig.dir = 'asc'; }
            renderOrders();
        };

        window.handleFilter = (field, value) => {
            filterConfigs[field] = value;
            renderOrderRowsOnly();
        };

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const carTypes = [...new Set(allOrders.filter(o => o.date.startsWith(selectedDateForDetail)).map(o => o.car))];
            const getIcon = (k) => {
                if (sortConfig.key !== k) return '<i class="fas fa-sort sort-icon"></i>';
                return sortConfig.dir === 'asc' ? '<i class="fas fa-sort-up sort-icon active-sort"></i>' : '<i class="fas fa-sort-down sort-icon active-sort"></i>';
            };

            // 恢復正常字體與排版，加上 overflow-x-auto 允許捲動，不會擠在一起
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                    <table id="ordersTable" class="min-w-[1100px] w-full text-xs text-left">
                        <thead class="bg-[#553f62] text-white font-bold border-b-4 border-[#f07cad]">
                            <tr>
                                <th class="w-10 px-3 py-3 text-center">序</th>
                                <th class="w-24 px-3 py-3 sortable">
                                    <div onclick="handleSort('date')">日期 ${getIcon('date')}</div>
                                    <input type="text" class="filter-input" value="${filterConfigs.date}" placeholder="搜尋..." oninput="handleFilter('date', this.value)" onclick="event.stopPropagation()">
                                </th>
                                <th class="w-20 px-3 py-3 sortable">
                                    <div onclick="handleSort('time')">時間 ${getIcon('time')}</div>
                                    <input type="text" class="filter-input" value="${filterConfigs.time}" placeholder="搜尋..." oninput="handleFilter('time', this.value)" onclick="event.stopPropagation()">
                                </th>
                                <th class="w-20 px-3 py-3 sortable">
                                    <div onclick="handleSort('type')">類別 ${getIcon('type')}</div>
                                    <select class="filter-select" onchange="handleFilter('type', this.value)" onclick="event.stopPropagation()">
                                        <option value="all">全部</option><option value="送機" ${filterConfigs.type==='送機'?'selected':''}>送機</option><option value="接機" ${filterConfigs.type==='接機'?'selected':''}>接機</option>
                                    </select>
                                </th>
                                <th class="w-32 px-3 py-3 sortable">
                                    <div onclick="handleSort('car')">車型 ${getIcon('car')}</div>
                                    <select class="filter-select" onchange="handleFilter('car', this.value)" onclick="event.stopPropagation()">
                                        <option value="all">全部</option>${carTypes.map(t=>`<option value="${t}" ${filterConfigs.car===t?'selected':''}>${t}</option>`).join('')}
                                    </select>
                                </th>
                                <th class="px-3 py-3 sortable min-w-[200px]">
                                    <div onclick="handleSort('route')">行程內容 ${getIcon('route')}</div>
                                    <input type="text" class="filter-input" placeholder="搜尋行程地址..." value="${filterConfigs.route}" oninput="handleFilter('route', this.value)" onclick="event.stopPropagation()">
                                </th>
                                <th class="w-16 px-3 py-3 sortable text-center">
                                    <div onclick="handleSort('paxLug')">人數</div>
                                    <input type="text" class="filter-input text-center" value="${filterConfigs.pax}" oninput="handleFilter('pax', this.value)" onclick="event.stopPropagation()">
                                </th>
                                <th class="w-16 px-3 py-3 sortable text-center">
                                    <div onclick="handleSort('paxLug')">行李</div>
                                    <input type="text" class="filter-input text-center" value="${filterConfigs.lug}" oninput="handleFilter('lug', this.value)" onclick="event.stopPropagation()">
                                </th>
                                <th class="w-48 px-3 py-3 sortable">
                                    <div onclick="handleSort('remarks')">備註明細 ${getIcon('remarks')}</div>
                                    <input type="text" class="filter-input" placeholder="搜尋備註..." value="${filterConfigs.remarks}" oninput="handleFilter('remarks', this.value)" onclick="event.stopPropagation()">
                                </th>
                                <th class="w-24 px-3 py-3 text-center">功能</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            `;
            renderOrderRowsOnly();
        }

        function renderOrderRowsOnly() {
            const tbody = document.getElementById('ordersTableBody');
            if(!tbody) return;

            let filtered = allOrders.filter(o => {
                const matchDate = selectedDateForDetail.length === 7 ? o.date.startsWith(selectedDateForDetail) : o.date === selectedDateForDetail;
                if(!matchDate) return false;
                const isA = o.status === '已派車' || o.status === '完成';
                return currentTab === 'unassigned' ? !isA : isA;
            });

            filtered = filtered.filter(o => {
                const s = (v) => String(v || "").toLowerCase();
                const matchType = filterConfigs.type === 'all' || o.type === filterConfigs.type;
                const matchCar = filterConfigs.car === 'all' || o.car === filterConfigs.car;
                
                let matchPax = s(o.paxLug).includes(s(filterConfigs.pax));
                if(s(filterConfigs.pax) !== "" && !isNaN(filterConfigs.pax)) {
                    const m = o.paxLug.match(/大(\d+)\s+中(\d+)\s+小(\d+)/);
                    if(m && (parseInt(m[1])+parseInt(m[2])+parseInt(m[3])) == filterConfigs.pax) matchPax = true;
                }
                let matchLug = s(o.paxLug).includes(s(filterConfigs.lug));
                if(s(filterConfigs.lug) !== "" && !isNaN(filterConfigs.lug)) {
                    const m = o.paxLug.match(/登機(\d+)\s+托運(\d+)/);
                    if(m && (parseInt(m[1])+parseInt(m[2])) == filterConfigs.lug) matchLug = true;
                }

                const searchBody = (s(o.remarks)+s(o.sport)+s(o.seat));
                return s(o.date).includes(s(filterConfigs.date)) && s(o.time).includes(s(filterConfigs.time)) && matchType && matchCar && s(o.route).includes(s(filterConfigs.route)) && matchPax && matchLug && searchBody.includes(s(filterConfigs.remarks));
            });

            filtered.sort((a,b) => {
                const res = String(a[sortConfig.key]).localeCompare(String(b[sortConfig.key]), 'zh-Hant', {numeric:true});
                return sortConfig.dir === 'asc' ? res : -res;
            });

            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="py-12 text-center text-gray-400 font-bold text-base bg-gray-50/50">🎉 目前無符合條件的訂單</td></tr>`; return;
            }

            let html = "";
            filtered.forEach((o, index) => {
                let pax = "", lug = "";
                const m = o.paxLug.match(/(大\d+\s+中\d+\s+小\d+)\s+(登機\d+\s+托運\d+)/);
                if(m) { pax = m[1]; lug = m[2]; } else { pax = o.paxLug; }
                
                const btn = (currentUser.permissions.disp && currentTab === 'unassigned') 
                    ? `<button onclick="openAssignModal(${o.rowIndex}, '${o.orderId}')" class="bg-[#f07cad] text-white font-bold py-1.5 px-3 rounded-lg text-xs w-full shadow-sm hover:brightness-110 transition">指派司機</button>`
                    : `<div class="bg-gray-100 text-gray-600 font-bold py-1.5 rounded-lg text-center border text-xs">${o.driverCode || '已派'}</div>`;
                
                const sport = o.sport && o.sport !== "無" ? `<div class="text-[#f07cad] font-bold">胖胖箱: ${o.sport.replace('有(','').replace(')','')}</div>` : "";
                const seat = o.seat && o.seat !== "無" ? `<div class="text-[#f07cad] font-bold">座椅: ${o.seat}</div>` : "";
                const remark = o.remarks && o.remarks !== "無" ? `<div class="text-red-600 font-bold">${o.remarks}</div>` : "";
                
                html += `<tr class="hover:bg-purple-50/50 transition border-b border-gray-100">
                    <td class="px-3 py-4 text-center text-gray-400 font-bold">${index + 1}</td>
                    <td class="px-3 py-4 text-gray-700 font-medium whitespace-nowrap">${o.date}</td>
                    <td class="px-3 py-4 font-black text-[#553f62] whitespace-nowrap text-sm">${o.time}</td>
                    <td class="px-3 py-4 whitespace-nowrap"><span class="px-2 py-1 rounded font-bold text-xs ${o.type==='送機'?'bg-blue-50 text-blue-700 border border-blue-200':'bg-emerald-50 text-emerald-700 border border-emerald-200'}">${o.type}</span></td>
                    <td class="px-3 py-4 font-bold text-gray-700">${o.car}</td>
                    <td class="px-3 py-4 text-gray-800 font-medium leading-relaxed">${o.route}</td>
                    <td class="px-3 py-4 text-gray-600 text-center leading-relaxed whitespace-nowrap">${pax.replace(/ /g,'<br>')}</td>
                    <td class="px-3 py-4 text-gray-600 text-center leading-relaxed whitespace-nowrap">${lug.replace(/ /g,'<br>')}</td>
                    <td class="px-3 py-4"><div class="bg-red-50/60 p-2 rounded-lg leading-relaxed text-xs border border-red-100 space-y-1">${sport}${seat}${remark || '<span class="text-gray-400 font-normal">無特別備註</span>'}</div></td>
                    <td class="px-3 py-4 text-center">${btn}<div class="text-[10px] text-gray-400 mt-1 font-mono">${o.orderId.slice(-6)}</div></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => { 
                    b.classList.remove('shadow', 'bg-white', 'text-[#553f62]'); 
                    b.classList.add('text-gray-500'); 
                });
                const t = e.target;
                t.classList.add('shadow', 'bg-white', 'text-[#553f62]');
                t.classList.remove('text-gray-500');
                currentTab = t.dataset.target; 
                renderOrders();
            });
        });

        window.openAssignModal = (idx, id) => { 
            assigningRowIndex = idx; 
            document.getElementById('modalOrderId').innerText = id; 
            document.getElementById('driverSelect').value = ""; 
            document.getElementById('assignModal').classList.remove('hidden'); 
        };
        window.closeModal = () => document.getElementById('assignModal').classList.add('hidden');
        
        document.getElementById('confirmAssignBtn').onclick = async () => {
            const drv = document.getElementById('driverSelect').value;
            if(!drv) return Swal.fire('提醒', '請選擇司機', 'warning');
            const btn = document.getElementById('confirmAssignBtn');
            btn.disabled = true; btn.innerText = '處理中...';
            try {
                const res = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'assignDriver', data: { rowIndex: assigningRowIndex, driverCode: drv }}) 
                });
                if((await res.json()).success) { 
                    Swal.fire({ title:'成功', icon:'success', timer:800, showConfirmButton:false });
                    closeModal(); loadDashboardData(); 
                }
            } catch(e) { 
                Swal.fire('錯誤', '指派失敗', 'error'); 
            } finally {
                btn.disabled = false; btn.innerText = '確認派車';
            }
        };

        document.getElementById('viewFullMonthBtn').onclick = viewFullMonth;
        document.getElementById('refreshBtn').onclick = loadDashboardData;
        document.getElementById('logoutBtn').onclick = () => location.reload();
        document.getElementById('prevMonthBtn').onclick = () => { currentMonthDate.setMonth(currentMonthDate.getMonth() - 1); renderCalendar(); };
        document.getElementById('nextMonthBtn').onclick = () => { currentMonthDate.setMonth(currentMonthDate.getMonth() + 1); renderCalendar(); };

    </script>
</body>
</html>
