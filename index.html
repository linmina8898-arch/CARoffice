<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安興租車 - 派車中控台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- 引入字體與圖示 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #553f62; /* 深紫色 */
            --accent: #f07cad;  /* 粉紅色 */
            --bg-color: #f3f4f6;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-color); }
        .text-primary { color: var(--primary); }
        .bg-primary { background-color: var(--primary); }
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
        .border-primary { border-color: var(--primary); }
        
        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- 登入畫面 (預設顯示) -->
    <div id="loginScreen" class="fixed inset-0 bg-gray-100 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-96 max-w-[90%] border-t-4 border-[#553f62]">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-black text-[#553f62] mb-1">安興租車</h1>
                <p class="text-sm text-gray-500 font-bold tracking-widest">後台管理系統</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">管理員帳號</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" id="accInput" class="w-full pl-10 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#553f62] focus:outline-none" placeholder="輸入帳號" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">管理員密碼</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
                        <input type="password" id="pwdInput" class="w-full pl-10 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#553f62] focus:outline-none" placeholder="輸入密碼" required>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-[#553f62] text-white font-bold py-3 rounded-lg hover:bg-opacity-90 transition shadow-md mt-4">
                    登入系統
                </button>
            </form>
        </div>
    </div>

    <!-- 主控台介面 (登入後顯示) -->
    <div id="dashboardScreen" class="flex w-full h-full hidden">
        
        <!-- 左側側邊欄 -->
        <aside class="w-64 bg-[#553f62] text-white flex flex-col shadow-2xl z-10 relative">
            <div class="p-6 border-b border-white/10 text-center">
                <h2 class="text-2xl font-black tracking-widest text-[#f07cad]">安興租車</h2>
                <p class="text-xs text-gray-300 mt-1">管理員：<span id="userNameDisplay" class="font-bold text-white"></span></p>
            </div>
            
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto" id="navMenu">
                <!-- 選單項目會根據權限動態顯示/隱藏 -->
                <a href="#" id="menu-view" class="flex items-center space-x-3 w-full p-3 rounded-lg bg-white/10 text-white font-bold transition hidden">
                    <i class="fas fa-clipboard-list w-5 text-center"></i>
                    <span>派車任務看板</span>
                </a>
                <a href="#" id="menu-fin" class="flex items-center space-x-3 w-full p-3 rounded-lg hover:bg-white/5 text-gray-300 hover:text-white transition hidden">
                    <i class="fas fa-chart-line w-5 text-center"></i>
                    <span>財務與報表</span>
                </a>
                <a href="#" id="menu-drv" class="flex items-center space-x-3 w-full p-3 rounded-lg hover:bg-white/5 text-gray-300 hover:text-white transition hidden">
                    <i class="fas fa-id-card w-5 text-center"></i>
                    <span>司機名單管理</span>
                </a>
                <a href="#" id="menu-sys" class="flex items-center space-x-3 w-full p-3 rounded-lg hover:bg-white/5 text-gray-300 hover:text-white transition hidden">
                    <i class="fas fa-cog w-5 text-center"></i>
                    <span>系統帳號設定</span>
                </a>
            </nav>

            <div class="p-4 border-t border-white/10">
                <button id="logoutBtn" class="w-full flex items-center justify-center space-x-2 p-2 rounded-lg text-white hover:bg-red-500/80 transition">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="font-bold">安全登出</span>
                </button>
            </div>
        </aside>

        <!-- 右側主要內容區 -->
        <main class="flex-1 flex flex-col bg-gray-50 h-full overflow-hidden">
            <!-- 頂部導覽列 -->
            <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-0">
                <h2 class="text-xl font-bold text-gray-800" id="pageTitle">派車任務看板</h2>
                <button id="refreshBtn" class="text-[#553f62] hover:bg-purple-50 p-2 rounded-full transition" title="重新整理資料">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </header>

            <!-- 內容區塊 -->
            <div class="flex-1 p-6 overflow-auto">
                <!-- 頁籤切換 -->
                <div class="flex space-x-1 mb-6 bg-gray-200 p-1 rounded-lg w-max" id="orderTabs">
                    <button class="tab-btn px-6 py-2 rounded-md font-bold text-sm shadow bg-white text-[#553f62]" data-target="unassigned">
                        🔴 待派車
                    </button>
                    <button class="tab-btn px-6 py-2 rounded-md font-bold text-sm text-gray-500 hover:text-[#553f62]" data-target="assigned">
                        🟢 已派車
                    </button>
                </div>

                <!-- 訂單卡片列表 (動態渲染) -->
                <div id="ordersContainer" class="grid grid-cols-1 xl:grid-cols-2 gap-4 pb-10">
                    <!-- 卡片範例格式將由 JS 生成 -->
                </div>
            </div>
        </main>
    </div>

    <!-- 派車彈出視窗 (Modal) -->
    <div id="assignModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-[400px] max-w-[90%] overflow-hidden">
            <div class="bg-[#553f62] p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fas fa-car mr-2"></i>指派司機</h3>
                <button id="closeModalBtn" class="text-white hover:text-gray-300"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6">
                <p class="text-xs font-bold text-[#f07cad] mb-1">預約編號</p>
                <p id="modalOrderId" class="font-mono font-bold text-gray-800 mb-4 bg-gray-100 p-2 rounded text-center"></p>
                
                <label class="block text-sm font-bold text-gray-700 mb-2">請選擇派發司機</label>
                <select id="driverSelect" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#553f62] outline-none">
                    <option value="">載入中...</option>
                </select>
                
                <div class="mt-6 flex space-x-3">
                    <button id="cancelAssignBtn" class="w-1/2 py-2.5 rounded-lg font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 transition">取消</button>
                    <button id="confirmAssignBtn" class="w-1/2 py-2.5 rounded-lg font-bold text-white bg-[#f07cad] hover:bg-[#e06b9b] transition shadow-md">確認派車</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =======================================================
        // ⚠️ 請在這裡貼上您剛剛部署好的 GAS Web App URL
        // =======================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxMao5vIMUFlRlA76NOs-Du3j8jo8wpfd_3GKmwa9mu5qBmi-zAm5EWu2f7dYgW-9rv/exec"; 
        // =======================================================

        let currentUser = null;
        let allOrders = [];
        let allDrivers = [];
        let currentTab = 'unassigned';
        let assigningRowIndex = null;

        // --- 登入邏輯 ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!GAS_URL || GAS_URL.includes("在此貼上")) {
                Swal.fire("錯誤", "請先在程式碼設定正確的 GAS_URL", "error");
                return;
            }

            const acc = document.getElementById('accInput').value.trim();
            const pwd = document.getElementById('pwdInput').value.trim();
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>驗證中...';

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'adminLogin', data: { account: acc, password: pwd } })
                });
                const result = await res.json();
                
                if(result.success) {
                    currentUser = result.user;
                    setupPermissions();
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('dashboardScreen').classList.remove('hidden');
                    loadDashboardData();
                } else {
                    Swal.fire({ title: '登入失敗', text: result.error, icon: 'error', confirmButtonColor: '#553f62' });
                }
            } catch(err) {
                Swal.fire('連線錯誤', '無法連上伺服器，請稍後再試', 'error');
            } finally {
                btn.disabled = false; btn.innerHTML = '登入系統';
            }
        });

        // --- 權限 UI 設定 ---
        function setupPermissions() {
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            const p = currentUser.permissions;
            
            if(p.view) document.getElementById('menu-view').classList.remove('hidden');
            if(p.fin) document.getElementById('menu-fin').classList.remove('hidden');
            if(p.drv) document.getElementById('menu-drv').classList.remove('hidden');
            if(p.sys) document.getElementById('menu-sys').classList.remove('hidden');

            if(!p.view) {
                document.getElementById('ordersContainer').innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-bold text-xl">您沒有查看預約單的權限</div>';
            }
        }

        // --- 載入資料 ---
        async function loadDashboardData() {
            if(!currentUser.permissions.view) return;
            
            Swal.fire({ title: '載入資料中...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            
            try {
                // 平行抓取訂單與司機清單
                const [orderRes, driverRes] = await Promise.all([
                    fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getAdminOrders' }) }).then(r=>r.json()),
                    fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getDriverList' }) }).then(r=>r.json())
                ]);

                if(orderRes.success) allOrders = orderRes.orders;
                if(driverRes.success) {
                    allDrivers = driverRes.drivers;
                    let drvHtml = '<option value="" disabled selected>-- 選擇司機 --</option>';
                    allDrivers.forEach(d => { drvHtml += `<option value="${d.code}">${d.name} - ${d.carInfo}</option>`; });
                    document.getElementById('driverSelect').innerHTML = drvHtml;
                }
                
                renderOrders();
                Swal.close();
            } catch(err) {
                Swal.fire('錯誤', '資料抓取失敗', 'error');
            }
        }

        // --- 渲染訂單卡片 ---
        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '';
            
            // 過濾未派/已派
            const filteredOrders = allOrders.filter(o => {
                const isAssigned = o.status === '已派車' || o.status === '完成';
                return currentTab === 'unassigned' ? !isAssigned : isAssigned;
            });

            if(filteredOrders.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 bg-white rounded-xl shadow-sm border border-gray-200"><p class="text-gray-500 font-bold">目前沒有資料</p></div>`;
                return;
            }

            filteredOrders.forEach(o => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-200 overflow-hidden flex flex-col";
                
                // 標題狀態列
                const headerColor = o.type === "送機" ? "bg-blue-50 text-blue-800 border-blue-100" : "bg-emerald-50 text-emerald-800 border-emerald-100";
                
                let actionButtonHtml = '';
                // 只有擁有「派車權限(disp)」且「未派車」時，才顯示派車按鈕
                if(currentUser.permissions.disp && currentTab === 'unassigned') {
                    actionButtonHtml = `<button onclick="openAssignModal(${o.rowIndex}, '${o.orderId}')" class="mt-4 w-full bg-[#f07cad] text-white font-bold py-2.5 rounded-lg shadow-sm hover:bg-[#e06b9b] transition text-sm flex items-center justify-center"><i class="fas fa-hand-pointer mr-2"></i>指派司機</button>`;
                } else if(currentTab === 'assigned') {
                    actionButtonHtml = `<div class="mt-4 bg-gray-100 text-gray-700 text-sm font-bold p-2.5 rounded-lg text-center flex items-center justify-center border border-gray-200"><i class="fas fa-user-check mr-2"></i>已派發：${o.driverCode}</div>`;
                }

                card.innerHTML = `
                    <div class="px-4 py-3 border-b flex justify-between items-center ${headerColor}">
                        <div class="font-bold text-sm flex items-center"><i class="far fa-calendar-alt mr-2"></i>${o.date} ${o.time}</div>
                        <div class="text-xs font-mono font-bold bg-white px-2 py-1 rounded shadow-sm border opacity-80">${o.orderId}</div>
                    </div>
                    <div class="p-4 flex-1 flex flex-col">
                        <div class="flex items-start mb-3">
                            <span class="bg-[#553f62] text-white text-xs font-bold px-2 py-1 rounded mr-2 mt-0.5 whitespace-nowrap">${o.type}</span>
                            <span class="text-sm font-bold text-gray-800 leading-snug">${o.route}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-xs text-gray-600 mb-3 bg-gray-50 p-2 rounded">
                            <p><i class="fas fa-car-side w-4 text-center mr-1 text-[#f07cad]"></i>${o.car}</p>
                            <p><i class="fas fa-users w-4 text-center mr-1 text-[#f07cad]"></i>${o.paxLug}</p>
                            <p class="col-span-2 text-gray-800 font-bold"><i class="fas fa-phone-alt w-4 text-center mr-1 text-[#f07cad]"></i>${o.paxName} (${o.paxPhone})</p>
                        </div>
                        ${o.remarks !== '無' && o.remarks ? `<div class="text-xs text-red-500 bg-red-50 p-2 rounded border border-red-100 mt-auto"><b>備註：</b>${o.remarks}</div>` : ''}
                        ${actionButtonHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- 頁籤切換 ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('shadow', 'bg-white', 'text-[#553f62]');
                    b.classList.add('text-gray-500');
                });
                const target = e.target;
                target.classList.add('shadow', 'bg-white', 'text-[#553f62]');
                target.classList.remove('text-gray-500');
                currentTab = target.getAttribute('data-target');
                renderOrders();
            });
        });

        // --- 派車彈出視窗處理 ---
        const modal = document.getElementById('assignModal');
        window.openAssignModal = (rowIndex, orderId) => {
            assigningRowIndex = rowIndex;
            document.getElementById('modalOrderId').innerText = orderId;
            document.getElementById('driverSelect').value = ""; // 重置選單
            modal.classList.remove('hidden');
        };

        const closeModal = () => { modal.classList.add('hidden'); };
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelAssignBtn').addEventListener('click', closeModal);

        document.getElementById('confirmAssignBtn').addEventListener('click', async () => {
            const drvCode = document.getElementById('driverSelect').value;
            if(!drvCode) { Swal.fire('請選擇', '請先從選單選擇一名司機', 'warning'); return; }

            const btn = document.getElementById('confirmAssignBtn');
            btn.disabled = true; btn.innerHTML = '派送中...';

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'assignDriver', data: { rowIndex: assigningRowIndex, driverCode: drvCode }})
                });
                const result = await res.json();
                
                if(result.success) {
                    Swal.fire({ title: '派車成功！', text: '已更新試算表狀態', icon: 'success', timer: 1500, showConfirmButton: false });
                    closeModal();
                    loadDashboardData(); // 重新整理畫面
                } else {
                    Swal.fire('派車失敗', result.error, 'error');
                }
            } catch (err) {
                Swal.fire('連線錯誤', '派送時發生錯誤', 'error');
            } finally {
                btn.disabled = false; btn.innerHTML = '確認派車';
            }
        });

        // --- 重新整理鈕 ---
        document.getElementById('refreshBtn').addEventListener('click', loadDashboardData);

        // --- 登出鈕 ---
        document.getElementById('logoutBtn').addEventListener('click', () => {
            currentUser = null;
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('accInput').value = '';
            document.getElementById('pwdInput').value = '';
        });

    </script>
</body>
</html>
