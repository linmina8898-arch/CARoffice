<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約資料確認</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f5f7;
      color: #553f62;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .box {
      width: min(88vw, 360px);
      background: #fff;
      border: 1px solid #e6e2ea;
      border-radius: 18px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 16px 36px rgba(31, 41, 55, .08);
    }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .text { font-size: 14px; line-height: 1.7; color: #6b7280; }
    .btn {
      display: inline-block;
      margin-top: 18px;
      padding: 11px 18px;
      border-radius: 12px;
      background: #553f62;
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="title">預約資料確認</div>
    <div id="message" class="text">正在開啟確認頁，請稍候...</div>
    <a id="manualLink" class="btn" href="#" style="display:none;">開啟確認頁</a>
  </div>

  <script>
    const LIFF_IDS = {
      AS: "2009922945-KmKUgqbg",
      AZ: "2010218931-J293DdSb"
    };

    function getParam(name) {
      return new URLSearchParams(location.search).get(name) || "";
    }

    function redirect() {
      const token = getParam("t") || getParam("token") || getParam("bindToken");
      const source = (getParam("s") || getParam("source") || "AS").trim().toUpperCase();
      const liffId = LIFF_IDS[source] || LIFF_IDS.AS;
      const message = document.getElementById("message");
      const link = document.getElementById("manualLink");
      if (!token) {
        message.textContent = "確認連結缺少必要資料，請聯絡客服協助。";
        return;
      }
      const url = `https://liff.line.me/${liffId}?bindToken=${encodeURIComponent(token)}&source=${encodeURIComponent(source)}`;
      link.href = url;
      link.style.display = "inline-block";
      setTimeout(() => {
        location.replace(url);
      }, 500);
    }

    redirect();
  </script>
</body>
</html>
