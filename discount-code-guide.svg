<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1640" viewBox="0 0 1080 1640">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1A0B3D" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF8FC"/>
      <stop offset="1" stop-color="#F4EDF6"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1640" fill="url(#bg)"/>

  <text x="540" y="92" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="43" font-weight="700" fill="#1A0B3D">如何查詢專屬折扣碼</text>
  <text x="540" y="140" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="24" fill="#7A6A82">折扣碼在 STEP 2 乘客資料最下面，送出前記得查詢</text>

  <g transform="translate(125 195)" filter="url(#shadow)">
    <rect x="0" y="0" width="830" height="1060" rx="34" fill="#FFFFFF"/>
    <rect x="0" y="0" width="830" height="96" rx="34" fill="#574266"/>
    <rect x="0" y="62" width="830" height="34" fill="#574266"/>
    <text x="52" y="61" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">安興租車｜詢價/預約系統</text>

    <g transform="translate(52 128)">
      <rect x="0" y="0" width="218" height="78" rx="16" fill="#FFFFFF" stroke="#E1D6E6" stroke-width="2"/>
      <text x="24" y="31" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#7A6A82">STEP 1</text>
      <text x="24" y="60" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1A0B3D">快速估價</text>

      <rect x="244" y="0" width="218" height="78" rx="16" fill="#574266"/>
      <text x="268" y="31" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#FFFFFF">STEP 2</text>
      <text x="268" y="60" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">乘客資料</text>

      <rect x="488" y="0" width="218" height="78" rx="16" fill="#FFFFFF" stroke="#E1D6E6" stroke-width="2"/>
      <text x="512" y="31" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#7A6A82">STEP 3</text>
      <text x="512" y="60" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1A0B3D">確認送出</text>
    </g>

    <g transform="translate(52 242)">
      <text x="0" y="0" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="26" font-weight="700" fill="#1A0B3D">乘客資料</text>
      <text x="0" y="38" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#7A6A82">填寫乘車人姓名、電話與需求後，往下滑到折扣區。</text>

      <rect x="0" y="70" width="706" height="64" rx="16" fill="#FFFFFF" stroke="#E1D6E6" stroke-width="2"/>
      <text x="24" y="111" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#A194AA">乘車人姓名</text>
      <rect x="0" y="152" width="706" height="64" rx="16" fill="#FFFFFF" stroke="#E1D6E6" stroke-width="2"/>
      <text x="24" y="193" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#A194AA">聯絡電話</text>
      <rect x="0" y="234" width="706" height="64" rx="16" fill="#FFFFFF" stroke="#E1D6E6" stroke-width="2"/>
      <text x="24" y="275" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#A194AA">付款方式 / 備註需求</text>
    </g>

    <g transform="translate(52 590)">
      <rect x="0" y="0" width="706" height="326" rx="24" fill="#FCF8FD" stroke="#D8C9DE" stroke-width="3"/>
      <text x="28" y="46" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="28" font-weight="700" fill="#1A0B3D">專屬優惠與折扣</text>
      <text x="28" y="96" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#7A6A82">折扣碼（單筆總折抵上限 500 元）</text>
      <rect x="28" y="116" width="430" height="58" rx="14" fill="#FFFFFF" stroke="#D8C9DE" stroke-width="2"/>
      <text x="52" y="153" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="21" fill="#A194AA">輸入折扣碼（選填）</text>
      <rect x="480" y="116" width="198" height="58" rx="14" fill="#E8E5EC"/>
      <text x="579" y="153" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="24" font-weight="700" fill="#574266">套用</text>

      <g transform="translate(28 206)">
        <rect x="0" y="0" width="650" height="62" rx="14" fill="#FFFFFF" stroke="#D8C9DE" stroke-width="2"/>
        <text x="325" y="40" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="24" font-weight="700" fill="#574266">查詢專屬折扣碼</text>
        <text x="325" y="95" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#7A6A82">沒有專用折扣碼，可直接按查詢專屬折扣碼。</text>
      </g>
    </g>

    <g transform="translate(52 950)">
      <rect x="0" y="0" width="706" height="82" rx="20" fill="#FFFFFF" stroke="#D8C9DE" stroke-width="2"/>
      <text x="28" y="34" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1A0B3D">最後確認折扣有套用，再送出預約</text>
      <text x="28" y="63" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="20" fill="#7A6A82">每筆預約單最多折抵 $500，實際可用優惠依系統顯示為準。</text>
    </g>
  </g>

  <g transform="translate(0 1305)">
    <rect x="70" y="0" width="940" height="168" rx="34" fill="#FFFFFF" opacity="0.9"/>
    <g transform="translate(105 35)">
      <circle cx="28" cy="28" r="28" fill="#D75B8C"/>
      <text x="28" y="38" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="27" font-weight="700" fill="#FFFFFF">1</text>
      <text x="76" y="24" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="21" font-weight="700" fill="#1A0B3D">到 STEP 2</text>
      <text x="76" y="55" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="18" fill="#7A6A82">專屬優惠與折扣</text>
    </g>

    <g transform="translate(402 35)">
      <circle cx="28" cy="28" r="28" fill="#D75B8C"/>
      <text x="28" y="38" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="27" font-weight="700" fill="#FFFFFF">2</text>
      <text x="76" y="24" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="21" font-weight="700" fill="#1A0B3D">有活動碼</text>
      <text x="76" y="55" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="18" fill="#7A6A82">先輸入套用</text>
    </g>

    <g transform="translate(698 35)">
      <circle cx="28" cy="28" r="28" fill="#D75B8C"/>
      <text x="28" y="38" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="27" font-weight="700" fill="#FFFFFF">3</text>
      <text x="76" y="24" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="21" font-weight="700" fill="#1A0B3D">沒有活動碼</text>
      <text x="76" y="55" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="18" fill="#7A6A82">直接查詢</text>
    </g>

    <rect x="125" y="190" width="830" height="50" rx="25" fill="#FFFFFF" opacity="0.94"/>
    <text x="540" y="223" text-anchor="middle" font-family="Microsoft JhengHei, Noto Sans TC, Arial, sans-serif" font-size="19" fill="#7A6A82">單筆總折抵上限 500 元，實際可用優惠依系統顯示為準。</text>
  </g>
</svg>
